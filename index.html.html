 {name:"Raj Ganguly",title:"Co-founder & Co-CEO",org:"B Capital",cat:"VC",priority:"Worth a chat",loc:"Singapore / Los Angeles",who:"Raj Ganguly is a co-founder and Managing Partner of B Capital Group, a global venture and growth equity firm with approximately $6 billion in AUM co-founded with Facebook co-founder Eduardo Saverin. B Capital focuses on enterprise technology, health, sustainability, and fintech with a particular emphasis on Asia and emerging markets. Ganguly's investment background spans BCG and Bain Capital before co-founding B Capital. The firm has a unique structure as a strategic partnership with BCG (Boston Consulting Group), giving it access to BCG's global corporate relationships and portfolio company support capabilities. B Capital's Asia focus and BCG partnership make it a natural co-investment partner for Rosc's Indo-Pacific portfolio.",check:"Co-LP or co-investor through B Capital's Asia-focused portfolio.",cares:"Enterprise technology|Asia and emerging markets|Growth equity|BCG strategic partnership|Indo-Pacific investment",forRosc:"B Capital's Asia network and BCG partnership create both co-investment and LP introduction opportunities in Rosc's Indo-Pacific target geographies.",ask:"Co-investment on Indo-Pacific technology deals and introductions to B Capital's Asian institutional LP base.",watchOut:"Nothing significant.",intros:"B Capital Asia LP network — institutional investors across Southeast Asia and India who back B Capital's strategies.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/raj-ganguly",topics:["B2B tech","Growth equity","Southeast Asia","Enterprise software"]},
 {name:"Kristalina Georgieva",title:"Managing Director",org:"IMF",cat:"Policy",priority:"Worth a chat",loc:"Washington DC",party:"Non-partisan (IMF)",who:"Kristalina Georgieva is the Managing Director of the International Monetary Fund, the most important multilateral financial institution in the world. Bulgarian-born, she previously served as CEO of the World Bank and as European Commissioner for Budget and Human Resources. As IMF Managing Director she leads an institution with 190 member countries and over $1 trillion in lending capacity, and she is the single most influential voice on global economic stability. Her geopolitical intelligence on sovereign debt, currency crises, and economic security across every major economy is unparalleled. Her relationships span every finance minister, central bank governor, and institutional investor in the world.",check:"No direct check. Geopolitical intelligence and global institutional network.",cares:"Global economic stability|Sovereign debt|IMF lending capacity|Emerging market resilience|Climate and economic risk",forRosc:"Unparalleled geopolitical intelligence and relationships with every finance minister and central bank governor globally — the ultimate LP introduction network.",ask:"Her read on the geopolitical and economic risk landscape most relevant to Rosc's defense-tech investment thesis.",watchOut:"IMF is scrupulously non-political — keep off sovereign politics and focus on economic analysis.",intros:"IMF member country finance ministry network — her relationships with finance ministers and central bank governors span every country Rosc operates in.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/kristalina-georgieva",topics:["Global economic stability","Sovereign debt","IMF programs","Emerging market capital flows"]},
 {name:"Austan Goolsbee",title:"President & CEO",org:"Federal Reserve Bank of Chicago",cat:"Policy",priority:"Worth a chat",loc:"Chicago, IL",party:"D (Obama)",who:"Austan Goolsbee is the President of the Federal Reserve Bank of Chicago and a member of the Federal Open Market Committee (Chicago rotates — he votes in 2023, 2025, 2027; is an alternate non-voter in 2026) — one of twelve regional Fed presidents who set US monetary policy. An economist by training and a professor at the University of Chicago Booth School of Business, he served as Chairman of the Council of Economic Advisers under President Obama. He has a high public profile including a significant social media presence and a reputation for making complex economics accessible. As Chicago Fed President he has particular focus on Midwest manufacturing, labor markets, and the economic implications of the AI and technology transformation — all relevant to Rosc's portfolio companies.",check:"No direct check. Monetary policy intelligence and Midwest economic network.",cares:"Monetary policy|Midwest economy|AI and labor markets|Chicago business community|Economic forecasting",forRosc:"Federal Reserve intelligence and Midwest institutional network. His economic framework on AI and manufacturing directly informs Rosc's portfolio company operating environment.",ask:"His read on the economic environment for defense-tech companies — interest rates, manufacturing capacity, and the AI productivity implications.",watchOut:"D (Obama appointee) — keep off politics. He is genuinely independent as a Fed president.",intros:"Chicago Fed and Midwest institutional network — his relationships span the Midwest pension funds, endowments, and institutional investors that are underexplored LP prospects for Rosc.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/austan-goolsbee",topics:["Monetary policy","US economy","Interest rates","Economic forecasting"]},
 {name:"Lari Hämäläinen",title:"Senior Partner, Tech & Advanced Industries",org:"McKinsey",cat:"AI",priority:"Worth a chat",loc:"Seattle, WA",who:"Lari Hämäläinen is a Senior Partner at McKinsey based in Seattle, leading McKinsey\'s Technology and GenAI practices within QuantumBlack, AI by McKinsey. He previously led McKinsey Digital in Northern Europe and Northeast Asia, and served as managing partner for McKinsey\'s Finland office. His focus is helping companies build new digital businesses and scale AI and advanced analytics — making him a key McKinsey voice on enterprise AI transformation. He has been a co-author of McKinsey\'s major reports on agentic AI (2025) and GenAI strategy.",check:"Senior McKinsey partner leading GenAI and tech transformation globally — key for AI strategy introductions and enterprise client networks.",cares:"Agentic AI|Enterprise AI transformation|Digital business building|Tech sector strategy|GenAI at scale",forRosc:"Hamalainen works with the world's largest enterprises on AI strategy and transformation. McKinsey's tech practice touches every major institutional and corporate investor.",ask:"Warm introductions to McKinsey tech practice clients and alumni evaluating AI and defense-tech investments or procurement.",watchOut:"Nothing significant.",intros:"McKinsey Global Tech Practice network — executives and board members at major corporates and institutional investors across the US, Europe, and Asia evaluating AI transformation.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/lari-hamalainen",topics:["Defense digitization","AI implementation","McKinsey tech practice","Advanced manufacturing"]},
 {name:"Tristan Harris",title:"Co-Founder",org:"Center for Humane Technology",cat:"AI",priority:"Worth a chat",loc:"San Francisco, CA",party:"D-leaning",who:"Tristan Harris is a former Google design ethicist turned technology critic and co-founder of the Center for Humane Technology, which he built after his viral 2017 TED Talk 'How a Handful of Tech Companies Control Billions of Minds' sparked global debate about social media and AI manipulation. He was a central subject of the Netflix documentary The Social Dilemma. He is now one of the most prominent public voices on AI risk, technology addiction, and the social consequences of AI systems — appearing regularly before Congress and in major media. His AI risk framework is widely influential with policymakers, institutional investors increasingly focused on ESG and technology risk, and public audiences.",check:"No direct check. Rosc Institute AI ethics credibility.",cares:"AI safety and ethics|Social media harm|Technology addiction|AI and democracy|Human-centered technology design",forRosc:"His AI ethics credibility signals to institutional LPs that Rosc thinks seriously about responsible AI in defense — a genuine differentiator with ESG-sensitive allocators.",ask:"Rosc Institute contribution — a co-authored piece on responsible AI in defense applications.",watchOut:"His work is focused on civilian AI harms — engage on the genuine ethics of dual-use AI, not just as a marketing play.",intros:"Center for Humane Technology network — policy, media, and institutional relationships spanning the AI governance conversation at every level.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/tristan-harris",topics:["AI safety","Attention economy","Technology ethics"]},
 {name:"Vladimir Kara-Murza",title:"VP",org:"Free Russia Foundation",cat:"Geo",priority:"Worth a chat",loc:"Washington DC",party:"Liberal opposition (Russia)",who:"Vladimir Kara-Murza is a Russian opposition politician and democracy activist who survived two apparent assassination attempts by poisoning, spent 17 months in a Russian prison on treason charges, and was released in August 2024 as part of a major prisoner exchange with Russia — one of the most prominent political prisoners freed in that swap. He is a British-Russian citizen, an Oxford graduate, and a close associate of the late Boris Nemtsov. He is now one of the most prominent and credible voices on Putin's Russia, the human rights situation inside Russia, and the geopolitical implications of Russian revanchism. His personal story and moral authority give him unusual credibility with both European and American audiences.",check:"No direct check. Rosc Institute Russia intelligence and moral authority.",cares:"Russian democracy|Putin's regime|Human rights|Ukraine and Russia|Western response to authoritarianism",forRosc:"The most credible living voice on Putin's Russia. A Rosc Institute relationship with Kara-Murza signals moral seriousness about why Rosc's thesis matters beyond financial returns.",ask:"Rosc Institute contribution — his perspective on the geopolitical stakes of Western defense technology investment.",watchOut:"Sensitive about the Russian political situation — engage with genuine respect for what he has been through.",intros:"Russian opposition and European democracy network — his relationships span European governments, human rights organizations, and policy institutions working on Russia.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/vladimir-kara-murza",topics:["Russia democracy","Putin opposition","Political prisoners","Post-Putin Russia"]},
 {name:"Farah Pandith",title:"Senior Fellow",org:"Council on Foreign Relations",cat:"Geo",priority:"Worth a chat",loc:"New York, NY",party:"D (Obama)",who:"Farah Pandith served as the first-ever US Special Envoy to Muslim Communities under both Presidents Bush and Obama — a unique diplomatic role spanning the entire Muslim world. She is a Senior Fellow at Harvard Kennedy School, a member of the Council on Foreign Relations, and the author of How We Win, on countering extremism among young Muslims globally. She has deep personal relationships across Muslim-majority countries in the Middle East, Southeast Asia, and Central Asia — exactly the geographies that are most strategically relevant to Rosc's Indo-Pacific and Gulf LP strategy. Her combination of Muslim world relationships, Harvard and CFR networks, and counter-extremism expertise creates several distinct Rosc touchpoints.",check:"No direct check. Gulf and Southeast Asia relationship network.",cares:"Muslim world diplomacy|Counter-extremism|Youth and identity|US public diplomacy|Middle East and Southeast Asia",forRosc:"Her Muslim world diplomatic relationships span Gulf sovereign wealth decision-makers and Southeast Asian government officials — directly relevant to Rosc's LP geography.",ask:"Warm introductions to Gulf and Southeast Asian institutional contacts relevant to Rosc's LP development strategy.",watchOut:"Nothing significant.",intros:"Gulf and Southeast Asia government network — her diplomatic relationships across Muslim-majority countries include officials and institutional investors in Rosc's priority LP geographies.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/farah-pandith",topics:["Counter-extremism","Technology and radicalization","National security"]},
 {name:"Dmitry Shevelenko",title:"Chief Business Officer",org:"Perplexity",cat:"AI",priority:"Worth a chat",loc:"San Francisco, CA",who:"Dmitry Shevelenko is the Chief Business Officer of Perplexity AI, one of the most important and fastest-growing AI companies in the world. Perplexity has built an AI-native search and answer engine that is challenging Google's dominance in information retrieval, and has grown to over $1 billion in valuation backed by top venture investors. Before Perplexity he co-founded Tortoise, was at Uber in product partnerships, and was at LinkedIn in product management. He is the business development and partnership lead at one of the hottest AI companies in the world, giving him deep relationships across the AI venture ecosystem, institutional investors backing AI companies, and technology executives. He is based in New York and is board member at Lazard.",check:"No direct check. AI ecosystem deal sourcing and investor network.",cares:"AI search and answer engines|Business development|AI venture ecosystem|Information access|Partnership strategy",forRosc:"Perplexity's AI ecosystem relationships span the investors and companies at the frontier of AI — directly relevant to Rosc's AI-native defense portfolio.",ask:"AI ecosystem deal sourcing introductions — specifically founders working on AI applications with defense or intelligence community relevance.",watchOut:"Nothing significant.",intros:"Perplexity investor network — top-tier AI investors backing one of the most important AI companies, several of whom are potential Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/dmitry-shevelenko",topics:["AI search","Perplexity product","AI enterprise"]},
 {name:"Igor Tulchinsky",title:"Founder, Chairman & CEO",org:"WorldQuant",cat:"AI",priority:"Worth a chat",loc:"New York, NY",who:"Igor Tulchinsky is the Founder, Chairman, and CEO of WorldQuant, a global quantitative asset management firm he established in 2007 following 12 years as a statistical arbitrage portfolio manager at Millennium Management. WorldQuant manages approximately $7 billion in assets using millions of mathematical algorithms — alphas — developed by a global team of over 1,100 quants across 28 offices. Before finance he was a venture capitalist, a scientist at AT&T Bell Laboratories, and a video game programmer. He holds an MA in Computer Science from the University of Texas and an MBA from Wharton. He has authored multiple books on quantitative investing and prediction including The Age of Prediction. He is also Chairman of WorldQuant Foundry, the deep tech investment and incubation arm.",check:"Potential LP through WorldQuant's capital base and Foundry co-investment.",cares:"Quantitative investing|AI and prediction|Deep tech venture creation|Global talent development|Mathematics and finance",forRosc:"WorldQuant Foundry invests in deep tech companies at the AI-physical world intersection — direct co-investment overlap with Rosc's portfolio.",ask:"WorldQuant Foundry co-investment on deep tech defense-adjacent companies and whether WorldQuant has LP appetite for Rosc's fund.",watchOut:"Nothing significant.",intros:"WorldQuant Foundry portfolio — deep tech companies at the intersection of AI and physical world applications that are potential Rosc co-investment targets.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/igor-tulchinsky",topics:["Quantitative investing","AI and finance","Data science","Systematic strategies"]},
 {name:"Neera Tanden",title:"President & CEO",org:"Center for American Progress",cat:"Policy",priority:"Worth a chat",loc:"Washington DC",party:"D",who:"Neera Tanden served as Director of the Office of Management and Budget under President Biden — a Senate-confirmed position making her one of the most senior officials responsible for federal budget and technology investment priorities. Before OMB she was President of the Center for American Progress for over a decade, one of the most influential progressive think tanks in Washington. She is a Yale Law graduate and Clinton White House veteran. As OMB Director she had direct visibility into every federal technology investment decision, including CHIPS Act implementation, defense technology appropriations, and AI procurement policy. She now has deep relationships across the Biden-era national security and technology policy establishment.",check:"No direct check. Federal budget and technology policy intelligence.",cares:"Federal budget policy|Technology investment|Progressive policy|OMB oversight|Social policy",forRosc:"Direct intelligence on federal technology investment priorities and the budget environment for defense technology — and connections to the policy establishment that shapes Rosc's regulatory environment.",ask:"Her read on the federal budget environment for defense technology and AI investment under the current administration.",watchOut:"D (Biden appointee, progressive) — keep off partisan politics.",intros:"Biden OMB and policy network — her relationships span the officials who shaped the federal technology investment environment that Rosc's portfolio companies operate in.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/neera-tanden",topics:["Progressive policy","AI governance","Domestic policy","Democratic strategy"]},
 {name:"Tim Scott",title:"US Senator",org:"South Carolina",cat:"Policy",priority:"Worth a chat",loc:"Washington DC",party:"R",who:"Tim Scott is the US Senator for South Carolina and one of the most prominent Republican politicians in America. He ran for the Republican presidential nomination in 2024 before endorsing Donald Trump. He serves on the Senate Banking Committee, which has significant oversight of private capital markets, emerging manager regulations, and financial services. South Carolina has a meaningful defense industry including the Port of Charleston (critical defense logistics), Boeing's defense manufacturing, and several military installations. Scott is well-networked across the Republican donor base and institutional investors aligned with Republican politics — exactly the LP demographic that is most comfortable with defense-tech investing.",check:"No direct check. Republican donor and institutional LP introduction channel.",cares:"Republican politics|Banking regulation|South Carolina economy|Defense manufacturing|Faith and family",forRosc:"His Republican institutional donor and investor network is a warm LP introduction channel among politically aligned capital that is most comfortable with defense investing.",ask:"Warm introductions to Republican-aligned institutional investors and family offices with defense-tech appetite.",watchOut:"R (prominent Republican) — keep entirely off domestic politics. Focus on defense and capital markets.",intros:"Republican donor and investor network — the institutionally aligned capital base that is most comfortable with defense-tech investing and has the least political friction.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/tim-scott",topics:["Armed services","South Carolina defense","Conservative policy"]},
 {name:"Benedict Evans",title:"Venture Partner",org:"Mosaic Ventures",cat:"AI",priority:"Worth a chat",loc:"London, UK",who:"Benedict Evans is one of the most widely read technology analysts in the world. A former General Partner at Andreessen Horowitz and before that at various UK-based venture firms, he now writes an independent newsletter and publishes an annual technology presentation — 'The State of Tech' — that is read by hundreds of thousands of investors, executives, and policymakers globally. His analytical work spans AI, smartphones, electric vehicles, retail disruption, and the long-term structural shifts in the technology industry. British-born and based in London, he is deeply embedded in both the US and European technology investment ecosystems and has personal relationships spanning every major venture fund globally.",check:"No direct check. AI and venture ecosystem intelligence and network.",cares:"AI and technology trends|Mobile and platform shifts|Venture capital analysis|Technology disruption|European tech ecosystem",forRosc:"His annual technology presentation reaches every institutional LP evaluating technology funds. A Rosc Institute relationship or citation in his analysis would directly shape LP awareness.",ask:"Whether there is a collaboration opportunity around Rosc Institute's research on defense-tech investing trends.",watchOut:"Nothing significant.",intros:"Global VC network — his a16z and independent analyst relationships span every major venture fund in the US and Europe.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/benedict-evans",topics:["AI disruption","Tech platforms","Media and technology","VC strategy"]},
 {name:"Namsun Kim",title:"President, Investments",org:"NAVER / Poshmark",cat:"AI",priority:"Worth a chat",loc:"Seoul, South Korea",who:"Namsun Kim is the Head of Innovation and Technology at Korea Investment Corporation (KIC), South Korea's sovereign wealth fund managing approximately $200 billion in assets. KIC was established to diversify Korea's foreign reserves and has been actively building an alternatives and venture technology allocation. Kim specifically leads the innovation and technology investment function, meaning he is the operational decision-maker for venture and emerging technology investments at KIC. South Korea is one of the most important US security allies in the Indo-Pacific, with US Forces Korea on the peninsula, and Korean defense technology investment is directly aligned with allied defense technology priorities.",check:"Yes — Korean SWF LP. KIC manages $200bn and Kim leads the technology investment function. First commitment potentially $25–75M.",cares:"Korean sovereign wealth|Technology and innovation investing|Indo-Pacific security|Allied defense technology|Emerging manager programs",forRosc:"Korean SWF with a technology investment mandate and a direct security alliance with the US. One of the most naturally aligned LP relationships at the conference.",ask:"Full LP pitch — thesis, portfolio, team, fee structure. KIC's technology investment mandate is a natural fit for Rosc's defense-tech strategy.",watchOut:"Nothing significant.",intros:"KIC institutional network — Korea's sovereign capital relationships span Asian pension funds and sovereign investors across the Indo-Pacific.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/namsun-kim",topics:["Korean tech","NAVER AI","Korea-US alliance","Asian tech investing"]},
 {name:"Mark Aarons",title:"Head, Asset Classes",org:"Victorian Funds Management Corp",cat:"LP",subcat:"SWF",priority:"Worth a chat",loc:"Melbourne, Australia",party:"Non-partisan (Victorian Funds)",who:"Mark Aarons is the Chief Investment Officer of the Future Fund's International Infrastructure team — a separate reporting line within Future Fund focused specifically on infrastructure assets globally. He sits alongside Shikha Gupta in the Future Fund investment structure, though focusing on infrastructure rather than broad alternatives. Infrastructure is one of the most important dual-use categories for Rosc's thesis — communications infrastructure, energy infrastructure, and transportation infrastructure all have direct defense applications. As a CIO at Future Fund he has both LP authority for infrastructure-adjacent fund commitments and deal sourcing relationships across the global infrastructure ecosystem.",check:"Yes — Future Fund LP with infrastructure mandate. A second LP touch-point within Future Fund alongside Shikha Gupta.",cares:"Infrastructure investing|Global real assets|Defense infrastructure|Energy and utilities|Transport infrastructure",forRosc:"Second Future Fund LP relationship alongside Gupta — specifically covering infrastructure assets that overlap with Rosc's dual-use infrastructure portfolio.",ask:"Whether Future Fund's infrastructure mandate includes defense-adjacent infrastructure companies and what that allocation looks like.",watchOut:"Coordinate carefully with Shikha Gupta — avoid creating internal confusion within Future Fund.",intros:"Shikha Gupta — Executive Director Alternatives, Future Fund. Coordinate the two conversations to reinforce each other.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/mark-aarons",topics:["Australian pension","Alternatives","Asset allocation"]},
 {name:"Hadi Badri",title:"CEO",org:"Dubai Dept of Economy and Tourism",cat:"Policy",priority:"Worth a chat",loc:"Dubai, UAE",party:"Non-partisan (UAE govt)",who:"Hadi Badri is the CEO of Dubai Economy and Tourism, the government body responsible for driving Dubai's economic development and positioning Dubai as a global business hub. He oversees the strategy to attract foreign investment, businesses, and talent to Dubai — one of the most important global financial centers and a gateway to Gulf sovereign wealth. Dubai has positioned itself as the neutral meeting ground between East and West, and Badri's role gives him deep relationships with both Gulf sovereign wealth decision-makers and the international institutional investors, family offices, and corporate leaders who are increasingly using Dubai as a base. The UAE is one of the most important relationships in Rosc's Gulf LP strategy.",check:"Indirect — gateway to Dubai-based institutional capital and Gulf sovereign introductions.",cares:"Dubai economic development|Foreign direct investment|Gulf business hub|Tourism and hospitality|UAE positioning",forRosc:"Gateway to Dubai's institutional capital ecosystem and Gulf sovereign wealth relationships at a moment when Gulf SWFs are among the most active defense-tech LP prospects.",ask:"Introductions to Dubai-based family offices and Gulf institutional investors with defense-tech appetite.",watchOut:"Nothing significant.",intros:"Dubai business and investment community — his relationships span the family offices, sovereign vehicles, and institutional investors that have made Dubai their base.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/hadi-badri",topics:["Dubai economy","UAE investment","MENA business","Economic diversification"]},
 {name:"Matthias Berninger",title:"EVP, Public Affairs",org:"Bayer",cat:"Policy",priority:"Worth a chat",loc:"Washington DC",who:"Matthias Berninger is the Executive Vice President for Public Affairs, Science, Sustainability, and Safety at Mars, Inc. — one of the largest privately held companies in the world with approximately $45 billion in annual revenue, owned by the Mars family. Before Mars he was a Green Party member of the German Bundestag and a State Secretary in the German Agriculture Ministry. His dual background in German politics and one of the world's largest private family companies makes him an unusual bridge between European policy, the Mars family office, and the broader network of large privately held family businesses that represent significant undeployed LP capital. The Mars family has never had a public profile as institutional investors, but the family's wealth is substantial.",check:"Indirect — bridge to Mars family capital and large European private family business networks.",cares:"Sustainable agriculture|Corporate sustainability|Food security|European policy|Family business governance",forRosc:"Mars family and large European privately held business networks are an underexplored LP category. His European policy background also opens German institutional relationships.",ask:"Whether the Mars family office or his European private family business network has appetite for alternatives including defense-tech VC.",watchOut:"Mars is focused on sustainability and food — frame dual-use civilian benefit carefully.",intros:"European large family business network — his relationships with the owners of other major European privately held businesses are an underexplored LP channel for Rosc.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/matthias-berninger",topics:["German politics","Biotech policy","Agricultural biotech","EU regulation"]},
 {name:"Joe Betts-LaCroix",title:"Founder & CEO",org:"Retro Biosciences",cat:"AI",priority:"Worth a chat",loc:"San Francisco, CA",who:"Joe Betts-LaCroix is the CEO of Retro Biosciences, a longevity-focused biotech company backed by Sam Altman with $180 million in initial funding. Retro is working on extending healthy human lifespan by 10 years through cellular reprogramming, plasma-inspired therapeutics, and autophagy enhancement. While longevity is not a traditional defense-tech investment, it sits at the intersection of two categories that are directly relevant to Rosc: military human performance optimization (maintaining peak physical and cognitive performance in warfighters) and the broader biotech AI platform technologies that Retro is developing. Sam Altman's direct backing gives him a unique network into the AI and tech establishment.",check:"No direct check — biotech ecosystem deal sourcing.",cares:"Longevity science|Cellular reprogramming|Human healthspan|Sam Altman network|Biotech innovation",forRosc:"Retro's human performance biology and Sam Altman network create dual-use biotech deal sourcing and AI ecosystem introductions.",ask:"Biotech and human performance deal sourcing — specifically companies in his network working on biology with defense human performance applications.",watchOut:"Nothing significant.",intros:"Sam Altman and OpenAI network — his Retro backing connects him to one of the most important AI networks in the world.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/joe-betts-lacroix",topics:["Longevity science","Sam Altman network","AI and biology"]},
 {name:"Jenny Chan",title:"CIO",org:"Children's Hospital of Philadelphia",cat:"LP",priority:"Worth a chat",loc:"Philadelphia, PA",who:"Jenny Chan is a Managing Director at GIC, Singapore's Government Investment Corporation, where she leads a portion of the sovereign wealth fund's private equity investment activities. Based in Singapore, she covers GIC's Asian private equity portfolio and is part of the same institution as Eric Wilmes, who leads GIC's Americas operations. While Wilmes is the primary GIC LP contact for Rosc given his Americas mandate, Chan's Asian PE coverage gives her visibility into the Indo-Pacific technology and defense ecosystem and relationships across the Asian institutional capital community. Singapore's strategic role as a financial hub for Southeast Asia makes her relationships relevant to Rosc's broader Indo-Pacific LP strategy.",check:"Secondary GIC touch-point — coordinate with Wilmes. Her Asian PE coverage may open additional GIC capital for Indo-Pacific co-investments.",cares:"Asian private equity|GIC portfolio|Singapore sovereign strategy|Indo-Pacific technology|Emerging market investing",forRosc:"Secondary GIC relationship — coordinate with Eric Wilmes to avoid mixed signals, but her Asian PE coverage adds depth to the GIC LP relationship.",ask:"Reinforce the GIC LP relationship and understand whether her Asian PE mandate includes defense-tech co-investment opportunities.",watchOut:"Coordinate carefully with Eric Wilmes — GIC is one institution and they need to speak with one voice internally.",intros:"GIC Asian PE portfolio network — her relationships span Asian technology and PE companies relevant to Rosc's Indo-Pacific portfolio.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/jenny-chan",topics:["Healthcare endowment","Alternatives","Impact investing"]},
 {name:"Suzanne Clark",title:"President & CEO",org:"US Chamber of Commerce",cat:"Policy",priority:"Worth a chat",loc:"Washington DC",party:"Non-partisan (Chamber of Commerce)",who:"Suzanne Clark is the President and CEO of the US Chamber of Commerce, the world's largest business federation representing over 3 million businesses across every sector of the US economy. The Chamber is one of the most powerful advocacy and networking organizations in Washington, with relationships spanning every major industry, every member of Congress, and every major administration official. As CEO she is the principal spokesperson for American business on policy, trade, and regulatory matters. Her relationships include every major institutional investor, corporate CEO, and government official that matters to Rosc's LP development and portfolio company government contracting.",check:"No direct check. The most comprehensive single relationship for US corporate and institutional network access.",cares:"Business policy advocacy|Trade and competitiveness|Regulatory environment|US economic growth|Corporate America relationships",forRosc:"The Chamber's membership includes every major US corporation and institutional investor. Clark's relationships span the entire US business establishment — an unmatched introduction network.",ask:"Whether the Chamber has defense-tech programming that Rosc could participate in — and warm introductions to Chamber member companies and institutional investors.",watchOut:"Nothing significant.",intros:"US Chamber member network — 3 million businesses including every major US corporation and institutional investor, spanning every LP and portfolio company customer Rosc needs.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/suzanne-clark",topics:["US business policy","Trade","AI regulation","Defense procurement"]},
 {name:"Marcelo Claure",title:"Partner & Co-Chair",org:"Brightstar Capital Partners",cat:"VC",priority:"Worth a chat",loc:"Miami, FL",who:"Marcelo Claure is the founder of Claure Group, a family office and investment platform, and is best known as the former CEO of Sprint and former COO of SoftBank. Bolivian-born, he is one of the most prominent Latin American entrepreneurs and investors globally. As Sprint CEO he managed the most complex telecommunications transformation in US history before the T-Mobile merger. As SoftBank COO under Masayoshi Son he managed the Vision Fund's most troubled investments. His family office, Claure Group, is now an active investor and fund of funds with allocations across technology, sports, media, and emerging markets. He has been investing in Latin America specifically and has a vast personal network.",check:"Potential LP through Claure Group family office capital and his Latin American institutional network.",cares:"Latin American investment|Telecom and technology|Family office investing|Emerging markets|Sports and media",forRosc:"His Latin American institutional network and family office capital are underexplored LP channels for Rosc. His SoftBank connections also open the Japanese institutional ecosystem.",ask:"Whether Claure Group has appetite for defense-tech VC and warm introductions to his Latin American institutional investor network.",watchOut:"SoftBank Vision Fund losses are widely known — don't reference them.",intros:"Latin American institutional investor network — his relationships across LatAm capital markets are an underexplored LP geography for Rosc.|SoftBank alumni network — Masa Son's inner circle and the Vision Fund portfolio connections.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/marcelo-claure",topics:["LatAm tech","SoftBank network","Global PE","Telecom"]},
 {name:"Dennis Gada",title:"EVP, Global Head Banking & FS",org:"Infosys",cat:"AI",priority:"Worth a chat",loc:"New York, NY",who:"Dennis Gada is the Executive Vice President and Global Head of Financial Services at Infosys, one of the world's largest IT services companies with over $18 billion in annual revenue. In his role he leads Infosys's technology services for global banks, insurance companies, capital markets firms, and wealth managers. Infosys serves virtually every major financial institution globally with IT modernization, cloud transformation, and AI implementation — including a significant number of the institutional investors that Rosc is targeting as LPs. His relationships span the CIO and technology decision-makers at every major global bank and institutional asset manager.",check:"No direct check. Financial services institutional network and potential technology services relationship.",cares:"Financial services technology|IT modernization for banks|AI for financial institutions|Capital markets tech|Global IT services",forRosc:"Infosys's financial services clients include virtually every institutional investor Rosc is targeting as LPs. His CIO relationships at major banks and asset managers are warm introduction channels.",ask:"Warm introductions to CIOs at financial institutions in his client base who are also institutional LP prospects for Rosc.",watchOut:"Nothing significant.",intros:"Infosys financial services client network — CIOs and technology leaders at major banks, asset managers, and insurers who are also LP prospects for Rosc.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/dennis-gada",topics:["Financial services tech","AI implementation","Banking digital","India tech services"]},
 {name:"Amanda Li",title:"Co-founder & COO",org:"Banyan Infrastructure",cat:"AI",priority:"Worth a chat",loc:"San Francisco, CA",who:"Amanda Li is a Managing Director and Co-Head of the Technology, Media and Telecom Group at Evercore, one of Wall Street's most prestigious independent investment banks. In her TMT banking role she advises the most important technology companies in the world on M&A, capital raises, and strategic transactions — giving her deep personal relationships with technology company CEOs, boards, and the institutional investors who back them. Evercore is particularly well-regarded for its work with high-growth technology companies navigating complex transactions, and Li's TMT coverage spans the AI, cybersecurity, and deep tech companies that are directly relevant to Rosc's portfolio.",check:"No direct check. Technology company M&A and capital markets network.",cares:"Technology M&A|Capital markets|AI and deep tech deals|TMT sector|Investment banking",forRosc:"Her TMT banking relationships span the technology company CEOs and institutional investors that are both Rosc portfolio company exit pathways and LP prospects.",ask:"Whether any current Evercore TMT clients are defense-tech companies that could be Rosc portfolio candidates — and introductions to relevant technology investors.",watchOut:"Nothing significant.",intros:"Evercore TMT client network — technology company CEOs and institutional investors who are both exit pathways for Rosc portfolio companies and potential LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/amanda-li",topics:["Infrastructure finance","Software for finance","Clean energy infrastructure","Project finance"]},
 {name:"Jacqueline Poh",title:"CEO",org:"JTC Corporation (Singapore)",cat:"Policy",priority:"Worth a chat",loc:"Singapore",party:"Non-partisan (Singapore govt)",who:"Jacqueline Poh is the CEO of JTC Corporation (Jurong Town Corporation), Singapore's industrial estate developer and manager. She served as Managing Director of the Singapore Economic Development Board (EDB) from 2021 to March 2025, then moved to JTC as CEO from April 2025 (EDB), the government agency responsible for attracting foreign investment and developing Singapore's economy. She has a background spanning the Infocomm Media Development Authority and the National Research Foundation, giving her deep relationships across Singapore's technology, research, and investment ecosystem. The EDB is one of the most important government investment promotion agencies in Asia and has relationships with every major multinational and institutional investor with Singapore exposure. Her role makes her a gateway to Singapore's broader government institutional network beyond GIC and Temasek.",check:"Indirect — third Singapore sovereign touch-point beyond GIC and Temasek.",cares:"Singapore economic development|Foreign investment attraction|Technology ecosystem|Regional hub strategy|Government-industry partnerships",forRosc:"Third Singapore government relationship alongside GIC's Eric Wilmes and Temasek's Rohit Sipahimalani — reinforces Rosc's Singapore sovereign relationships.",ask:"Whether EDB has programs supporting Singapore-aligned defense technology investment and introductions to Singapore institutional capital.",watchOut:"Coordinate with the GIC and Temasek conversations — Singapore's sovereign institutions are deeply connected.",intros:"Singapore government institutional network — EDB, GIC, Temasek, and the National Research Foundation all operate within a closely connected Singapore government ecosystem.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/jacqueline-poh",topics:["Singapor  {name:"Yutaka Ito",title:"Commissioner",org:"Financial Services Agency, Japan",cat:"Policy",priority:"Worth a chat",loc:"Tokyo, Japan",party:"Non-partisan (Japan FSA)",who:"Yutaka Ito is a Managing Director at Japan's Government Pension Investment Fund (GPIF), the world's largest pension fund with approximately $1.7 trillion in assets. GPIF's alternatives allocation has been growing significantly, and Ito's role gives him direct oversight of a portion of that program. Japan is one of the most important US security allies globally — with US Forces Japan, the largest US overseas military presence outside of Europe — and Japanese institutional capital is increasingly seeking exposure to US defense and technology assets as the Japan-US security relationship deepens. GPIF has historically been very conservative but has been diversifying aggressively under recent leadership.",check:"Yes — GPIF LP. World's largest pension fund with a growing alternatives program. A GPIF commitment would be the single largest LP check Rosc could receive.",cares:"Japanese pension policy|Alternatives allocation|Japan-US security alliance|Long-term investing|ESG integration",forRosc:"The world's largest pension fund, with a growing alternatives allocation and a deepening Japan-US security alliance. A GPIF relationship is a multi-year investment but potentially transformative.",ask:"Understand GPIF's current alternatives program parameters and whether defense-tech VC sits within their current mandate.",watchOut:"GPIF moves very slowly — plant the seed and manage timeline expectations.",intros:"Japanese institutional investor network — his GPIF relationships span Japan's pension and insurance universe, all of which are potential Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/yutaka-ito",topics:["Japanese financial regulation","Insurance","Banking supervision","Digital assets"]},
 {name:"Emmanuel Acho",title:"Creator & Host",org:"Uncomfortable Conversations",cat:"Other",priority:"Context only",loc:"Los Angeles, CA",who:"Emmanuel Acho is a former NFL linebacker turned media personality, author, and entrepreneur. He played for the Philadelphia Eagles and Cleveland Browns before retiring and building a significant media presence through his YouTube series Uncomfortable Conversations with a Black Man, his bestselling book of the same name, and his role as a Fox Sports analyst and co-host of The Facility podcast. He is one of the most prominent young Black media figures in America and has parlayed his NFL platform into a broader conversation on race, leadership, and American identity. Nigerian-American, he is the son of a doctor and grew up in Dallas. His media presence and athlete network give him access to the UHNW sports and entertainment world.",check:"No direct check. Sports and entertainment UHNW network.",cares:"Race and social justice|Media and storytelling|NFL athlete network|Entrepreneurship|Faith and community",forRosc:"His UHNW sports and entertainment network includes athletes and media figures who are active alternative investors — a peripheral but real LP introduction channel.",ask:"Conversational relationship — any UHNW introductions that emerge are a bonus.",watchOut:"Nothing significant. Keep light.",intros:"NFL athlete and sports UHNW network — professional athletes and sports executives who are active alternative investors.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/emmanuel-acho",topics:["Race in America","Sports media","Cultural commentary"]},
 {name:"Wale Adeosun",title:"Founder & CEO",org:"Kuramo Capital",cat:"LP",priority:"Context only",loc:"New York, NY",who:"Wale Adeosun is the founder and CEO of Kuramo Capital Management, a New York-based alternative investment management firm focused on Africa. Kuramo raises institutional capital from US and global pension funds, endowments, and sovereign investors and deploys it across African private equity, infrastructure, and credit. African infrastructure and security investment is an increasingly important and underexplored dimension of the US-China strategic competition — China has built significant presence across African infrastructure, and US strategic investment in Africa is a national security priority. Adeosun has built one of the few credible institutional-quality vehicles for African alternatives investment.",check:"Potential LP introduction through Kuramo's institutional LP base — and Africa-focused co-investment channel.",cares:"African private markets|Emerging market investing|US-Africa investment|Infrastructure in Africa|Pension fund Africa allocation",forRosc:"African infrastructure and security investment as a US strategic priority — Kuramo's LP base and African network open a geography that is increasingly important to Rosc's thesis.",ask:"Whether Kuramo's LP base has appetite for defense-adjacent African infrastructure and whether there are co-investment opportunities.",watchOut:"Nothing significant.",intros:"Kuramo LP base — US pension funds and endowments that allocate to African alternatives, several of whom are Rosc LP prospects.|African government and infrastructure network — relationships across the continent that are relevant to US strategic infrastructure investment.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/wale-adeosun",topics:["Africa investing","Emerging markets","Sovereign capital"]},
 {name:"Yoni Assia",title:"Co-founder & CEO",org:"eToro",cat:"Other",priority:"Context only",loc:"Tel Aviv, Israel",who:"Yoni Assia is the co-founder and CEO of eToro (ETOR), the social trading and investment platform that went public on Nasdaq in May 2025 at a $4.2bn valuation, with over 40 million registered users globally. Israeli-born, he pioneered the concept of social and copy trading — allowing retail investors to automatically mirror the trades of more experienced investors. eToro has become one of the world's largest retail investment platforms and went public in 2024. Assia is deeply embedded in the Israeli technology and startup ecosystem and has built significant relationships across global fintech, retail investment, and the broader technology community. His platform gives him unique visibility into retail investor behavior and sentiment.",check:"No direct check. Israeli tech network and retail investment platform relationships.",cares:"Retail investing|Social trading|Israeli technology ecosystem|Fintech innovation|Crypto and digital assets",forRosc:"Israeli tech ecosystem introductions and fintech LP relationships — secondary value from a primarily conversational meeting.",ask:"Israeli defense-tech founder introductions through his Tel Aviv tech network.",watchOut:"Nothing significant.",intros:"Israeli tech entrepreneur network — his Tel Aviv relationships include defense-tech founders in the IDF alumni entrepreneurship community.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/yoni-assia",topics:["Fintech","Retail investing","Israeli tech","Crypto"]},
 {name:"Wale Ayeni",title:"Managing Partner",org:"Helios Digital Ventures",cat:"VC",priority:"Context only",loc:"Lagos, Nigeria",who:"Wale Ayeni is the Head of IFC Ventures, the venture capital arm of the International Finance Corporation — the private sector investment arm of the World Bank Group. IFC Ventures invests in early-stage technology companies across emerging markets, with a particular focus on fintech, agtech, and digital infrastructure. The IFC's mandate to catalyze private investment in developing economies creates natural overlap with Rosc's interest in strategic infrastructure investment in US-allied emerging markets. Nigeria-born, Ayeni brings deep relationships across African and Asian emerging market investment ecosystems alongside his World Bank institutional network.",check:"No direct check. IFC emerging market network and World Bank institutional relationships.",cares:"Emerging market venture|World Bank investment mandate|Fintech and digital infrastructure|Africa and Asia technology|Development finance",forRosc:"IFC's emerging market network opens investment intelligence on strategic geographies relevant to Rosc's Indo-Pacific and Africa theses.",ask:"IFC portfolio introductions to emerging market technology companies with defense-adjacent dual-use applications.",watchOut:"Nothing significant.",intros:"IFC and World Bank institutional network — development finance relationships across every US-allied emerging market that Rosc's thesis touches.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/wale-ayeni",topics:["African tech","Digital economy","PE in Africa"]},
 {name:"Clara Barby",title:"Senior Partner",org:"Just Climate",cat:"Other",priority:"Context only",loc:"London, UK",who:"Clara Barby is a Partner at Apax Partners, the global private equity firm with approximately $80 billion in AUM, where she leads the firm's impact measurement and ESG integration work. Before Apax she was CEO of Impact Management Project and worked at Bridges Fund Management — making her one of the most respected practitioners in impact investing measurement and ESG integration globally. Her work on impact standards has influenced how institutional LPs evaluate fund managers on ESG criteria. As PE firms increasingly face LP pressure on ESG and impact measurement, Barby's expertise is directly relevant to how Rosc frames its civilian benefit and dual-use narrative to ESG-sensitive institutional LPs.",check:"No direct check. Impact measurement intelligence for Rosc's LP framing.",cares:"Impact measurement|ESG integration in PE|Sustainable investment standards|Institutional LP ESG criteria|Impact investing frameworks",forRosc:"Her expertise on impact measurement and ESG criteria is directly relevant to how Rosc frames its civilian benefit narrative to ESG-sensitive institutional LPs.",ask:"Her perspective on how defense-tech funds can credibly frame dual-use civilian benefit in a way that satisfies ESG-sensitive institutional LP criteria.",watchOut:"Nothing significant.",intros:"Apax LP network — institutional investors that back Apax include pension funds and endowments who are also potential Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/clara-barby",topics:["Climate investing","Impact capital","Net zero","ESG"]},
 {name:"Laura Berman",title:"CEO",org:"Berman Institute",cat:"Other",priority:"Context only",loc:"Los Angeles, CA",who:"Laura Berman is a prominent sex and relationship therapist, author, and media personality known for her books and television appearances on relationship health and intimacy. She has appeared on Oprah, The Dr. Oz Show, and hosts her own podcast. She is also the founder of a wellness technology company. Her presence at Milken reflects the conference's wellness and human performance programming. While not directly relevant to Rosc's LP or deal sourcing agenda, Milken's wellness programming brings together a UHNW community of health-conscious executives and investors who may have peripheral LP relevance.",check:"No direct check. Peripheral UHNW wellness network.",cares:"Relationship health|Sexual wellness|Mental health|Women's empowerment|Wellness technology",forRosc:"Peripheral — the wellness UHNW community at Milken is a secondary LP introduction opportunity at most.",ask:"Conversational — no specific ask.",watchOut:"Nothing significant.",intros:"Milken wellness community — UHNW health-focused executives and investors who attend Milken's wellness programming.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/laura-berman",topics:["Relationships","Mental health","Media"]},
 {name:"Jon Clifton",title:"CEO",org:"Gallup",cat:"Other",priority:"Context only",loc:"Washington DC",who:"Jon Clifton is the CEO of Gallup, the world's most prominent public opinion research and analytics organization. He leads a 90-year-old institution that surveys populations in over 160 countries, providing data on wellbeing, employee engagement, political opinion, and economic sentiment that is used by governments, corporations, and institutional investors globally. Gallup's data on public sentiment toward defense spending, national security priorities, and geopolitical attitudes directly informs the macro environment that Rosc's thesis operates in. Clifton is also the author of Blind Spot, on the global wellbeing crisis.",check:"No direct check. Macro public sentiment intelligence and institutional network.",cares:"Public opinion research|Global wellbeing|Employee engagement|Data and analytics|Leadership development",forRosc:"Gallup's data on public attitudes toward defense, national security, and geopolitical risk is macro intelligence directly relevant to Rosc's LP narrative.",ask:"Whether Gallup has defense and national security sentiment data that could inform Rosc Institute's research and LP narrative.",watchOut:"Nothing significant.",intros:"Gallup corporate and government client network — the global executives and government officials who consume Gallup's data are a peripheral LP introduction channel.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/jon-clifton",topics:["Public opinion","Workplace analytics","Global wellbeing","Data and polling"]},
 {name:"Iván Duque Márquez",title:"Former President",org:"Colombia",cat:"Policy",priority:"Context only",loc:"Bogotá, Colombia",party:"R (Colombian Conservative)",who:"Iván Duque Márquez served as President of Colombia from 2018 to 2022, and before that as a Senator and a prominent figure at the Inter-American Development Bank. During his presidency he focused on security, counter-narcotics, and economic modernization, building close relationships with the US government, the IMF, and the World Bank. Since leaving office he has been active in international policy forums and is now an advisor and speaker on Latin American security, economic development, and democracy. His relationships span the Latin American political establishment, US national security officials who worked with him on counter-narcotics, and the institutional investors who deploy capital across the region.",check:"No direct check. Latin American policy network and US national security relationships.",cares:"Colombian and LatAm security|Counter-narcotics|Democracy and governance|Economic development|US-Latin America relations",forRosc:"His US national security and Latin American government relationships are a secondary deal sourcing and LP introduction channel for Rosc's emerging market strategy.",ask:"Latin American defense and security investment intelligence and introductions to LatAm institutional investors.",watchOut:"Nothing significant.",intros:"Latin American government and security network — his relationships span the US national security officials and LatAm government leaders relevant to Rosc's emerging market defense thesis.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/ivan-duque-marquez",topics:["Colombia security","Latin America","Drug policy","Regional development"]},
 {name:"John Hope Bryant",title:"Founder, Chairman & CEO",org:"Operation HOPE",cat:"Other",priority:"Context only",loc:"Atlanta, GA",who:"John Hope Bryant is the founder and CEO of Operation HOPE, the largest not-for-profit provider of financial literacy and economic empowerment programs in the United States, reaching over 4 million people annually. He is also a bestselling author and prominent voice on economic inclusion, capitalism, and financial literacy. A self-made entrepreneur who grew up in poverty in South Los Angeles, he has built relationships with every US president since Clinton, major bank CEOs, and the corporate establishment. He sits on numerous corporate boards and advisory committees. His relationships include the corporate CEOs and philanthropic foundations that are a peripheral LP introduction channel.",check:"No direct check. Corporate CEO and philanthropic network.",cares:"Financial literacy|Economic inclusion|Poverty and wealth|Corporate social responsibility|Black entrepreneurship",forRosc:"His corporate CEO and foundation relationships are a peripheral LP introduction channel — secondary value from a primarily conversational meeting.",ask:"Conversational relationship — any warm introductions to corporate investors or foundations are a bonus.",watchOut:"Nothing significant.",intros:"Corporate CEO and banking network — his Operation HOPE relationships include the CEOs of America's largest banks and corporations.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/john-hope-bryant",topics:["Financial inclusion","Economic empowerment","Community development"]},
 {name:"Aubrey Hruby",title:"Co-founder & GP",org:"Tofino Capital",cat:"VC",priority:"Context only",loc:"Washington DC",who:"Aubrey Hruby is a co-founder of Africa Expert Network and a Senior Fellow at the Atlantic Council's Africa Center. She is one of the foremost US experts on African business and investment, having spent her career advising US companies, investors, and government agencies on opportunities and risks across the African continent. She has been a regular advisor to the US government on African investment policy and has deep personal relationships across African business, government, and institutional investment communities. Africa is increasingly a theater of US-China strategic competition, with China's Belt and Road Initiative having built significant infrastructure presence that the US is only now beginning to counter.",check:"No direct check. Africa investment intelligence and US-Africa strategic network.",cares:"African investment|US-Africa policy|China in Africa|Atlantic Council networks|Business development in Africa",forRosc:"Africa as a theater of US-China strategic competition — her network opens intelligence on the most strategically relevant African infrastructure and security investment opportunities.",ask:"Her read on the most strategically important US defense and infrastructure investment opportunities in Africa — and introductions to relevant African institutional investors.",watchOut:"Nothing significant.",intros:"Atlantic Council Africa network — US government officials and African leaders working on US-Africa strategic investment.|African institutional investor network — the pension funds and sovereign vehicles deploying capital across Africa.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/aubrey-hruby",topics:["Africa VC","Policy and investing","African entrepreneurship"]},
 {name:"Sanjeev Krishnan",title:"Managing Partner",org:"S2G Investments",cat:"VC",priority:"Context only",loc:"Chicago, IL",who:"Sanjeev Krishnan is the Chief Investment Officer and Managing Director of US International Development Finance Corporation (DFC), the US government's development finance institution with a $60 billion portfolio. DFC was created by the BUILD Act in 2018 specifically to counter China's Belt and Road Initiative by offering US-backed financing for infrastructure, technology, and development projects in emerging markets. In his role Krishnan manages the US government's most direct tool for competing with China in strategic emerging market investment. DFC's portfolio spans energy, digital infrastructure, healthcare, and small business financing across the Indo-Pacific, Africa, and Latin America — all regions where US strategic investment has both development and national security objectives.",check:"No direct check — but DFC co-investment alongside Rosc portfolio companies is a live possibility in emerging market dual-use infrastructure.",cares:"US development finance|Counter-BRI strategy|Indo-Pacific investment|Emerging market infrastructure|US strategic competition with China",forRosc:"DFC is the US government's primary tool for countering China's strategic infrastructure investment. Co-investment alongside Rosc in allied emerging markets is a genuine possibility.",ask:"Whether DFC has appetite for co-investment alongside Rosc in defense-adjacent dual-use infrastructure in Indo-Pacific and African markets.",watchOut:"Nothing significant.",intros:"DFC partner government network — his relationships span the US embassy and government teams in every country DFC operates in, the most comprehensive emerging market government introduction channel.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/sanjeev-krishnan",topics:["Food security","Climate tech","Ocean health"]},
 {name:"Neal Mohan",title:"CEO",org:"YouTube",cat:"Other",priority:"Context only",loc:"San Francisco, CA",who:"Neal Mohan is the CEO of YouTube, the world's largest video platform with over 2.5 billion monthly active users. He succeeded Susan Wojcicki in 2023 after serving as Chief Product Officer. Before YouTube he was a senior executive at DoubleClick before its Google acquisition. YouTube is one of the most important global information platforms and its content ecosystem spans education, news, military analysis, and national security commentary. More relevant for Rosc is YouTube/Google's parent Alphabet's relationship with the US defense community — Alphabet has been navigating its relationship with DoD carefully following the Project Maven controversy, and Mohan's position gives him direct visibility into that strategic relationship.",check:"No direct check. Alphabet/Google network and media platform relationship.",cares:"YouTube platform growth|Creator economy|Content moderation|AI and video|Digital advertising",forRosc:"YouTube media relationship for Rosc Institute content distribution — a Rosc Institute YouTube presence could reach institutional LP audiences directly.",ask:"Whether YouTube has creator or institutional channel programs that could support Rosc Institute's content distribution.",watchOut:"Google/Alphabet's complicated DoD relationship following Project Maven — don't probe.",intros:"Alphabet executive network — his Alphabet/Google relationships span the most important technology executives and government relationships in Silicon Valley.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/neal-mohan",topics:["Video platforms","Content moderation","Creator economy","AI and media"]},
 {name:"Nigel Morris",title:"Managing Partner",org:"QED Investors",cat:"VC",priority:"Context only",loc:"Arlington, VA",who:"Nigel Morris is the co-founder of Capital One and a Managing Partner of QED Investors, a leading fintech-focused venture capital firm with approximately $1 billion in AUM. He co-founded Capital One in 1994, building it into one of the largest US banks through data-driven credit analysis — a genuinely pioneering application of data science to financial services. QED has become one of the most respected fintech venture funds globally, backing companies across payments, lending, insurance technology, and financial infrastructure. British-born, Morris has operated across US and UK financial services for his entire career and has deep relationships in both ecosystems.",check:"Potential LP through QED's institutional LP base and Capital One network.",cares:"Fintech investing|Data-driven credit|Financial services innovation|Venture capital|UK-US financial relationships",forRosc:"QED's institutional LP base and Morris's Capital One network include institutional investors who are potential Rosc LP prospects. Fintech and defense-tech have growing overlap in payment systems and identity.",ask:"Whether QED's LP base has appetite for defense-tech VC and warm introductions to relevant institutional investors.",watchOut:"Nothing significant.",intros:"QED Investors LP base — institutional investors backing a top-tier fintech VC fund, several of whom are potential Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/nigel-morris",topics:["Fintech VC","Financial services","Credit technology"]},

 {name:"Samaila Zubairu",title:"President & CEO",org:"Africa Finance Corporation",cat:"LP",priority:"Context only",loc:"Lagos, Nigeria",who:"Samaila Zubairu is the President and CEO of Africa Finance Corporation (AFC), a multilateral development finance institution focused on infrastructure investment across Africa with approximately $10 billion in assets. AFC is one of the most important institutional capital pools for African infrastructure, investing in energy, transport, telecoms, and heavy industry across the continent. Nigerian-born, Zubairu has built AFC into the leading pan-African infrastructure finance institution. As US-China strategic competition in Africa intensifies — particularly around critical minerals, port infrastructure, and telecommunications — AFC's portfolio and network are increasingly relevant to US national security interests in the region.",check:"Potential co-LP or co-investor in African dual-use infrastructure with strategic US interests.",cares:"African infrastructure finance|Pan-African development|Critical minerals|Energy and transport|US-Africa investment",forRosc:"AFC's African infrastructure portfolio increasingly overlaps with US strategic interests — critical minerals, port infrastructure, and telecoms are all defense-relevant. Co-investment is a live possibility.",ask:"Whether AFC has appetite for co-investment alongside US strategic capital in defense-adjacent African infrastructure.",watchOut:"Nothing significant.",intros:"African infrastructure network — his relationships span every major African government, infrastructure company, and institutional investor on the continent.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/samaila-zubairu",topics:["African infrastructure","Multilateral development","Energy in Africa"]},
 {name:"Tiffany Benjamin",title:"CEO",org:"Humana Foundation",cat:"LP",priority:"Context only",loc:"Louisville, KY",who:"Tiffany Benjamin is a Managing Director at Goldman Sachs within their Sustainable Finance Group, working on environmental, social, and governance investment products and impact measurement across Goldman's global client base. She has been a prominent voice on sustainable finance and impact investing within one of the world's most important financial institutions. Her role at Goldman Sachs places her at the intersection of ESG investing criteria, institutional LP standards, and the largest financial network in the world. Her work on how institutional investors evaluate ESG credentials is directly relevant to how Rosc frames its civilian benefit narrative to ESG-sensitive allocators.",check:"No direct check. Goldman network and ESG framing intelligence.",cares:"Sustainable finance|ESG investing|Impact measurement|Goldman platform|Climate and social investing",forRosc:"Her Goldman network and ESG expertise are useful for both LP introductions and understanding how to frame Rosc's civilian benefit narrative to ESG-sensitive institutional allocators.",ask:"Her perspective on how defense-tech funds can credibly position dual-use civilian benefit for ESG-sensitive institutional LPs.",watchOut:"Nothing significant.",intros:"Goldman Sachs institutional network — her Goldman relationships include institutional investors who are potential Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/tiffany-benjamin",topics:["Health philanthropy","Community health"]},
 
 {name:"Karan Bilimoria",title:"Crossbench Peer; Chairman ICC UK",org:"House of Lords",cat:"Policy",priority:"Strong target",loc:"London, UK",party:"Crossbench (UK Lords)",who:"Karan Bilimoria is the founder of Cobra Beer, which he built from scratch into a major UK drinks brand before entering the House of Lords as a crossbench peer — Lord Bilimoria of Chelsea. He is a prominent British-Indian businessman and life peer, known for his entrepreneurship advocacy, India-UK bridge-building, and business leadership roles including as past President of the CBI (Confederation of British Industry). His House of Lords seat and UK establishment relationships make him a natural bridge to British institutional capital, the UK defense investment ecosystem, and the India-UK business and government relationship — all relevant to Rosc's European and Indo-Pacific LP strategy.",check:"Indirect — bridge to UK institutional capital and India-UK business networks.",cares:"UK-India relations|British entrepreneurship|House of Lords policy|Trade and investment|Drinks and hospitality industry",forRosc:"UK institutional capital bridge and India-UK relationship network at a moment when both countries are dramatically increasing defense investment.",ask:"Warm introductions to UK institutional investors and British-Indian business network members with defense-tech investment interest.",watchOut:"Nothing significant.",intros:"UK institutional investor network — his House of Lords and CBI relationships span British pension funds and institutional investors.|India-UK business network — British-Indian executives and investors bridging two of the most important markets for Rosc's Indo-Pacific LP strategy.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/karan-bilimoria",topics:["UK-India trade","House of Lords","International commerce","Entrepreneurship"]},
 {name:"Nicola Blackwood",title:"Chair",org:"Health Data Research Service",cat:"Policy",priority:"Worth a chat",loc:"London, UK",party:"Conservative (UK)",who:"Nicola Blackwood is the Baroness Blackwood of North Oxford, a member of the UK House of Lords and a former Chair of Genomics England, the government-owned company that manages the world's largest whole-genome sequencing program. She is a life science and health technology policy expert with deep relationships across the UK government, NHS, and the genomics and biotech ecosystem. Her genomics expertise sits at the intersection of civilian health technology and national security — genomic data security, biodefense, and forensic genomics are all areas where the UK's world-leading genomics program has direct defense applications.",check:"No direct check. UK biotech and genomics network.",cares:"Genomics and health data|UK life sciences policy|NHS technology|Biodefense|House of Lords policy",forRosc:"UK genomics and biodefense network — her Genomics England relationships open the most advanced national genomics program in the world, with direct defense biosecurity applications.",ask:"UK genomics and biodefense deal sourcing — which UK genomics companies have the most credible national security and defense applications.",watchOut:"Nothing significant.",intros:"Genomics England and UK biotech network — the most advanced national genomics ecosystem in the world, with direct defense biosecurity applications.|UK House of Lords policy network — her parliamentary relationships span UK defense, health, and technology policy.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/nicola-blackwood",topics:["Health data","UK policy","Data governance","AI regulation"]},
 {name:"Jordan Bramble",title:"CEO & Co-founder",org:"Antares Nuclear Inc.",cat:"AI",priority:"Must meet",loc:"USA",who:"Jordan Bramble is the CEO and co-founder of Antares Nuclear, a startup developing dual-use nuclear propulsion and energy technology with applications spanning defense energy security, space propulsion, and advanced power generation. Nuclear propulsion — particularly compact reactors suitable for naval vessels, space systems, and remote military installations — represents one of the most strategically important dual-use technology domains of the next decade, with direct relevance to US military energy independence and space superiority. Bramble is part of the new generation of deep-tech founders applying nuclear physics to defense and national security in ways that were previously the exclusive domain of national laboratories and major defense contractors. Antares operates at the intersection of two of the most important defense investment themes: advanced nuclear and autonomous military systems.",check:"No — potential portfolio company, not an LP.",cares:"Advanced nuclear propulsion|Defense energy independence|Space propulsion systems|Dual-use nuclear technology|Deep-tech commercialization",forRosc:"Direct portfolio company candidate. Antares is the archetype of what Rosc invests in — deep-tech, dual-use, defense-adjacent, at the frontier of nuclear propulsion.",ask:"Full picture on Antares' funding status, technology maturity, team, and current investor conversations — assess co-investment fit.",watchOut:"Early stage — assess carefully before committing.",intros:"Advanced nuclear ecosystem — his network spans national lab researchers, DoD energy security officials, and deep-tech founders in the nuclear space.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/jordan-bramble",topics:["Advanced nuclear propulsion","Dual-use energy tech","Defense energy security","Nuclear space systems"]},
 {name:"Greg Brown",title:"Chairman & CEO",org:"Motorola Solutions",cat:"Defense",priority:"Must meet",loc:"Chicago, IL",who:"Greg Brown has led Motorola Solutions as Chairman and CEO since 2008, transforming what was a struggling consumer electronics spinoff into a dominant $10bn+ revenue company focused exclusively on public safety AI, mission-critical communications, and AI-powered surveillance and security systems for law enforcement, defense, and government. Motorola Solutions provides the radio systems, video analytics platforms, dispatch software, and AI-driven command center technology used by police departments, fire departments, military units, border security agencies, and emergency response organizations across the US and globally. The company is perhaps the most important infrastructure provider in the public safety and dual-use AI surveillance space — with technology embedded in virtually every major US city's law enforcement and emergency response operations. Brown himself is a veteran technology CEO who has executed one of the most successful corporate transformations in recent history and has deep relationships across DoD procurement, DHS, federal law enforcement, and major city governments.",check:"Potentially — strategic LP or co-investor in adjacent national security technology companies.",cares:"Public safety AI|Mission-critical communications|Government technology procurement|AI and law enforcement|Defense contracting",forRosc:"Motorola Solutions is the most scaled dual-use company in Rosc's thesis space. Brown's government contracting network spans DoD, DHS, and federal law enforcement — direct portfolio company deal sourcing.",ask:"Strategic LP conversation or warm introductions to defense procurement and DHS contacts relevant to Rosc's portfolio companies.",watchOut:"Motorola's AI surveillance products are subject to civil liberties criticism. Lead with public safety mission and emergency response, not surveillance.",intros:"DoD and DHS proc {name:"Joseph Baratta",title:"Global Head, PE Strategies",org:"Blackstone",cat:"VC",priority:"Strong target",loc:"New York, NY",who:"Joseph Baratta is the Global Head of Private Equity Strategies at Blackstone and a member of Blackstone's Board of Directors. He joined Blackstone in 1998, helped establish its European PE business in London in 2001, and became Global Head of Private Equity in 2012. He has overseen Blackstone PE through a period of extraordinary growth — the firm now manages over $1 trillion in total AUM, making it the world's largest alternative asset manager. Blackstone's PE portfolio spans virtually every sector, with particularly significant exposure to government services, defense infrastructure, and technology. As a board member and head of PE strategies, Baratta has relationships spanning every major LP, co-investor, and corporate leader that Blackstone works with globally.",check:"Potential LP introduction through Blackstone's LP base — not a direct Rosc LP himself.",cares:"Private equity strategy|Blackstone portfolio|Government services exposure|Institutional LP relationships|PE industry trends",forRosc:"Blackstone's LP base is the most comprehensive institutional LP network in alternatives. Baratta's personal relationships span every major pension, sovereign, and endowment globally.",ask:"Warm introductions to Blackstone LP relationships with defense-tech VC appetite and perspective on the current defense investing moment.",watchOut:"Nothing significant.",intros:"Blackstone LP network — the most comprehensive institutional LP address book in alternatives, spanning $1 trillion in client relationships.|Blackstone portfolio defense-adjacent companies — his PE portfolio includes companies directly relevant to Rosc's deal sourcing.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/joseph-baratta",topics:["Private equity","Defense-adjacent investing","Blackstone network","Co-investment"]},
