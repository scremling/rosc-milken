 {name:"Victor Oppleman",title:"CEO",org:"Eldridge Defense",cat:"Defense",priority:"Must meet",loc:"Greenwich, CT",who:"Victor Oppleman leads Eldridge Defense, the dedicated national security and defense technology investment vertical of Eldridge Industries — Todd Boehly's multi-billion dollar investment holding company that also owns Chelsea FC, partial stakes in the LA Dodgers, insurance, media, and financial services businesses. Eldridge Defense represents the firm's deliberate move into national security technology as a standalone investment focus, building a portfolio of defense-tech companies. Oppleman has a background in network security — he is the author of Extreme Exploits, a foundational text in advanced network security, and has spent decades as a specialized consultant to major government and commercial organizations on security and vulnerability assessment. He is building Eldridge Defense from the ground up, which means he is simultaneously a peer building something comparable to Rosc and a potential co-investor with access to Eldridge's much larger balance sheet.",check:"Co-investment partner and potential LP through Eldridge's broader capital base — not a direct fund LP.",cares:"Defense-tech deal sourcing|National security technology|Cybersecurity investing|Building Eldridge's defense portfolio|Patient capital deployment",forRosc:"Building exactly what Rosc is building, inside Eldridge's larger capital structure. Co-investment, deal flow sharing, and a formal Rosc-Eldridge partnership are all worth exploring.",ask:"Co-investment on specific portfolio companies and deal flow sharing agreement between Rosc and Eldridge Defense.",watchOut:"Nothing significant.",intros:"Todd Boehly — Eldridge Chairman and CEO. The ultimate capital owner above Oppleman; a Boehly relationship opens Eldridge's full balance sheet.|Eldridge portfolio network — investments across financial services, media, and sports create unusual LP introduction opportunities.",link:"https://www.linkedin.com/in/victor-oppleman",topics:["Defense-tech investing","National security startups","Dual-use technology","Patient capital","Private defense investment"]},
 {name:"Eric Wilmes",title:"President, Americas",org:"GIC",cat:"LP",subcat:"SWF",priority:"Must meet",loc:"New York, NY",party:"Non-partisan (GIC)",who:"Eric Wilmes leads GIC's Americas investment operations from San Francisco and New York. GIC — the Government of Singapore Investment Corporation — is one of the world's largest and most sophisticated sovereign wealth funds, managing approximately $770 billion in assets across public equities, fixed income, real estate, private equity, and infrastructure. GIC was established in 1981 to manage Singapore's foreign reserves and operates with a long-term, risk-diversified mandate. Unlike Temasek, which invests Singapore's government-owned commercial assets, GIC manages Singapore's official foreign reserves — they are separate entities with distinct mandates. Wilmes joined GIC in 2011 after a career at Friedman Fleischer & Lowe, Centre Partners, and Morgan Stanley. He holds a BA magna cum laude in Economics from Williams College and has served on the boards of UKG, Ancestry, Multiplan, PetSmart/Chewy, and HUB International.",check:"Yes — priority SWF LP. GIC has active allocations to defense-adjacent and deep technology. First commitment likely $50–150M.",cares:"Americas private equity|Defense-tech allocation|AI infrastructure|Deep technology|Long-duration sovereign investment",forRosc:"Singapore's largest SWF — sophisticated, patient, and making active defense-tech allocations. GIC and Temasek together represent over $1 trillion of Singaporean sovereign capital.",ask:"Full LP pitch — thesis, portfolio, team, fee structure, and co-investment access. Treat as a formal pitch meeting.",watchOut:"GIC and Temasek are entirely separate entities with distinct mandates — treat as two different LP conversations, not one Singapore sovereign relationship.",intros:"Rohit Sipahimalani — CIO, Temasek. Separate Singapore sovereign entity but a natural peer introduction.|Frederick Teo — CEO, GenZero (Temasek-backed). Opens the broader Singapore sovereign ecosystem.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/eric-wilmes",topics:["Singapore sovereign capital","Americas investment","Defense-tech","AI infrastructure","Private equity"]},
 {name:"Alok Agarwal",title:"Senior Advisor",org:"Reliance Industries",cat:"LP",priority:"Strong target",loc:"Mumbai, India",who:"Alok Agarwal is a Senior Advisor at Reliance Industries, India's largest conglomerate spanning energy, Jio telecom, digital services, and retail — the empire built by Mukesh Ambani, one of the world's wealthiest individuals. Reliance is the most strategically important private company in India, with interests touching virtually every sector of the Indian economy and growing ambitions in technology and AI. Agarwal is a senior figure within that ecosystem with relationships spanning Indian government, institutional capital, and the country's growing technology sector. India is one of the most important geopolitical and investment markets for Rosc's thesis — a key US ally in the Indo-Pacific, a rapidly growing AI ecosystem, and an increasingly significant source of institutional capital.",check:"Indirect — potential bridge to Reliance-linked capital and Indian institutional investors.",cares:"India-US relations|Indian digital economy|Reliance strategy|Indo-Pacific investment|Energy transition",forRosc:"Bridge into India's largest private capital base and government relationships at a moment when India-US defense and technology cooperation is at a historic high.",ask:"Whether Reliance or Ambani family office capital has any appetite for defense-tech VC exposure, and warm introductions into India's institutional investor base.",watchOut:"Keep exploratory — understand appetite before pitching.",intros:"Mukesh Ambani network — India's most influential private sector relationships spanning government, institutional capital, and technology.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/alok-agarwal",topics:["India digital economy","Reliance strategy","India-US relations","Energy transition"]},
 {name:"Anu Aiyengar",title:"Global Head, M&A",org:"J.P. Morgan",cat:"LP",subcat:"FamilyOffice",priority:"Strong target",loc:"New York, NY",who:"Anu Aiyengar is the Global Head of M&A at J.P. Morgan, one of Wall Street's most senior and respected dealmakers. She has led or advised on some of the largest transactions in corporate history and in doing so has built deep personal relationships with the CEOs, family offices, and ultra-high-net-worth clients that make up JPMorgan's most important advisory relationships. As Global Head of M&A she sits at the center of JP Morgan's most significant client relationships — including every major family office and UHNW individual that JPMorgan serves. She was born in India and has been at JPMorgan for over two decades, rising to one of the firm's most senior positions.",check:"Indirect — gateway to JPMorgan's UHNW and family office client base, which is exactly Rosc's LP demographic.",cares:"M&A strategy|Family office relationships|UHNW client network|Corporate transactions|Capital markets",forRosc:"JPMorgan's private bank and advisory network covers the most concentrated pool of deployable private capital in the world. One warm introduction from her opens UHNW doors that cold outreach cannot.",ask:"Warm introductions to JPM family office clients with defense-tech or national security investment interest.",watchOut:"Nothing significant.",intros:"JPMorgan family office and UHNW clients — the most concentrated pool of deployable private capital in the world, exactly Rosc's LP demographic.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/anu-aiyengar",topics:["M&A strategy","Family office relationships","Corporate transactions","Capital markets"]},
 {name:"Paul Atkins",title:"Chairman",org:"US SEC",cat:"Policy",priority:"Strong target",loc:"Washington DC",party:"R (Trump appointee)",who:"Paul Atkins is the Chairman of the US Securities and Exchange Commission, appointed by President Trump. A lawyer (Vanderbilt Law) and former SEC Commissioner 2002-2008, most recently CEO of his own risk management firm Patomak Global Partners, Atkins is pro-market, deregulatory, and crypto-friendly — a significant departure from the more restrictive posture of recent SEC leadership. His regulatory stance directly affects Rosc's ability to raise capital from certain investor classes, structure portfolio company exits, and navigate emerging manager rules. He is one of the most important regulatory figures for private capital markets in the US, and his policy direction under the Trump administration is broadly favorable to alternative asset managers and emerging fund managers.",check:"No direct check. Critical regulatory intelligence and relationship.",cares:"Private markets deregulation|Emerging manager rules|Capital formation|Crypto regulation|Securities law reform",forRosc:"His regulatory stance directly affects Rosc's ability to raise capital and structure exits. A relationship here is compliance intelligence and policy relationship capital.",ask:"Understand his current priorities on private markets and emerging manager rules — and build a channel for regulatory intelligence as his agenda develops.",watchOut:"R (Trump appointee) — keep off domestic politics entirely.",intros:"SEC staff and commissioner network — regulatory relationships relevant to Rosc's fund structure and portfolio company capital markets activity.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/paul-atkins",topics:["Securities regulation","Private markets","Capital formation","Emerging manager rules"]},
 {name:"Vlad Barbalat",title:"President & CIO",org:"Liberty Mutual Investments",cat:"LP",priority:"Strong target",loc:"Boston, MA",who:"Vlad Barbalat is the President and CIO of Liberty Mutual Investments, the asset management arm of Liberty Mutual — one of the largest US property and casualty insurers. He leads a multi-billion dollar alternatives program that has historically included allocations to emerging managers across private equity, hedge funds, and real assets. Insurance company investment arms are particularly attractive as LP prospects because they manage patient, long-duration capital that is well-suited to illiquid alternatives, and they tend to be less politically constrained than public pension funds. Liberty Mutual is Boston-based, making it a natural relationship for a US-founded emerging manager.",check:"Yes — insurance LP. Liberty Mutual has allocated to emerging managers. First commitment likely $10–25M.",cares:"Insurance float management|Alternatives allocation|Emerging manager programs|Risk-adjusted returns|Long-duration capital",forRosc:"Insurance LP prospect with an active emerging manager program and patient capital well-suited to Rosc's fund structure.",ask:"Understand Liberty Mutual's current alternatives program size, emerging manager criteria, and whether Rosc's thesis and stage fit their current program.",watchOut:"Nothing significant.",intros:"Insurance LP peer network — his relationships span other insurance CIOs who are all potential Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/vlad-barbalat",topics:["Insurance investing","Alternatives","Emerging managers","Risk management"]},
 {name:"Ashley Baum",title:"Managing Director",org:"Teacher Retirement System of Texas",cat:"LP",priority:"Strong target",loc:"Austin, TX",who:"Ashley Baum is a Managing Director at the Teacher Retirement System of Texas, one of the largest US pension funds with approximately $200 billion in assets under management. She manages the alternatives allocation for TRS Texas, overseeing a significant and actively growing program that includes emerging manager mandates. Texas pension capital is particularly attractive because the state's political environment is considerably more favorable to defense-tech investing than California or New York — there is no domestic political pressure against allocating to defense-related funds, and the fund's board has shown appetite for differentiated thesis managers.",check:"Yes — major pension LP. TRS Texas has an active emerging manager program. First commitment likely $25–75M.",cares:"Pension alternatives allocation|Emerging manager programs|Defense-tech exposure|Texas political environment|Long-term returns",forRosc:"Major pension LP with an active emerging manager program in a politically favorable state. Defense-tech investing faces zero friction at TRS Texas.",ask:"Understand TRS Texas's current emerging manager program criteria — specifically whether defense-tech gets a dedicated allocation or sits in a broader alternatives bucket.",watchOut:"Nothing significant.",intros:"Texas pension network — her relationships span the Texas public pension ecosystem, all of which share the same favorable political environment for defense investing.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/ashley-baum",topics:["Pension alternatives","Emerging managers","Infrastructure","Defense-tech"]},
 {name:"Sian Beilock",title:"President",org:"Dartmouth College",cat:"LP",priority:"Strong target",loc:"Hanover, NH",who:"Sian Beilock is the President of Dartmouth College, one of the Ivy League's most research-intensive universities. A cognitive scientist by training — she is the author of Choke, a book on performance under pressure — she was appointed Dartmouth's first female president in 2023. Dartmouth has strong and deep DARPA and Department of Defense research relationships, with significant defense-funded research programs across engineering, computer science, and applied sciences. The Dartmouth endowment stands at approximately $8.3 billion with an active alternatives program. University endowments represent a particularly attractive LP category because they have long investment horizons, genuine appetite for emerging managers, and defense research programs that can serve as deal sourcing pipelines simultaneously.",check:"Yes — university endowment LP (~$8bn). Active alternatives program with emerging manager exposure. Two conversations in one: LP and defense research deal sourcing.",cares:"University research partnerships|DARPA and DoD funding|Endowment performance|Emerging manager programs|STEM and defense research",forRosc:"Endowment LP and defense research deal sourcing pipeline simultaneously — two distinct value streams from one relationship.",ask:"Understand Dartmouth's endowment emerging manager criteria and explore their DARPA/DoD research relationships as a portfolio company pipeline.",watchOut:"Nothing significant.",intros:"Dartmouth DARPA and DoD research network — faculty and lab directors with direct connections to defense technology programs relevant to Rosc's portfolio.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/sian-beilock",topics:["University leadership","DARPA research","Endowment investing","Defense research"]},
 {name:"Emily Bertsche",title:"MD, Private Markets",org:"Kresge Foundation",cat:"LP",priority:"Strong target",loc:"Troy, MI",who:"Emily Bertsche is a Managing Director of Private Markets at the Kresge Foundation, one of the most respected private foundations in the US with an endowment of approximately $4 billion. She oversees the foundation's private market investments and has been actively expanding their alternatives program, including meaningful exposure to impact-aligned private equity and emerging managers. Kresge focuses on climate, communities, and arts — but increasingly frames impact through a systemic lens that can accommodate dual-use technology with genuine civilian benefit. Foundation capital tends to move more slowly than commercial capital, but the impact alignment framing makes it a natural fit for Rosc's civilian benefit narrative around defense-tech.",check:"Yes — foundation LP with active emerging manager program. First commitment likely $5–15M. Longer decision cycle.",cares:"Impact-aligned investing|Emerging manager programs|Foundation mission alignment|Private markets expansion|Long-term systemic impact",forRosc:"Foundation LP with genuine emerging manager appetite. The civilian benefit framing of dual-use tech can resonate strongly with impact-oriented allocators.",ask:"Understand Kresge's current alternatives criteria and whether Rosc's dual-use civilian benefit framing fits their impact mandate.",watchOut:"Decision cycles are long for foundations — plant the seed, don't expect quick movement.",intros:"Foundation LP peer network — her relationships span other foundation investment directors who are all potential Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/emily-bertsche",topics:["Foundation investing","Impact-aligned PE","Emerging managers","Private markets"]},
 {name:"Peter Beske Nielsen",title:"Head, Global Wealth & Evergreen",org:"EQT Group",cat:"VC",priority:"Strong target",loc:"Stockholm, Sweden",who:"Peter Beske Nielsen is the Head of Global Wealth and Evergreen at EQT Group, one of Europe's most prominent and sophisticated private equity firms with approximately €200 billion in AUM. In his role he leads EQT's wealth channel — the team responsible for raising capital from UHNW individuals, family offices, and private banks globally — as well as EQT's evergreen fund structures, which are designed to provide long-duration capital with more flexible liquidity terms. EQT has significant exposure to defense infrastructure and energy security assets in its broader portfolio, making the firm a natural co-investment and LP partner for Rosc. He manages the capital formation side, meaning he is the person who controls access to EQT's UHNW co-investment relationships.",check:"Potential co-LP or co-invest — EQT's wealth channel manages UHNW capital that could co-invest alongside Rosc.",cares:"UHNW capital formation|Evergreen fund structures|European PE|Defense infrastructure exposure|Wealth channel development",forRosc:"EQT co-invests in defense infrastructure and manages UHNW capital formation. His network opens both co-investment opportunities and UHNW LP prospects.",ask:"Whether EQT's wealth channel creates co-LP or co-investment opportunities with Rosc on overlapping defense-tech deals.",watchOut:"Nothing significant.",intros:"EQT UHNW co-investor network — the high-net-worth individuals and family offices that co-invest alongside EQT, who are natural Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/peter-beske-nielsen",topics:["Wealth channel","Evergreen funds","UHNW investing","EQT strategy"]},
 {name:"Xavier Bettel",title:"Deputy PM & Foreign Minister",org:"Grand Duchy of Luxembourg",cat:"Policy",priority:"Strong target",loc:"Luxembourg City",party:"Liberal (Luxembourg DP)",who:"Xavier Bettel served as Prime Minister of Luxembourg from 2013 to 2023 — one of Europe's longest-serving heads of government — and is now Deputy Prime Minister and Foreign Minister. He is one of the most prominent liberal politicians in Europe, known internationally as the first EU head of government to marry a same-sex partner. Luxembourg is the most important fund domicile in Europe, home to the bulk of European investment funds and a critical jurisdiction for any manager seeking European institutional capital. Bettel's government relationships span every major European capital, and his institutional network includes the European Investment Bank and major Luxembourg-based institutional investors. At a moment of rapidly increasing European defense investment, his relationships are strategically valuable.",check:"Indirect — bridge to European government capital and Luxembourg fund domicile relationships.",cares:"EU foreign policy|Luxembourg financial center|European defense investment|Fintech regulation|Transatlantic relations",forRosc:"Luxembourg is the key EU fund domicile. His relationships open European government capital and the institutional infrastructure Rosc needs for its European LP strategy.",ask:"Introductions to Luxembourg-based institutional investors and guidance on EU fund structuring for Rosc's European capital raise.",watchOut:"Liberal (Luxembourg DP) — keep off conservative European politics.",intros:"European institutional capital network — Luxembourg-based investment funds and the EIB network are the core of European LP capital for alternative managers.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/xavier-bettel",topics:["EU foreign policy","Luxembourg financial center","European defense","Fintech regulation"]},
 {name:"Gautam Bhandari",title:"Global CIO",org:"I Squared Capital",cat:"LP",priority:"Strong target",loc:"New York, NY",who:"Gautam Bhandari is the Global CIO of I Squared Capital, a major infrastructure-focused private equity firm with approximately $40 billion in AUM. I Squared invests in energy, utilities, telecom infrastructure, and transportation across North America, Europe, and Asia. Infrastructure private equity has natural overlap with Rosc's thesis in two specific vectors: energy security infrastructure (which is inherently dual-use in a defense context) and communications infrastructure (which underpins both civilian and military operations). Bhandari manages the investment strategy across all of I Squared's global operations and has deep relationships across the institutional LP base that backs major infrastructure PE funds.",check:"Potential co-LP or co-invest on infrastructure-adjacent deals. Not a direct fund LP.",cares:"Infrastructure PE|Energy security|Telecom infrastructure|Critical infrastructure|Global emerging markets",forRosc:"Infrastructure capital with energy security and dual-use communications potential. Co-LP or co-invest on the infrastructure layer of Rosc's defense thesis.",ask:"Whether I Squared's energy security and communications infrastructure portfolio creates co-investment opportunities alongside Rosc's defense-tech deals.",watchOut:"Nothing significant.",intros:"I Squared LP base — major institutional investors backing a top-tier infrastructure PE fund, several of whom could be Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/gautam-bhandari",topics:["Infrastructure PE","Energy security","Telecom infrastructure","Critical infrastructure"]},
 {name:"Kamal Bhatia",title:"President & CEO",org:"Principal Asset Management",cat:"LP",priority:"Strong target",loc:"Des Moines, IA",who:"Kamal Bhatia is President and CEO of Principal Asset Management, the global investment management business of Principal Financial Group, responsible for $651 billion in assets under management. He became CEO in February 2024, succeeding Pat Halter. Prior to his current role, Bhatia was global head of investments at Principal. Before joining Principal in 2019, he was CEO at OC Private Capital, a joint venture between OppenheimerFunds and Carlyle Group, focused on private credit. His background spans institutional asset management, multi-asset strategy, and retirement investment solutions across more than 80 global markets.",check:"Indirect — Invesco alternatives program is a potential LP channel.",cares:"Retail and institutional asset management|ETF and fund distribution|Alternatives expansion|Capital markets|Distribution partnerships",forRosc:"Bridge into Invesco's alternatives program and its broad institutional distribution network.",ask:"Whether Invesco's alternatives platform has appetite for defense-tech VC fund exposure and what the right entry point would be.",watchOut:"Traditional asset management background — meet him where he is before pitching alternatives.",intros:"Invesco alternatives team — the people managing the private markets build-out at a major global asset manager.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/kamal-bhatia",topics:["Institutional AM","Retirement capital","Alternatives","Emerging managers"]},
 {name:"Todd Boehly",title:"Chairman & CEO",org:"Eldridge Industries",cat:"VC",priority:"Strong target",loc:"Greenwich, CT",who:"Todd Boehly is the co-founder, Chairman, and CEO of Eldridge Industries — a sprawling multi-billion dollar holding company spanning insurance, financial services, media, sports, and now defense technology through Eldridge Defense. He is also co-owner of Chelsea FC and partial owner of the Los Angeles Dodgers and LA Lakers. Boehly built his fortune through a combination of insurance float investing, media acquisitions, and sports franchise ownership — a capital model that prioritizes patient, long-duration deployment. His move into defense technology through Eldridge Defense is deliberate and reflects a genuine conviction that national security tech is one of the defining investment themes of the next decade. He is the ultimate capital decision-maker above Victor Oppleman at Eldridge Defense.",check:"Yes — strategic LP or co-invest through Eldridge's balance sheet. Patient, long-duration capital. Could be a major check if conviction is established.",cares:"Defense-tech investing|Insurance float capital deployment|Sports and media|Long-duration capital allocation|Building Eldridge's national security portfolio",forRosc:"Eldridge's balance sheet is patient, long-duration capital that is ideally suited to defense-tech VC. Boehly is the decision-maker above Oppleman — this is the relationship that opens Eldridge's full capability.",ask:"Strategic LP or co-invest conversation — understand Eldridge's defense-tech thesis and how Rosc fits alongside Eldridge Defense.",watchOut:"Nothing significant.",intros:"Victor Oppleman — Head of Eldridge Defense. His direct report building the defense portfolio; Boehly can facilitate the relationship.|Eldridge co-investors — his insurance and financial services network includes major institutional investors.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/todd-boehly",topics:["Sports investing","Media","Insurance capital","Defense investing"]},
 {name:"Michael Brandmeyer",title:"Global Head & CIO, External Investing",org:"Goldman Sachs AM",cat:"LP",priority:"Strong target",loc:"New York, NY",who:"Michael Brandmeyer is a senior executive at Goldman Sachs Asset Management, where he leads the external investing and alternatives business. He has spent his career building Goldman's relationships with institutional investors and managing the firm's own principal investment activities. Goldman Sachs Asset Management manages over $2 trillion and has deep relationships with virtually every major institutional investor in the world — pension funds, sovereign wealth funds, endowments, insurance companies, and family offices. Brandmeyer sits at the center of Goldman's institutional capital relationships and has a particularly deep understanding of how emerging managers can access Goldman's LP network.",check:"Indirect — Goldman GSAM has an emerging manager seeding program and manages fund-of-funds vehicles that allocate to emerging managers.",cares:"Institutional capital allocation|Emerging manager programs|Alternatives|Goldman client relationships|Fund-of-funds",forRosc:"Goldman's institutional network is one of the most valuable LP introduction channels that exists. A warm Goldman introduction opens doors that cold outreach cannot.",ask:"Whether GSAM's emerging manager or seeding program has appetite for defense-tech VC and what the right internal contact would be.",watchOut:"Nothing significant.",intros:"Goldman GSAM emerging manager team — the specific people who evaluate and commit to first-time and second-time fund managers.|Goldman institutional LP relationships — virtually every major pension, SWF, and endowment is a Goldman client.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/michael-brandmeyer",topics:["Manager selection","Fund-of-funds","Emerging managers","Goldman alternatives"]},
 {name:"Thomas Buberl",title:"CEO",org:"AXA Group",cat:"LP",priority:"Strong target",loc:"Paris, France",who:"Thomas Buberl is the German-born CEO of AXA Group (mandate renewal pending shareholder vote at April 30, 2026 AGM — expected to be approved for a further four-year term), one of the world's largest insurance and asset management companies with over €1 trillion in assets under management and significant exposure to private markets. He started his career at BCG, then held roles at Winterthur and Zurich Insurance before becoming AXA Germany CEO in 2012 and Group CEO in September 2016. His mandate was renewed in 2026 for another four years. Franco-German, he has led AXA since 2016 and has been one of the most articulate European business leaders on the intersection of geopolitical risk, climate transition, and long-term investment strategy. AXA Investment Managers, AXA's asset management arm, has an active alternatives program and invests in private equity, infrastructure, real assets, and increasingly in dual-use and defense-adjacent technology. European insurance companies are among the most motivated LP candidates for defense-tech as European rearmament creates genuine business risk and investment opportunity simultaneously.",check:"Yes — major European insurance LP. AXA IM has active alternatives and private markets allocations. First commitment could be €25–100M.",cares:"European insurance capital|AXA alternatives program|Geopolitical risk|Climate and defense intersection|Long-duration capital deployment",forRosc:"One of Europe's largest insurance capital pools with a sophisticated alternatives program and genuine motivation to understand defense-tech investment as European rearmament accelerates.",ask:"Whether AXA IM has a dedicated defense-tech allocation or whether Rosc sits in a broader alternatives bucket — and who the right LP contact at AXA IM is.",watchOut:"AXA has historically had ESG commitments that excluded defense. His tenure has softened this — but approach carefully.",intros:"AXA IM alternatives team — the investment professionals who actually evaluate and commit to private market fund managers.|European insurance LP network — his peer CEOs at Allianz, Zurich, and Munich Re are all potential Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/thomas-buberl",topics:["Insurance investment","European capital","Climate risk","Alternatives allocation"]},
 {name:"Pascal Cagni",title:"France Investment Ambassador",org:"Business France",cat:"Policy",priority:"Strong target",loc:"Paris, France",party:"Non-partisan (French govt)",who:"Pascal Cagni is a French technology investor and former Vice President and General Manager of Apple Europe, Middle East, India, and Africa — one of the most senior technology executives in European corporate history. He built Apple's European business from a small operation into a dominant market presence during the iPod, iPhone, and iPad era. He now runs C4 Ventures, a European technology investment firm, and serves on several corporate boards. He is deeply embedded in the European technology ecosystem and has significant relationships with European government and institutional capital given his prominence as one of Europe's most successful technology executives. He is also a former French government technology advisor.",check:"Potential LP or co-invest through C4 Ventures or his personal network.",cares:"European technology investment|Deep tech|Digital sovereignty|France-US tech relations|Corporate board relationships",forRosc:"Bridge into France's technology establishment and European institutional capital — his government and corporate relationships span exactly the audience Rosc needs for its European LP strategy.",ask:"Co-investment conversation on European defense-tech companies and introductions to French and European institutional LP prospects.",watchOut:"Nothing significant.",intros:"French government technology network — his former government advisory role means he knows the people shaping France's defense-tech investment policy.|European technology LP ecosystem — his C4 Ventures co-investors and corporate board relationships.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/pascal-cagni",topics:["French tech ecosystem","AI sovereignty","European investment","France industrial policy"]},
 {name:"Sanjay Chawla",title:"EVP & CIO",org:"FM Global",cat:"LP",priority:"Strong target",loc:"Providence, RI",who:"Sanjay Chawla is the CIO of Abu Dhabi Investment Council (ADIC), one of Abu Dhabi's sovereign investment vehicles. ADIC manages a significant multi-asset portfolio on behalf of the Abu Dhabi government and is part of the broader Abu Dhabi sovereign wealth ecosystem alongside ADIA and Lunate. Gulf sovereign capital is among the most motivated institutional capital for defense-tech investing — Abu Dhabi has genuine national security interests in next-generation military technology, strong motivation to diversify away from oil revenues, and increasingly sophisticated investment capabilities. Chawla oversees the investment strategy and manages ADIC's asset allocation across public and private markets.",check:"Yes — Abu Dhabi sovereign LP. ADIC is smaller than ADIA but moves with meaningful capital. First commitment could be $25–75M.",cares:"Abu Dhabi sovereign investment|Multi-asset allocation|Defense-tech exposure|Gulf diversification|Private markets",forRosc:"Abu Dhabi sovereign capital actively seeking defense-tech VC exposure. Part of the broader Gulf sovereign cluster at this conference.",ask:"Full LP pitch — thesis, portfolio, team, fee structure, and co-investment access.",watchOut:"Coordinate with Lunate (Hussain) and QIA (Pirzada) conversations — avoid contradictory messaging across Gulf sovereigns.",intros:"Abu Dhabi sovereign network — his relationships span the broader Abu Dhabi investment ecosystem including ADIA and Lunate.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/sanjay-chawla",topics:["Insurance investing","Risk management","Alternatives","Long-term capital"]},
 {name:"Diana Choyleva",title:"Founder & Chief Economist",org:"Enodo Economics",cat:"Geo",priority:"Strong target",loc:"London, UK",party:"Non-partisan (independent)",who:"Diana Choyleva is Chief Economist at Enodo Economics, a specialized research house focused exclusively on China and its implications for global markets and geopolitics. She is one of the most respected independent China analysts in institutional investment circles, with a track record of making calls on China's economy that deviate sharply from consensus and have proven correct. Her client base includes major hedge funds, sovereign wealth funds, and institutional investors who pay for her independent research precisely because it is not shaped by client relationship considerations. At a moment when US-China strategic competition is the central driver of Rosc's investment thesis, her independent analytical perspective is genuinely valuable.",check:"No direct check. Research and intellectual relationship.",cares:"China economic trajectory|US-China strategic competition|China policy risk|Emerging market capital flows|Independent macro research",forRosc:"Best independent China analyst available to institutional investors. Her research on China's economic trajectory directly informs Rosc's LP narrative around strategic competition.",ask:"Whether there is a Rosc Institute collaboration — a contributed piece or co-hosted research discussion on China's economic and military trajectory.",watchOut:"Nothing significant.",intros:"Institutional investor client base — her research clients are the hedge funds and SWFs that are natural Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/diana-choyleva",topics:["China economy","Xi Jinping policy","US-China decoupling","Taiwan risk"]},
 {name:"Steven Ciobo",title:"Managing Director",org:"Stonepeak",cat:"LP",priority:"Strong target",loc:"New York, NY",who:"Steven Ciobo is a former Australian government minister who held multiple cabinet positions including Minister for Trade, Tourism, and Investment and Minister for International Development. He now works in the private sector with a focus on trade, investment, and Indo-Pacific business relationships. As a former Australian minister with deep relationships in the US-Australia alliance — including the AUKUS partnership — he is a relevant connection for Rosc's Australian LP strategy and its broader Indo-Pacific thesis. Australia is spending unprecedented amounts on defense as part of AUKUS, creating a significant flow of defense capital that benefits allied technology investors.",check:"Indirect — bridge to Australian government and institutional capital relationships.",cares:"AUKUS implementation|Indo-Pacific investment|Australia-US alliance|Trade and investment policy|Australian defense spending",forRosc:"Bridge into Australian government and AUKUS-adjacent relationships at a moment when Australia is the most rapidly increasing defense spender among US allies.",ask:"Warm introductions to Australian institutional investors and government-adjacent capital interested in allied defense-tech VC.",watchOut:"Nothing significant.",intros:"Australian government network — his ministerial relationships span the people shaping Australia's AUKUS investment and defense procurement decisions.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/steven-ciobo",topics:["Infrastructure PE","Australian trade","Indo-Pacific investment","Energy infrastructure"]},
 {name:"Roger Crandall",title:"Chairman, President & CEO",org:"MassMutual",cat:"LP",priority:"Strong target",loc:"Springfield, MA",who:"Roger Crandall is the Chairman, President, and CEO of MassMutual — one of America's largest and most respected mutual life insurance companies with approximately $300 billion in assets under management. MassMutual has one of the most sophisticated alternatives programs among US insurance companies, with significant allocations to private equity, venture capital, and real assets. Insurance companies like MassMutual are among the most attractive LP prospects for emerging managers because they manage patient, long-duration capital, have less political constraint than public pension funds, and are actively expanding alternatives to improve returns in a challenging yield environment. MassMutual also runs a venture capital arm — MassMutual Ventures — that invests directly in early-stage technology companies.",check:"Yes — major insurance LP. MassMutual has active VC and PE alternatives programs. First commitment likely $10–30M.",cares:"Insurance alternatives allocation|Long-duration capital|Venture investment|Policyholder returns|Patient capital deployment",forRosc:"Sophisticated insurance LP with both a long-duration balance sheet and a direct VC arm. Two distinct entry points: fund LP and co-investor through MassMutual Ventures.",ask:"Understand MassMutual's emerging manager criteria and whether MassMutual Ventures has appetite for defense-tech co-investment.",watchOut:"Nothing significant.",intros:"MassMutual Ventures team — the direct VC arm that co-invests in early-stage technology, a natural co-investment partner for Rosc portfolio companies.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/roger-crandall",topics:["Mutual insurance capital","Long-term investing","Alternatives","Emerging managers"]},
 {name:"Michael Crow",title:"President",org:"Arizona State University",cat:"LP",priority:"Strong target",loc:"Tempe, AZ",who:"Michael Crow has led Arizona State University as President since 2002, transforming it from a regional state school into what is arguably the most innovative and research-productive public university in the United States. Under his leadership ASU has become a powerhouse for defense research, cybersecurity, AI, and applied technology — with major DARPA, DoD, and intelligence community research programs. The ASU endowment stands at approximately $1 billion with growing alternatives exposure. More importantly for Rosc, Crow has built ASU into a genuine defense research hub with direct pipeline relationships to the startup ecosystem emerging from that research. He is one of the most consequential university leaders in America and has strong relationships across the DoD research and technology communities.",check:"Yes — university endowment LP (smaller at ~$1bn) but more importantly a defense research deal sourcing pipeline.",cares:"University research partnerships|Defense and intelligence research|ASU innovation ecosystem|DARPA programs|Applied technology commercialization",forRosc:"ASU's defense and intelligence research programs are a direct deal sourcing pipeline. Crow can open the spinout and commercialization relationships that produce exactly the companies Rosc invests in.",ask:"Formal research partnership between Rosc and ASU's defense technology programs — and introductions to the founders emerging from those programs.",watchOut:"Nothing significant.",intros:"ASU defense research faculty and spinout founders — the people commercializing DoD-funded research directly into the defense-tech startup ecosystem.|DARPA program managers — his relationships span the DoD research funding community.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/michael-crow",topics:["Research university","DARPA partnerships","Defense research","AI in education"]},
 {name:"Alexa Dell",title:"Advisor",org:"Michael and Susan Dell Foundation",cat:"LP",subcat:"FamilyOffice",priority:"Strong target",loc:"Austin, TX",who:"Alexa Dell is a philanthropist, advisor, and investor based in Los Angeles with a focus on children, families, and multigenerational giving. She is the daughter of Michael Dell, founder and CEO of Dell Technologies and one of the world's wealthiest individuals with a net worth exceeding $150 billion. She serves as an Advisor to the Michael and Susan Dell Foundation, which focuses on causes related to health and education — particularly children and families. She co-founded The Outloud Group, a social commerce platform focused on women entrepreneurs, and has worked as an advisor to Bumble. Her family office, MSD Capital — later renamed DFO Management — is one of the most active and sophisticated family investment operations in the world, managing the Dell family's wealth across private equity, real assets, and venture investments.",check:"Potential family office LP — MSD/DFO manages $10bn+ in Dell family capital with active alternatives allocation.",cares:"Children and family philanthropy|Multigenerational giving|Women entrepreneurship|Health and education|Family office investing",forRosc:"The Dell family office is one of the most sophisticated and well-resourced family investment operations in the world. An Alexa relationship is a potential bridge to DFO's LP decision-makers.",ask:"Whether DFO Management has any appetite for defense-tech VC and who the right contact within the Dell family investment operation would be.",watchOut:"Lead with philanthropy and shared values — don't open with a fund pitch.",intros:"DFO Management — the Dell family office and its investment team who manage $10bn+ in family capital with active alternatives exposure.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/alexa-dell",topics:["Family office investing","Tech entrepreneurship","Impact investing","Dell ecosystem"]},
 {name:"Joseph Dominguez",title:"President & CEO",org:"Constellation Energy",cat:"Defense",priority:"Strong target",loc:"Baltimore, MD",who:"Joseph Dominguez is the President and CEO of Constellation Energy, America's largest producer of carbon-free electricity and the operator of the nation's largest nuclear fleet — 21 reactors across 12 states producing approximately 10% of US nuclear power. Constellation is one of the most strategically important energy companies in the US, supplying power to the federal government, military installations, and data centers including major hyperscaler AI facilities. Nuclear energy has undergone a dramatic revaluation as AI data center demand has driven a reassessment of reliable baseload power, and Constellation sits at the center of this transition. Dominguez has led the company through its separation from Exelon and its repositioning as the premier clean and reliable energy provider for AI and defense infrastructure.",check:"Potential strategic LP or co-invest in energy security and nuclear technology companies.",cares:"Nuclear energy renaissance|AI data center power|Defense energy security|Carbon-free electricity|Energy infrastructure investment",forRosc:"Nuclear energy and defense energy security are central to Rosc's thesis. Dominguez's perspective on energy requirements for AI and defense infrastructure is essential intelligence for the portfolio.",ask:"Strategic partnership — Constellation as a customer and validator for Rosc's energy security and nuclear portfolio companies.",watchOut:"Nothing significant.",intros:"Federal government and DoD energy procurement network — Constellation supplies power to military installations and government facilities across the US.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/joseph-dominguez",topics:["Nuclear energy","AI data center power","Defense energy security","Grid reliability"]},
 {name:"Bruce Flatt",title:"CEO",org:"Brookfield Corporation",cat:"LP",priority:"Strong target",loc:"Toronto, Canada",who:"Bruce Flatt is the CEO of Brookfield Asset Management — one of the largest alternative asset managers in the world with over $1 trillion in AUM spanning infrastructure, real estate, private equity, credit, and renewable energy. Canadian, he has led Brookfield since 2002 and is widely considered one of the greatest capital allocators of his generation. Brookfield's infrastructure funds invest in critical infrastructure globally — ports, pipelines, utilities, communications networks, and transportation — much of which is dual-use in a defense and national security context. Brookfield is also one of the most active managers of defense-adjacent real assets, including energy infrastructure critical to military logistics.",check:"Potential co-invest or LP on infrastructure-layer defense deals. Brookfield manages patient capital perfectly suited to long-duration defense investments.",cares:"Critical infrastructure investment|Real assets|Long-duration capital|Global infrastructure|Energy and utilities",forRosc:"Brookfield's infrastructure portfolio and LP relationships represent enormous co-investment and LP introduction potential for Rosc's energy security and infrastructure thesis.",ask:"Whether Brookfield sees co-investment opportunities on the infrastructure layer of Rosc's defense thesis, and whether any Brookfield LP relationships could be warm introductions for Rosc.",watchOut:"Nothing significant.",intros:"Brookfield LP base — sovereign wealth funds, pension funds, and insurance companies globally that back Brookfield's infrastructure funds, many of whom are natural Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/bruce-flatt",topics:["Alternative asset management","Infrastructure","Energy transition","Defense infrastructure"]},
 {name:"Per Franzen",title:"CEO & Managing Partner",org:"EQT Group",cat:"VC",priority:"Strong target",loc:"Stockholm, Sweden",who:"Per Franzen is the Head of Americas at EQT Group, overseeing the Swedish private equity firm's North American investment operations. EQT is one of Europe's most prominent and successful private equity firms, managing approximately €200 billion in assets across buyout, growth, infrastructure, real estate, and venture strategies. EQT's infrastructure funds have significant exposure to defense-adjacent assets including energy, communications, and transportation infrastructure. Franzen manages EQT's US deal flow, LP relationships, and strategic partnerships from North America — making him the key relationship for any US-based manager seeking to partner with EQT on deal flow or LP sharing.",check:"Co-invest and LP introduction potential through EQT's Americas platform.",cares:"Private equity deal flow|Americas infrastructure|LP relationships|Defense-adjacent infrastructure|European PE in US markets",forRosc:"EQT's infrastructure portfolio creates natural co-investment overlap with Rosc's energy security and communications infrastructure thesis.",ask:"Whether EQT's Americas deal flow creates co-investment opportunities with Rosc and whether any EQT LP relationships would be warm introductions.",watchOut:"Nothing significant.",intros:"EQT LP base — Scandinavian and European pension funds and sovereign investors who back EQT are natural Rosc LP prospects for European fundraising.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/per-franzen",topics:["European PE","Defense infrastructure","Energy security","EQT strategy"]},
 {name:"Brad Gerstner",title:"Founder & CEO",org:"Altimeter Capital",cat:"VC",priority:"Strong target",loc:"San Francisco, CA",who:"Brad Gerstner is the founder and CEO of Altimeter Capital, a technology-focused hedge fund and venture firm managing approximately $15 billion. He was an early and influential investor in Snowflake, Uber, ByteDance, and Airbnb — with Snowflake's IPO generating one of the largest single-fund returns in hedge fund history. He has become one of Silicon Valley's most prominent and outspoken technology investors, co-founding TechNet and becoming a vocal advocate for tech policy reform. More recently he has articulated a strong view that AI and defense-tech represent the most important investment opportunities of the decade, and Altimeter has been actively building exposure to national security technology companies.",check:"Potential co-invest or LP — Altimeter has been moving aggressively into defense-tech.",cares:"AI infrastructure investment|Defense-tech VC|Technology policy|Silicon Valley-DC bridge|Enterprise software",forRosc:"One of the most respected technology investors now moving aggressively into defense-tech. Co-investment, deal flow sharing, and LP introduction potential are all high.",ask:"Co-investment conversation on specific defense-tech deals and whether there is an Altimeter-Rosc deal flow sharing arrangement worth pursuing.",watchOut:"Nothing significant.",intros:"Altimeter LP base — major technology-focused institutional investors who are now also interested in defense-tech.|Silicon Valley defense-tech community — his network spans the intersection of tech and national security that is Rosc's core deal flow territory.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/brad-gerstner",topics:["AI investing","Tech growth equity","National security tech","AI policy"]},
 {name:"Elad Gil",title:"CEO",org:"Gil Capital",cat:"AI",priority:"Strong target",loc:"San Francisco, CA",who:"Elad Gil is one of Silicon Valley's most successful and respected technology investors — a serial entrepreneur, angel investor, and author of High Growth Handbook. He has been an early investor in Airbnb, Stripe, Square, Coinbase, Instacart, and dozens of other companies that became defining technology businesses. He has backed more unicorns per investment than virtually any investor of his generation. More recently Gil has been an early and vocal investor in defense-tech and AI infrastructure companies, recognizing national security technology as one of the most important emerging investment verticals. His signal value in the technology community is extremely high — his endorsement of a fund or investment thesis carries significant weight with other top technology investors.",check:"Potential LP or co-invest — high conviction, moves fast, writes large checks personally.",cares:"AI infrastructure|Defense-tech VC|Founder-friendly investing|Technology policy|High-growth company building",forRosc:"One of the most respected technology investors now investing in defense-tech. His LP commitment would send a powerful signal to other technology investors and validate Rosc's thesis with the Silicon Valley community.",ask:"LP conversation — his personal LP commitment and co-investment on specific defense-tech deals.",watchOut:"Nothing significant. Moves fast if he likes what he sees.",intros:"Top-tier technology LP network — his co-investors and LP relationships include the most respected technology investors in Silicon Valley.|Defense-tech founder community — his portfolio companies include early-stage defense-tech founders who are potential deal flow for Rosc.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/elad-gil",topics:["AI investing","Early-stage VC","Silicon Valley","OpenAI ecosystem"]},
 {name:"Will Goodwin",title:"Co-CIO",org:"New Zealand Superannuation Fund",cat:"LP",subcat:"SWF",priority:"Strong target",loc:"Auckland, New Zealand",party:"Non-partisan (NZ Super)",who:"Will Goodwin is the Co-Chief Investment Officer of New Zealand Superannuation Fund, New Zealand's sovereign wealth fund managing approximately NZ$70 billion. The NZ Super Fund is one of the most sophisticated and commercially progressive sovereign funds in the Asia-Pacific region — it was one of the first sovereign funds globally to invest in private equity, venture capital, and alternatives at scale. Goodwin runs investment strategy alongside the CIO and has been expanding the fund's exposure to technology and AI. New Zealand is a key Five Eyes partner and has strong strategic alignment with both Australia and the United States on defense and intelligence cooperation, making NZ Super a natural LP candidate for allied defense-tech investment.",check:"Yes — sovereign LP. NZ Super has active alternatives and VC allocations. First commitment likely NZ$25–50M.",cares:"Sovereign wealth management|Alternatives expansion|Indo-Pacific strategy|Five Eyes intelligence alliance|Long-term returns",forRosc:"Five Eyes sovereign capital with sophisticated alternatives capability and strategic alignment on allied defense-tech. Natural companion to the Future Fund relationship.",ask:"LP pitch — NZ Super fund commitment. Use Raphael Arndt (Future Fund) as a shared peer reference point.",watchOut:"Nothing significant.",intros:"Raphael Arndt — CEO, Future Fund. They are peer sovereigns in the same region who know each other well; Goodwin can reinforce the Australian sovereign cluster.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/will-goodwin",topics:["NZ sovereign wealth","Alternatives","Deep tech","Emerging managers"]},
 {name:"Jens Hanefeld",title:"Ambassador",org:"Embassy of Germany to the US",cat:"Policy",priority:"Strong target",loc:"Washington DC",party:"Non-partisan (German ambassador)",who:"Jens Hanefeld is the German Ambassador to the United States — Germany's senior diplomatic representative in Washington DC at a historic moment for the US-Germany relationship. He took up the Washington posting in August 2025, returning for his third posting in DC. He previously spent a decade (2014-2024) as Senior VP for International, European, and Trade Policy at Volkswagen, then briefly as Ambassador to Ethiopia and the African Union. He took up the Washington posting as Germany is undergoing its most significant defense and strategic reorientation since reunification. The Zeitenwende — Germany's pivot to sustained defense investment and European strategic autonomy — means Hanefeld is managing a relationship of enormous importance to both countries. He is the third point of the German cluster at this conference alongside Martin Blessing (Chancellor's investment envoy) and Jörg Goschin (KfW Capital), and together they represent the full spectrum of Germany's sovereign defense investment capability.",check:"Indirect — gateway to German government and institutional capital relationships.",cares:"US-Germany alliance|German Zeitenwende|European defense investment|Transatlantic relations|German institutional capital",forRosc:"The most senior German diplomatic relationship at this conference. His endorsement of Rosc as a US-allied defense-tech fund would carry weight with German sovereign and institutional investors.",ask:"Introductions to German institutional investors and government-backed defense capital vehicles seeking US-allied defense-tech VC exposure.",watchOut:"Nothing significant.",intros:"German institutional investor network — his diplomatic relationships include the pension funds, insurance companies, and sovereign vehicles that hold German institutional capital.|Martin Blessing and Jörg Goschin — the German investment cluster; he can reinforce those relationships from the diplomatic angle.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/jens-hanefeld",topics:["US-Germany relations","German defense policy","NATO","Zeitenwende"]},
 {name:"Amos Hochstein",title:"Managing Partner",org:"TWG Global",cat:"Defense",priority:"Strong target",loc:"Washington DC",who:"Amos Hochstein served as Senior Advisor for Energy Security on the National Security Council under President Biden — the White House's point person for global energy security, pipeline diplomacy, and critical infrastructure protection. He was the key US negotiator on European energy security after Russia's invasion of Ukraine, working to secure alternative gas supplies for Europe and reduce European dependence on Russian energy. He is now a co-chair of TWG Global alongside Thomas Tull, bringing his government energy security network into a private investment context. His relationships span European energy ministers, Gulf energy officials, and the senior US government officials who manage critical infrastructure protection.",check:"Potential co-invest through TWG Global's national security and energy security platform.",cares:"Energy security|Critical infrastructure|Pipeline diplomacy|European energy independence|National security investment",forRosc:"The most senior former US government energy security official now in private investment. His network bridges government intelligence, European energy policy, and Gulf relationships.",ask:"TWG Global co-investment on energy security and critical infrastructure deals, and introductions to European energy ministry relationships.",watchOut:"Nothing significant.",intros:"European energy ministry network — his White House energy security role means he knows the people making European energy security investment decisions.|Thomas Tull — his TWG Global co-chair; the Tull-Hochstein relationship opens the full TWG platform.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/amos-hochstein",topics:["Energy security","Pipeline diplomacy","LNG","Middle East energy","NSC experience"]},
 {name:"Barbara Humpton",title:"CEO",org:"USA Rare Earth",cat:"Defense",priority:"Strong target",loc:"Texas",who:"Barbara Humpton is the CEO of USA Rare Earth, a critical minerals company focused on establishing domestic supply chains for rare earth elements essential to national security. She previously served as President and CEO of Siemens USA for over seven years (2018-2025), leading a 50,000-person operation with over $23 billion in revenue. She retired from Siemens in October 2025 and joined USA Rare Earth immediately thereafter. Before Siemens she was at Lockheed Martin and Booz Allen Hamilton. Wake Forest undergraduate (mathematics). A true defense-industrial crossover: deep government contracting expertise now applied to the rare earth supply chain problemnd digital twin technology for defense applications. As Siemens USA CEO Humpton oversees a business deeply embedded in US federal government and defense infrastructure, with contracts across DoD, DHS, and critical infrastructure agencies. She is a prominent voice on industrial competitiveness, manufacturing, and the US-Germany economic relationship. She sits at the intersection of German and American industrial defense interests in a way that makes her uniquely valuable to Rosc's transatlantic thesis.",check:"Potential strategic LP or co-invest — Siemens has a corporate venture arm and strategic investment capability.",cares:"Industrial AI|Smart infrastructure|US-Germany industrial partnership|Defense-adjacent manufacturing|Digital transformation",forRosc:"Siemens' deep US defense and government infrastructure presence makes her a strategic partner for Rosc's portfolio companies navigating government procurement.",ask:"Strategic partnership — Siemens as a customer and validator for Rosc's industrial and infrastructure technology portfolio companies.",watchOut:"Nothing significant.",intros:"Siemens government customer network — her relationships span the federal agencies and defense contractors that are Rosc's portfolio companies' most important customers.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/barbara-humpton",topics:["Critical minerals","US-China supply chain","Rare earth mining","Defense supply chain"]},
 {name:"Karen Karniol-Tambour",title:"Co-CIO",org:"Bridgewater Associates",cat:"LP",priority:"Strong target",loc:"Westport, CT",who:"Karen Karniol-Tambour is Co-Chief Investment Officer at Bridgewater Associates, the world's largest hedge fund with approximately $150 billion in AUM. She joined Bridgewater in 2006 and rose to become one of Ray Dalio's most trusted investment thinkers, now running the firm alongside Co-CEO Nir Bar Dea. Bridgewater is famous for its macro investing framework — All Weather and Pure Alpha — and its intellectual approach to understanding economic and geopolitical cycles. Karniol-Tambour has been a prominent public voice on geopolitical investing, inflation, and the structural shifts driving defense spending globally. Her analytical framework maps closely to Rosc's investment thesis and she has the intellectual profile to engage seriously on why the current moment in defense technology is a once-in-a-generation inflection.",check:"Potential LP — Bridgewater manages institutional money and could allocate to a fund with credible macro-geopolitical thesis alignment.",cares:"Macro investing|Geopolitical risk|Inflation and real assets|Defense spending cycles|Great power competition",forRosc:"One of the most intellectually credible validators of Rosc's macro thesis. A Bridgewater LP relationship would signal seriousness to every other institutional investor.",ask:"Whether Bridgewater has appetite for a defense-tech VC fund with a credible geopolitical macro thesis and what that process looks like.",watchOut:"Nothing significant. Match her intellectual register — she will probe the thesis rigorously.",intros:"Bridgewater LP base — the most sophisticated institutional investors in the world, several of whom could be warm Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/karen-karniol-tambour",topics:["Macro investing","Geopolitical risk","Great power competition","China allocation"]},
 {name:"Maria Korsnick",title:"President & CEO",org:"Nuclear Energy Institute",cat:"Defense",priority:"Strong target",loc:"Washington DC",who:"Maria Korsnick is the President and CEO of the Nuclear Energy Institute, the principal trade and policy organization for the US commercial nuclear energy industry. She is the most senior advocate for nuclear energy at the national policy level, with direct relationships across NRC, DOE, Congress, and the White House. Nuclear energy is one of the most strategically important intersections of Rosc's thesis — dual-use in the most literal sense, with applications spanning military energy independence, advanced naval propulsion, and civilian power generation. Small modular reactors are one of the defining defense and energy security technologies of the next decade, and Korsnick is the person who governs the policy environment they operate in.",check:"No direct check. Critical policy intelligence and nuclear ecosystem deal sourcing.",cares:"Nuclear energy policy|SMR deployment|NRC regulation|Energy security|Nuclear renaissance",forRosc:"Controls the policy environment for one of Rosc's most important portfolio thesis themes. Her NEI network spans every nuclear startup, lab, and government official in the space.",ask:"Nuclear ecosystem deal sourcing — which SMR and advanced nuclear startups in her network are the most credible investment opportunities.",watchOut:"Nothing significant.",intros:"NEI nuclear startup network — her relationships span every credible advanced nuclear company in the US, the most direct path to nuclear deal flow for Rosc.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/maria-korsnick",topics:["Nuclear policy","Defense nuclear","Small modular reactors","Energy security"]},
 {name:"Chris Levesque",title:"President & CEO",org:"TerraPower",cat:"Defense",priority:"Strong target",loc:"Bellevue, WA",who:"Chris Levesque is the President and CEO of TerraPower, the advanced nuclear company founded by Bill Gates. In March 2026 TerraPower received the NRC construction permit for its Natrium sodium-cooled reactor in Kemmerer, Wyoming — the first commercial non-light-water reactor construction approval in 40+ years. TerraPower is developing the Natrium reactor — a sodium-cooled fast reactor with a molten salt energy storage system — which is one of the most credible and well-funded advanced nuclear designs in the US. The company has received significant DOE funding and is building its first commercial plant in Wyoming. Gates-backed and DOE-supported, TerraPower sits at the intersection of the civilian nuclear renaissance and defense energy security — Natrium reactors have direct potential applications for forward military bases and naval platforms seeking nuclear power that doesn't require enriched fuel. Levesque has built deep relationships across DOE, NRC, and the advanced nuclear ecosystem.",check:"No direct check — potential portfolio company or co-investor.",cares:"Advanced nuclear deployment|DOE partnerships|Nuclear energy security|Natrium reactor commercialization|Clean energy infrastructure",forRosc:"TerraPower is one of the most important dual-use nuclear companies in the US. His DOE and nuclear ecosystem relationships are direct deal sourcing for Rosc's energy security portfolio.",ask:"TerraPower's current funding status and whether there are co-investment or portfolio company partnership opportunities.",watchOut:"Nothing significant.",intros:"Advanced nuclear ecosystem — his relationships span DOE program officers, NRC commissioners, and the founders of every other credible advanced nuclear startup.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/chris-levesque",topics:["Advanced nuclear","Natrium reactor","Energy security","Nuclear waste recycling"]},
 {name:"Kim Lew",title:"CEO & President",org:"Columbia Investment Management",cat:"LP",priority:"Strong target",loc:"New York, NY",who:"Kim Lew is the President and CEO of the Columbia University Investment Management Company, overseeing Columbia's approximately $16 billion endowment. Before Columbia she was CIO of the Carnegie Corporation. Columbia is one of the most research-intensive universities in the US with particularly strong defense research programs through its engineering and applied sciences schools, and deep DARPA and DoD research funding relationships. She is known as a thoughtful and rigorous allocator who has expanded Columbia's alternatives program and shown genuine appetite for emerging managers with differentiated theses. University endowments are among the best LP prospects for Rosc: patient capital, emerging manager appetite, and defense research pipelines as a simultaneous deal sourcing channel.",check:"Yes — university endowment LP (~$14bn). Active alternatives program with genuine emerging manager exposure.",cares:"Endowment performance|Emerging manager programs|Columbia research partnerships|Long-horizon investing|Mission-aligned capital",forRosc:"Major endowment LP and defense research deal sourcing pipeline simultaneously. Columbia's DARPA and DoD research programs are a direct portfolio company pipeline.",ask:"Columbia endowment's emerging manager criteria and whether defense-tech VC sits within their current program scope.",watchOut:"Columbia has faced student protest pressure over defense-related investments. Acknowledge the complexity; lead with civilian benefit.",intros:"Ivy endowment peer network — her relationships span the CIOs of every major university endowment, all of whom are potential Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/kim-lew",topics:["University endowment","Emerging managers","Alternatives","Impact investing"]},
 {name:"Daniel Loeb",title:"CEO & Founder",org:"Third Point",cat:"VC",priority:"Strong target",loc:"New York, NY",who:"Daniel Loeb is the founder and CEO of Third Point, one of the most successful and well-known activist hedge funds in the US with approximately $10 billion in AUM. A Yale graduate, Loeb is famous for his sharply worded shareholder letters and his willingness to take confrontational public positions on corporate governance and strategy. He has evolved Third Point significantly over the past decade, adding a venture and private equity dimension alongside the core hedge fund. He is deeply embedded in New York's financial elite and has broad personal relationships across institutional investors, family offices, and corporate boards. He has been publicly hawkish on China and has expressed serious interest in technology and national security investing themes.",check:"Potential LP or co-investor — Third Point manages institutional and UHNW capital with appetite for differentiated emerging managers.",cares:"Activist investing|Corporate governance|China hawkishness|Technology investing|Hedge fund innovation",forRosc:"Loeb's institutional relationships and UHNW co-investor base are warm LP introduction channels. His China hawkishness creates genuine thesis alignment.",ask:"Whether Third Point or his UHNW co-investor network has appetite for a defense-tech VC fund.",watchOut:"Can be combative — match his directness and intellectual confidence.",intros:"Third Point co-investor network — the UHNW and institutional investors who co-invest alongside Third Point are natural Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/daniel-loeb",topics:["Activist investing","Geopolitics","Japan strategy","Ocean conservation"]},
 {name:"Orysia Lutsevych",title:"Head, Ukraine Forum",org:"Chatham House",cat:"Geo",priority:"Strong target",loc:"London, UK",party:"Non-partisan (Chatham House)",who:"Orysia Lutsevych is the Head of the Ukraine Forum at Chatham House, the UK's most prestigious foreign policy think tank. Ukrainian-born, she has spent 20 years working across Ukraine, the US, Poland, and Georgia building civil society institutions and non-profit organizations including Europe House Georgia, Open Ukraine, and the Polish-Ukrainian Cooperation Foundation. She authored the definitive Chatham House paper on civil society and democracy in Georgia, Ukraine, and Moldova. Since Russia's invasion she has become one of the most authoritative voices on Ukraine, European security, and the civil society dimensions of the war. Her network spans Ukrainian government, European defense ministries, civil society organizations, and the institutional investors who are beginning to think seriously about Ukraine reconstruction investment.",check:"No direct check. Geopolitical intelligence and Ukraine reconstruction deal sourcing.",cares:"Ukraine reconstruction|Civil society and democracy|European security architecture|Russia-Ukraine war|Eastern European investment",forRosc:"The most authoritative voice on Ukraine at this conference. Ukraine reconstruction is one of the largest emerging investment themes globally — her network opens both the intelligence and the deal flow.",ask:"Her read on the defense-tech and reconstruction investment landscape in Ukraine — and introductions into her European security and reconstruction network.",watchOut:"Nothing significant.",intros:"Ukraine government network — her relationships with Ukrainian officials and civil society leaders are the most direct path to Ukraine reconstruction deal flow.|Chatham House policy network — European defense ministry and institutional investor relationships directly relevant to Rosc's European LP strategy.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/orysia-lutsevych",topics:["Ukraine war","European rearmament","Russian aggression","Ukraine reconstruction"]},
 {name:"Holly MacDonald",title:"CEO",org:"Bessemer Trust",cat:"LP",subcat:"FamilyOffice",priority:"Strong target",loc:"New York, NY",who:"Holly MacDonald is the Chief Executive Officer of Bessemer Trust, one of the most prestigious multi-family offices in the US, managing over $20 billion for approximately 3,000 ultra-high-net-worth families and individuals. She is also a member of Bessemer's Executive Committee, Leadership Council, and Board of Directors, having previously served as COO and CIO. Before Bessemer she was Managing Director in Emerging Markets and Global Currency Strategy at J.P. Morgan. An MBA with honors from Columbia Business School and a BA magna cum laude in philosophy from Princeton, where she ran Division I track and cross-country. She also serves on the Federal Reserve Bank of New York's Investor Advisory Committee on Financial Markets. Bessemer's client base represents some of the most concentrated UHNW capital in the US.",check:"Yes — family office LP channel. Bessemer manages $20bn+ for 3,000 UHNW families. One Bessemer relationship opens the entire client base to Rosc co-investment opportunities.",cares:"UHNW wealth management|Multi-family office investing|Co-investment for clients|Emerging manager programs|Alternative investment access",forRosc:"Bessemer's UHNW client base is exactly Rosc's LP demographic. A Bessemer relationship opens co-investment access to 3,000 ultra-high-net-worth families simultaneously.",ask:"Whether Bessemer has a co-investment program for clients in defense-tech VC and what the process looks like for emerging managers.",watchOut:"Nothing significant.",intros:"Bessemer UHNW client base — 3,000 ultra-high-net-worth families who are exactly Rosc's LP demographic.|Federal Reserve Bank of NY network — her IACFM colleagues span senior institutional investors and policymakers.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/holly-macdonald",topics:["Family office management","UHNW investing","Multi-generational wealth","Alternatives"]},
 {name:"Sebastian Mallaby",title:"Senior Fellow",org:"Council on Foreign Relations",cat:"Geo",priority:"Strong target",loc:"Washington DC",party:"Non-partisan (CFR)",who:"Sebastian Mallaby is the Paul A. Volcker Senior Fellow for International Economics at the Council on Foreign Relations. A two-time Pulitzer Prize finalist, he is the author of six books including More Money Than God (hedge funds), The Power Law (venture capital and the making of the new future), and his latest The Infinity Machine — on Demis Hassabis, DeepMind, and the quest for superintelligence. The Power Law in particular has become a defining text for understanding how venture capital works and why it produces outsized returns, widely read by institutional LPs evaluating VC fund managers. He co-hosts a weekly CFR podcast, The Spillover, examining the ripple effects of global events across policy, geopolitics, economics, technology, and financial markets. Married to Zanny Minton Beddoes, Editor-in-Chief of The Economist.",check:"No direct check. Invaluable for Rosc Institute intellectual credibility and LP narrative.",cares:"Venture capital economics|AI and superintelligence|Geopolitics and markets|CFR research agenda|Technology and power",forRosc:"Author of The Power Law — the book LPs read before committing to VC funds. A Mallaby association with Rosc Institute would directly influence LP perception of Rosc's intellectual seriousness.",ask:"Rosc Institute contribution — a co-authored piece or CFR panel on defense-tech VC investing.",watchOut:"Nothing significant. His wife Zanny Minton Beddoes runs The Economist — a natural Rosc Institute media partner worth exploring.",intros:"Zanny Minton Beddoes — Editor-in-Chief, The Economist. His wife; the most natural Rosc Institute media partnership imaginable.|CFR policy and LP network — his CFR colleagues and podcast audience span exactly the institutional audience Rosc wants.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/sebastian-mallaby",topics:["AI and superintelligence","Hedge fund history","Central banking","Great power competition"]},
 {name:"Zanny Minton Beddoes",title:"Editor-in-Chief",org:"The Economist",cat:"Other",priority:"Strong target",loc:"London, UK",party:"Non-partisan (The Economist)",who:"Zanny Minton Beddoes is the Editor-in-Chief of The Economist, one of the world's most influential publications with 1.6 million subscribers and a readership of senior government officials, institutional investors, and business leaders globally. She has led The Economist since 2015, the first woman to do so in the publication's 180-year history. Before journalism she was an economist at the IMF. She is married to Sebastian Mallaby, the CFR Senior Fellow and author of The Power Law. The Economist's editorial coverage of AI, geopolitics, defense spending, and great power competition directly shapes the views of Rosc's target LP audience — and a Rosc Institute relationship with The Economist would be the single most leveraged media partnership Rosc could have.",check:"No direct check. The most leveraged media partnership Rosc could build.",cares:"Global economic policy|AI and technology|Great power competition|Democracy and liberal order|Media independence",forRosc:"The Economist reaches Rosc's exact LP audience. A Rosc Institute partnership — a sponsored report, co-hosted event, or contributed analysis — would be transformative for LP awareness.",ask:"Whether The Economist has appetite for a Rosc Institute editorial partnership around defense-tech investing and geopolitical risk.",watchOut:"Keep off partisan politics — The Economist is rigorously non-partisan.",intros:"Sebastian Mallaby — CFR Senior Fellow, author of The Power Law. Her husband; both are at this conference — approach as a pair.|Economist subscriber LP base — the most concentrated readership of Rosc's target LP audience anywhere.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/zanny-minton-beddoes",topics:["Global economics","AI and society","Geopolitics","Trade policy"]},
