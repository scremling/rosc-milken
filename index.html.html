{name:"Jake Cusack",title:"Managing Partner",org:"CrossBoundary Group",cat:"VC",priority:"Strong target",loc:"Washington DC",who:"Jake Cusack is a co-founder and Managing Partner of CrossBoundary Group, a specialized advisory and investment firm focused on frontier and emerging markets with a particular expertise in energy access, defense, and security investment in challenging geographies. CrossBoundary has pioneered investment frameworks for markets that traditional institutional capital systematically avoids — Sub-Saharan Africa, the Indo-Pacific frontier, and other regions where security and economic development intersect. His work sits at the nexus of development finance, private capital, and national security — an unusual combination that maps directly to Rosc's interest in the defense-development overlap in strategic geographies.",check:"Co-investment and deal sourcing partner in frontier defense and security markets.",cares:"Frontier market investing|Energy access|Defense and security in emerging markets|Impact and development finance|Indo-Pacific security",forRosc:"CrossBoundary's frontier defense and security expertise opens deal sourcing in geographies that are strategically critical for Rosc's Indo-Pacific thesis.",ask:"Deal flow sharing on frontier defense and security technology investments — particularly in Indo-Pacific markets.",watchOut:"Nothing significant.",intros:"Development finance and defense network — his relationships span USAID, DFC, and the development finance institutions that fund dual-use security investments in frontier markets.",link:"https://www.linkedin.com/in/jake-cusack",topics:["Frontier markets","Energy security","Conflict-affected markets","Africa investment"]},
{name:"Michael DeSombre",title:"Asst Secretary, East Asian & Pacific Affairs",org:"US State Dept",cat:"Policy",priority:"Strong target",loc:"Washington DC",party:"R (Trump appointee)",who:"Michael DeSombre is the US Ambassador to Thailand — a Senate-confirmed Trump appointee to one of the most strategically important US diplomatic posts in Southeast Asia. Before government he was a partner at Sullivan & Cromwell in Hong Kong for decades, advising on the most complex cross-border transactions in Asia. He is one of America's foremost experts on Chinese law, cross-border investment, and economic statecraft in the Indo-Pacific. His posting in Bangkok places him at the center of a rapidly evolving strategic geography: Thailand is a critical US ally in Southeast Asia, and the region is one of the most important theaters for both US defense relationships and institutional capital flows. His legal and diplomatic background gives him a unique combination of transactional and government expertise.",check:"No direct check. Southeast Asia government relationship and Indo-Pacific deal sourcing intelligence.",cares:"US-Thailand relations|Southeast Asia strategy|China and cross-border investment|Indo-Pacific security|Economic statecraft",forRosc:"Opens the Southeast Asian diplomatic and institutional network at a moment when the Indo-Pacific is one of Rosc's most important strategic geographies.",ask:"Intelligence on Southeast Asian defense investment landscape and introductions to Thai and regional institutional investors with US defense-tech interest.",watchOut:"R (Trump appointee) — keep off domestic politics.",intros:"Southeast Asia diplomatic network — his Bangkok posting gives him relationships with every major government and institutional investor in the region.|Sullivan & Cromwell Asia alumni — the most important cross-border M&A legal network in Asia, with deep relationships across Asian institutional capital.",link:"https://milkeninstitute.org/events/global-conference-20 {name:"Francis deSouza",title:"COO & President, Security Products",org:"Google Cloud",cat:"AI",priority:"Strong target",loc:"San Francisco, CA",who:"Francis deSouza is the former CEO of Illumina, the genomics company that made DNA sequencing affordable and accessible and in doing so transformed medicine, agriculture, and biosecurity. He led Illumina for seven years before stepping down in 2023. Under his leadership Illumina became the dominant platform for genetic sequencing globally, with direct applications in biodefense, pandemic preparedness, and forensics for intelligence and law enforcement. He is now a board member and advisor across the life sciences ecosystem and has deep relationships with the investors, companies, and government agencies that are the most active in genomics and biosecurity.",check:"No direct check — life sciences deal sourcing and biodefense network.",cares:"Genomics and sequencing|Biodefense|Pandemic preparedness|Life sciences technology|DNA and biosecurity",forRosc:"Former Illumina CEO with deep biodefense and biosecurity relationships. His network spans the companies and government agencies at the intersection of genomics and national security.",ask:"Biodefense and biosecurity deal sourcing — which genomics and life sciences companies in his network have the most credible defense and IC applications.",watchOut:"Illumina faced significant shareholder pressure and governance controversy in 2022–2023. No need to raise it.",intros:"Life sciences and biodefense network — his relationships span the genomics companies, DARPA Biological Technologies Office, and IC biosecurity programs that are direct Rosc deal sourcing targets.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/francis-desouza",topics:["Cloud security","AI cybersecurity","Google Cloud","Dual-use AI"]},
{name:"Dina DiLorenzo",title:"President",org:"Guggenheim Investments",cat:"LP",priority:"Strong target",loc:"New York, NY",who:"Dina DiLorenzo is the CEO of NBC News, one of the three most important US broadcast news organizations, part of NBCUniversal and Comcast. She leads the editorial and business operations of NBC News across linear television and digital platforms. Media relationships are an underappreciated asset for an emerging fund manager — national media exposure shapes LP perception and deal flow in ways that are difficult to quantify but genuinely important. As a top-five US news executive, DiLorenzo has relationships spanning the NBC News editorial team, NBCUniversal corporate leadership, and the corporate sponsors and institutional relationships that fund major US media.",check:"No direct check. Media relationship for Rosc Institute profile-building.",cares:"Broadcasting and journalism|NBCUniversal strategy|Digital media|News credibility|Comcast corporate relationships",forRosc:"NBC News profile for Rosc and its founders would directly shape LP perception. A single NBC News segment or documentary reaches tens of millions of viewers.",ask:"Whether there is an NBC News story in Rosc's mission — veteran founders building America's defense-tech future is a compelling broadcast narrative.",watchOut:"Nothing significant.",intros:"NBCUniversal executive network — Comcast institutional relationships and NBC corporate partnerships span major institutional investors and corporate LPs.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/dina-dilorenzo",topics:["Institutional capital","Alternatives","Fixed income","Fund-of-funds"]},
{name:"Charles Holive",title:"Chief AI Officer",org:"BNP Paribas CIB",cat:"AI",priority:"Strong target",loc:"Paris, France",who:"Charles Holive is the Head of Americas at Capgemini, the French multinational technology and consulting services company with over $22 billion in annual revenue and more than 350,000 employees globally. Capgemini is one of the world's largest technology services companies and has a significant and growing defense, government, and national security technology business in the US, serving major defense agencies and military branches with IT modernization, cloud transformation, and AI implementation. Holive oversees all of Capgemini's business in the Americas, including its government and defense technology contracts. French parent company gives him natural European defense technology relationships alongside his US government exposure.",check:"Strategic LP or co-investor in defense technology companies adjacent to Capgemini's government IT portfolio.",cares:"Defense IT modernization|Government technology services|AI implementation for defense|Franco-American technology|Digital transformation",forRosc:"Capgemini's US defense government technology contracts are a direct deal sourcing and customer introduction channel for Rosc's portfolio companies.",ask:"Strategic LP conversation and warm introductions to defense agency technology program managers relevant to Rosc's portfolio companies.",watchOut:"Nothing significant.",intros:"US defense agency technology network — his government IT contracts include direct relationships with the program managers who buy technology from Rosc's portfolio companies.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/charles-holive",topics:["AI in banking","European AI regulation","Dual-use AI","Financial services AI"]},

{name:"Andre Esteves",title:"Chairman & Senior Partner",org:"BTG Pactual",cat:"LP",priority:"Worth a chat",loc:"São Paulo, Brazil",who:"André Esteves is the founder and Senior Managing Partner of BTG Pactual, Latin America's largest investment bank with approximately $500 billion in assets and wealth under management (as of December 2025). Brazilian-born, he built BTG from scratch after buying back his firm following a 2015 arrest (charges were dropped) and rebuilt it into the dominant financial institution in Latin America. BTG Pactual manages institutional capital across Latin America including Brazilian pension funds, sovereign capital, and UHNW family offices. Brazil is one of the largest emerging market economies and BTG's LP base includes the most important Brazilian and Latin American institutional investors. Esteves himself is one of the most prominent and colorful figures in global finance.",check:"Potential LP through BTG's Latin American institutional network — and direct family office capital.",cares:"Latin American finance|Brazilian capital markets|Private equity and credit|Emerging market investing|Banking and financial services",forRosc:"BTG's Latin American LP base is an underexplored and significant capital pool. Esteves's personal relationships span every major Brazilian and LatAm institutional investor.",ask:"Whether BTG's LP base or his personal capital has appetite for US defense-tech VC as an alternatives allocation.",watchOut:"The 2015 arrest and release are public knowledge — he rebuilt from it and it's not taboo, but no need to raise it.",intros:"BTG Pactual LP network — Brazilian and Latin American institutional investors including pension funds and sovereign capital that are underexplored Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/andre-esteves",topics:["LatAm institutional capital","Investment banking","Alternatives","Brazil capital markets"]},
{name:"Mansoor Ibrahim Al Mansoori",title:"Chairman, Dept of Health",org:"Abu Dhabi",cat:"Policy",priority:"Context only",loc:"Abu Dhabi, UAE",who:"Mansoor Ibrahim Al Mansoori is a senior official with the Abu Dhabi Investment Authority (ADIA), one of the world's largest sovereign wealth funds with estimated assets of $700–900 billion. ADIA is one of the most important and least publicly visible SWFs — it rarely speaks publicly and operates with significant discretion. Any direct engagement with ADIA is valuable given the fund's scale and its growing interest in defense and technology. His role within ADIA's investment structure makes him a direct LP conversation target for Rosc, as ADIA has been actively expanding its alternatives and technology allocations.",check:"Yes — ADIA is one of the largest SWFs globally. A direct ADIA engagement is a high-priority LP conversation.",cares:"Abu Dhabi sovereign wealth|ADIA investment strategy|Technology allocation|Gulf diversification|Long-term capital deployment",forRosc:"ADIA is the largest Abu Dhabi sovereign vehicle — bigger than Lunate and ADIA's interest in defense-tech VC would be transformative for Rosc.",ask:"Full LP pitch — thesis, portfolio, team, fee structure. ADIA is notoriously discreet; any direct engagement should be treated as a formal LP conversation.",watchOut:"ADIA operates with extreme discretion. Don't press for specifics on their portfolio or investment process.",intros:"ADIA and Abu Dhabi sovereign ecosystem — his relationships span the broader Abu Dhabi government investment network including Murtaza Hussain at Lunate.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/mansoor-ibrahim-al-mansoori",topics:["UAE health policy","Abu Dhabi government","GCC networks"]},
{name:"Jason Arthur",title:"CEO",org:"Mission 44",cat:"Other",priority:"Context only",loc:"London, UK",who:"Jason Arthur is the CEO of the Wellcome Trust's investment arm, Wellcome Investments, managing approximately £38 billion on behalf of one of the world's largest biomedical research charities. Wellcome funds basic biomedical research, global health, and pandemic preparedness globally — and its investment portfolio is managed to maximize long-term returns that fund this mission. Wellcome has historically been a sophisticated and risk-tolerant institutional investor willing to back emerging managers with differentiated theses. Biomedical research and global health security — Wellcome's mission areas — have direct overlap with Rosc's biodefense portfolio thesis.",check:"Yes — Wellcome Investments manages £38bn with an emerging manager program and biodefense thesis overlap.",cares:"Biomedical research funding|Global health|Pandemic preparedness|Long-horizon investing|Emerging manager programs",forRosc:"Major endowment LP with biodefense mission alignment and a history of backing emerging managers with differentiated theses. Strong fit.",ask:"Whether Wellcome's investment program has appetite for defense-tech VC with a biodefense and health security framing.",watchOut:"Nothing significant.",intros:"Wellcome Trust research network — the biomedical researchers and global health organizations funded by Wellcome include direct pipeline connections to Rosc's biodefense portfolio.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/jason-arthur",topics:["Philanthropy","STEM education","Diversity","Lewis Hamilton network"]},
{name:"John Aylward",title:"Founder & CIO",org:"Sona Asset Management",cat:"LP",priority:"Context only",loc:"London, UK",who:"John Aylward is the CIO of the University of Notre Dame Investment Office, managing Notre Dame's approximately $18 billion endowment. Notre Dame has one of the most respected university endowment investment programs in the US — consistently ranking alongside Yale, Harvard, and Stanford for long-term returns — and has a history of backing emerging managers with differentiated investment theses. Notre Dame's Catholic identity and the university's significant ROTC and military officer commissioning program give the endowment a natural cultural affinity for defense-oriented investment that many other university endowments lack. Aylward has built a sophisticated alternatives program with genuine appetite for first-time fund managers.",check:"Yes — major university endowment LP (~$18bn) with genuine emerging manager appetite and cultural affinity for defense investing.",cares:"Endowment performance|Emerging manager programs|Long-horizon investing|Catholic values alignment|Military and ROTC culture",forRosc:"One of the best cultural fits for Rosc among university endowments — Notre Dame's ROTC culture and Aylward's emerging manager appetite make this a high-probability LP relationship.",ask:"Notre Dame endowment's current emerging manager program criteria and whether Rosc's defense-tech thesis fits their current program parameters.",watchOut:"Nothing significant.",intros:"Ivy and top-10 endowment peer network — his relationships span the CIOs of every major university endowment, all of whom are potential Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/john-aylward",topics:["Credit strategies","Macro investing","Boutique asset management"]}];

function avatarHTML(name, size, bg, fg) {
 const photo = PHOTOS[name];
 const style = `width:${size}px;height:${size}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:${size > 44 ? 18 : 14}px;flex-shrink:0;letter-spacing:0.5px;overflow:hidden;flex-shrink:0;`;
 if (photo) {
 return `<div style="${style}background:${bg};color:${fg}"><img src="${photo}" style="width:100%;height:100%;object-fit:cover;object-position:center top;" onerror="var p=this.parentElement;if(p&&p.isConnected){this.style.display='none';p.innerHTML='${initials(name)}';p.style.background='${bg}';p.style.color='${fg}';p.style.display='flex';p.style.alignItems='center';p.style.justifyContent='center';}"></div>`;
 }
 return `<div style="${style}background:${bg};color:${fg}">${initials(name)}</div>`;
}

function prefetchPhotos() {} // no-op, photos are hardcoded

// Deduplicate
const CONTACTS = [];
const seen = new Set();
PEOPLE.forEach(p => {
 const k = p.name;
 if (!seen.has(k)) { seen.add(k); CONTACTS.push(p); }
});

// ─── COLORS ──────────────────────────────────────────────────────────────────
const PALETTES = [
 ['#dbeafe','#1e40af'],['#dcfce7','#166534'],['#fee2e2','#991b1b'],
 ['#ede9fe','#5b21b6'],['#fef3c7','#92400e'],['#fce7f3','#9d174d'],
 ['#d1fae5','#065f46'],['#ffedd5','#9a3412']
];
function palette(name) {
 let h = 0;
 for (const c of name) h = (h * 31 + c.charCodeAt(0)) % PALETTES.length;
 return PALETTES[h];
}
function initials(name) {
 return name.split(' ').filter(Boolean).slice(0, 2).map(w => w[0]).join('');
}
function dotColor(p) {
 return p === 'Must meet' ? '#ff3b30' : p === 'Strong target' ? '#ff9500' : p === 'Worth a chat' ? '#007aff' : '#c7c7cc';
}
function pClass(p) {
 return p === 'Must meet' ? 'p-must' : p === 'Strong target' ? 'p-strong' : p === 'Worth a chat' ? 'p-worth' : 'p-context';
}
function catLabel(c, sub) {
 if (sub === 'Rosc') return 'Rosc';
  if (sub === 'SWF') return 'SWF';
 if (sub === 'FamilyOffice') return 'Family Office';
 const map = { LP:'LP', Defense:'Defense', Geo:'Geo', AI:'AI/Tech', VC:'VC/PE', Policy:'Policy', Other:'Other' };
 return map[c] || c;
}

// ─── FILTER ───────────────────────────────────────────────────────────────────
function getFiltered() {
 const q = document.getElementById('searchInput').value.toLowerCase().trim();
 const f = state.filter;
 return CONTACTS.filter(p => {
 const matchQ = !q ||
 p.name.toLowerCase().includes(q) ||
 p.org.toLowerCase().includes(q) ||
 p.title.toLowerCase().includes(q) ||
 p.topics.some(t => t.toLowerCase().includes(q)) ||
 p.bio.toLowerCase().includes(q);
 if (f === 'met') return matchQ && state.met[p.name];
 if (f === 'unmet') return matchQ && !state.met[p.name];
 if (['Must meet','Strong target','Worth a chat','Context only'].includes(f)) return matchQ && p.priority === f;
 if (f === 'Rosc') return matchQ && p.subcat === 'Rosc';
    if (f === 'SWF') return matchQ && p.subcat === 'SWF';
 if (f === 'FamilyOffice') return matchQ && p.subcat === 'FamilyOffice';
 if (f === 'GeoPolicy') return matchQ && (p.cat === 'Geo' || p.cat === 'Policy');
 if (f) return matchQ && p.cat === f;
 return matchQ;
 });
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
 const filtered = getFiltered();
 const total = CONTACTS.length;
 const metCount = Object.values(state.met).filter(Boolean).length;
 const mustTotal = CONTACTS.filter(p => p.priority === 'Must meet').length;
 const mustMet = CONTACTS.filter(p => p.priority === 'Must meet' && state.met[p.name]).length;

 // Summary
 document.getElementById('summaryBar').innerHTML = `
 <div class="sum-item"><div class="sum-num green">${metCount}</div><div class="sum-label">Met</div></div>
 <div class="sum-item"><div class="sum-num red">${total - metCount}</div><div class="sum-label">Remaining</div></div>
 <div class="sum-item"><div class="sum-num blue">${mustMet}/${mustTotal}</div><div class="sum-label">Must-meets</div></div>
 <div class="sum-item"><div class="sum-num">${filtered.length}</div><div class="sum-label">Showing</div></div>
 `;

 // List header
 document.getElementById('listHeader').textContent = `${filtered.length} contact${filtered.length !== 1 ? 's' : ''}`;

 // List
 if (!filtered.length) {
 document.getElementById('list').innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No contacts found</div></div>`;
 return;
 }

 document.getElementById('list').innerHTML = filtered.map((p, i) => {
 const [bg, fg] = palette(p.name);
 const isMet = !!state.met[p.name];
 const isOpen = state.open === p.name;
 const note = state.notes[p.name] || '';
 return `
<div class="contact-wrap${isMet ? ' met' : ''}" id="wrap-${i}">
 <div class="contact-row" onclick="toggleOpen('${esc(p.name)}')">
 ${avatarHTML(p.name, 44, bg, fg)}
 <div class="row-info">
 <div class="row-name">${p.name}</div>
 <div class="row-sub">${p.org}</div>
 </div>
 <div class="row-right">
 <div class="priority-dot" style="background:${dotColor(p.priority)}"></div>
 <div class="cat-tag">${catLabel(p.cat, p.subcat)}</div>
 </div>
 <button class="check-btn${isMet ? ' done' : ''}" onclick="toggleMet(event,'${esc(p.name)}')">
 <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
 </button>
 </div>
 ${isOpen ? `
 <div class="detail-panel">
 <div class="detail-inner">
 <div class="d-header">
 ${avatarHTML(p.name, 54, bg, fg)}
 <div class="d-info">
 <div class="d-name">${p.name}</div>
 <div class="d-title">${p.title} — ${p.org}</div>
 <div class="d-loc">${p.loc}${p.party ? ` · <span style="font-weight:600;color:${p.party.startsWith('R') ? '#ff3b30' : p.party.startsWith('D') ? '#007aff' : '#aeaeb2'}">${p.party}</span>` : ''}</div>
 <div class="d-priority ${pClass(p.priority)}">${p.priority}</div>
 ${p.link ? `<a href="${p.link}" target="_blank" style="font-size:11px;color:#007aff;text-decoration:none;margin-top:3px;display:inline-block;">↗ Profile</a>` : ''}
 </div>
 </div>
 ${p.who ? `
 <div class="sec-label">Who</div>
 <div class="bio-text">${p.who}</div>
 ` : p.bio ? `
 <div class="sec-label">Background</div>
 <div class="bio-text">${p.bio}</div>
 ` : ''}
 ${p.check ? `<div class="sec-label">Can they write a check?</div><div class="bio-text">${p.check}</div>` : ''}
 ${p.cares ? `<div class="sec-label">Cares about</div><div class="topics">${p.cares.split('|').map(t => `<span class="topic">${t.trim()}</span>`).join('')}</div>` : p.topics ? `<div class="sec-label">Topics to raise</div><div class="topics">${p.topics.map(t => `<span class="topic">${t}</span>`).join('')}</div>` : ''}
 ${p.forRosc ? `<div class="sec-label">For Rosc</div><div class="bio-text">${p.forRosc}</div>` : p.rosc ? `<div class="sec-label">Rosc angle</div><div class="rosc-box">${p.rosc}</div>` : ''}
 ${p.ask ? `<div class="sec-label">Ask</div><div class="rosc-box">${p.ask}</div>` : ''}
 ${p.watchOut ? `<div class="warn-box">⚠️ ${p.watchOut}</div>` : p.warn ? `<div class="warn-box">⚠️ ${p.warn}</div>` : ''}
 ${p.intros ? `<div class="sec-label">Can introduce you to</div>${p.intros.split('|').map(i => `<div style="display:flex;gap:8px;margin-bottom:6px;"><div style="width:6px;height:6px;border-radius:50%;background:#c6c6c8;flex-shrink:0;margin-top:5px;"></div><div style="font-size:13px;color:#3c3c43;line-height:1.5;">${i.trim()}</div></div>`).join('')}` : ''}
 <div class="note-label">Notes for Rosc / Fuller</div>
 <textarea class="note-area" rows="2" placeholder="Key takeaways, follow-ups, intros…" onchange="saveNote('${esc(p.name)}',this.value)">${note}</textarea>
 <div class="bottom-row">
 <button class="met-btn${isMet ? ' done' : ''}" onclick="toggleMet(event,'${esc(p.name)}')">${isMet ? '✓ Marked as met' : 'Mark as met'}</button>
 <span class="close-link" onclick="closeDetail(event,'${esc(p.name)}')">Close ↑</span>
 </div>
 </div>
 </div>` : ''}
</div>`;
 }).join('');
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function esc(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function setF(el, f) {
 document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
 el.classList.add('active');
 state.filter = f;
 state.open = null;
 render();
}

function toggleOpen(name) {
 state.open = state.open === name ? null : name;
 render();
 if (state.open) {
 setTimeout(() => {
 const el = document.querySelector('.detail-panel');
 if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
 }, 50);
 }
}

function closeDetail(e, name) {
 e.stopPropagation();
 state.open = null;
 render();
}

function toggleMet(e, name) {
 e.stopPropagation();
 state.met[name] = !state.met[name];
 render();
}

function saveNote(name, val) {
 state.notes[name] = val;
}

// ─── FILTER PILLS ────────────────────────────────────────────────────────────
const filtersBar = document.getElementById('filtersBar');
if (filtersBar) {
 filtersBar.querySelectorAll('.pill').forEach(pill => {
 pill.addEventListener('click', () => setF(pill, pill.dataset.f));
 pill.addEventListener('touchend', (e) => { e.preventDefault(); setF(pill, pill.dataset.f); });
 });
}

const searchInput = document.getElementById('searchInput');
if (searchInput) {
 searchInput.addEventListener('input', () => {
 state.open = null;
 render();
 });
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
prefetchPhotos();
</script>
</body>
</html>
