<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Rosc — Conference</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f2f2f7;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;color:#1c1c1e;overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100vh;max-width:500px;margin:0 auto;background:#f2f2f7}

/* TOP BAR */
.topbar{background:#fff;padding:12px 16px 8px;border-bottom:0.5px solid #c6c6c8;flex-shrink:0;position:sticky;top:0;z-index:50}
.topbar h1{font-size:22px;font-weight:700;letter-spacing:-0.3px;margin-bottom:8px}
.search-wrap{position:relative;display:flex;align-items:center}
.search-wrap svg{position:absolute;left:10px;color:#8e8e93;pointer-events:none}
#searchInput{width:100%;padding:8px 10px 8px 32px;border:none;border-radius:10px;font-size:15px;background:#e5e5ea;outline:none;color:#1c1c1e}
#searchInput::placeholder{color:#8e8e93}

/* FILTERS */
.filters{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;background:#fff;border-bottom:0.5px solid #c6c6c8;flex-shrink:0;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.pill{padding:5px 13px;border-radius:20px;border:1px solid #c6c6c8;font-size:13px;font-weight:500;color:#3c3c43;background:#fff;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;font-family:inherit;touch-action:manipulation;-webkit-appearance:none;appearance:none;outline:none}
.pill:active{opacity:0.7}
.pill.active{background:#007aff;color:#fff;border-color:#007aff}

/* SUMMARY */
.summary{display:grid;grid-template-columns:repeat(4,1fr);background:#fff;border-bottom:0.5px solid #c6c6c8;flex-shrink:0}
.sum-item{text-align:center;padding:10px 4px;border-right:0.5px solid #e5e5ea}
.sum-item:last-child{border-right:none}
.sum-num{font-size:20px;font-weight:700;color:#1c1c1e;line-height:1}
.sum-label{font-size:10px;color:#8e8e93;margin-top:2px;font-weight:500}
.sum-num.green{color:#34c759}
.sum-num.red{color:#ff3b30}
.sum-num.blue{color:#007aff}

/* LIST */
.list-header{padding:6px 16px 4px;font-size:12px;color:#8e8e93;font-weight:500;background:#f2f2f7}
#list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* CONTACT ROW */
.contact-wrap{background:#fff;margin-bottom:0;border-bottom:0.5px solid #e5e5ea}
.contact-row{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;user-select:none;touch-action:manipulation}
.contact-row:active{background:#f2f2f7}
.contact-wrap.met .row-name{text-decoration:line-through;color:#8e8e93}
.contact-wrap.met .contact-row{opacity:0.6}

/* AVATAR */
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;flex-shrink:0;letter-spacing:0.5px}

/* ROW INFO */
.row-info{flex:1;min-width:0}
.row-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#1c1c1e}
.row-sub{font-size:13px;color:#8e8e93;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.row-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.priority-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cat-tag{font-size:10px;padding:2px 7px;border-radius:5px;background:#f2f2f7;color:#6d6d72;font-weight:500}

/* CHECK BUTTON */
.check-btn{width:32px;height:32px;border-radius:50%;border:2px solid #c6c6c8;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:14px;line-height:1;transition:all .15s;touch-action:manipulation;-webkit-appearance:none;appearance:none;outline:none}
.check-btn.done{background:#34c759;border-color:#34c759;color:#fff}
.check-btn svg{width:14px;height:14px;stroke:#fff;stroke-width:3;fill:none;display:none}
.check-btn.done svg{display:block}

/* DETAIL PANEL */
.detail-panel{background:#f9f9fb;border-top:0.5px solid #e5e5ea;overflow:hidden}
.detail-inner{padding:16px}

.d-header{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.d-avatar{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0}
.d-info{flex:1;min-width:0}
.d-name{font-size:18px;font-weight:700;color:#1c1c1e;line-height:1.2}
.d-title{font-size:12px;color:#8e8e93;margin-top:3px;line-height:1.4}
.d-loc{font-size:12px;color:#aeaeb2;margin-top:2px}
.d-party{font-weight:600}
.d-party:not([class*="r-"]):not([class*="d-"]){color:#aeaeb2}
.d-priority{font-size:11px;font-weight:700;margin-top:5px;letter-spacing:0.2px}
.p-must{color:#ff3b30}
.p-strong{color:#ff9500}
.p-worth{color:#007aff}
.p-context{color:#8e8e93}

.sec-label{font-size:11px;font-weight:700;color:#8e8e93;text-transform:uppercase;letter-spacing:0.06em;margin:12px 0 5px}
.bio-text{font-size:14px;color:#3c3c43;line-height:1.6}
.field-label{font-size:10px;font-weight:700;color:#8e8e93;text-transform:uppercase;letter-spacing:0.06em;margin:12px 0 4px}
.field-body{font-size:13px;color:#3c3c43;line-height:1.55}
.check-yes{color:#34c759;font-weight:600}
.check-no{color:#8e8e93}
.cares-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px}
.care-chip{font-size:11px;padding:3px 9px;border-radius:20px;background:#f2f2f7;color:#6d6d72;border:0.5px solid #e5e5ea}
.ask-box{background:#e8f4ff;border-radius:10px;padding:10px 12px;font-size:13px;color:#0055b3;line-height:1.6;border:1px solid #b3d7ff}
.intro-item{display:flex;gap:8px;margin-bottom:6px}
.intro-item:last-child{margin-bottom:0}
.intro-dot{width:6px;height:6px;border-radius:50%;background:#c6c6c8;flex-shrink:0;margin-top:6px}
.intro-body{font-size:12px;color:#3c3c43;line-height:1.5}
.intro-name{font-weight:600}
.profile-link{font-size:11px;color:#007aff;text-decoration:none;margin-top:4px;display:inline-block}

.topics{display:flex;flex-wrap:wrap;gap:5px}
.topic{font-size:12px;padding:4px 10px;border-radius:8px;background:#e5e5ea;color:#3c3c43;font-weight:500}

.rosc-box{background:#e8f4ff;border-radius:10px;padding:10px 12px;font-size:13px;color:#0055b3;line-height:1.6;font-weight:500;border:1px solid #b3d7ff}
.warn-box{background:#fff3e0;border-radius:10px;padding:10px 12px;font-size:13px;color:#b25000;line-height:1.6;margin-top:8px;border:1px solid #ffd699}

.note-label{font-size:11px;font-weight:700;color:#8e8e93;text-transform:uppercase;letter-spacing:0.06em;margin:12px 0 5px}
.note-area{width:100%;font-size:14px;border:1px solid #c6c6c8;border-radius:10px;padding:10px 12px;background:#fff;resize:none;line-height:1.5;color:#1c1c1e;font-family:inherit;min-height:60px}
.note-area:focus{outline:none;border-color:#007aff}
.note-area::placeholder{color:#c7c7cc}

.bottom-row{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:0.5px solid #e5e5ea}
.met-btn{padding:8px 18px;border-radius:20px;border:1.5px solid #34c759;font-size:13px;font-weight:600;color:#34c759;background:#fff;cursor:pointer;font-family:inherit}
.met-btn.done{background:#34c759;color:#fff}
.close-link{font-size:14px;color:#007aff;cursor:pointer;font-weight:500;padding:4px 0}

/* SECTION DIVIDER */
.section-break{height:8px;background:#f2f2f7;border-bottom:0.5px solid #e5e5ea;flex-shrink:0}

/* EMPTY */
.empty{text-align:center;padding:3rem 2rem;color:#8e8e93}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:16px;font-weight:500}
</style>
</head>

const PEOPLE = [
 {name:"Raphael Arndt",title:"CEO",org:"Future Fund (Australia)",cat:"LP",subcat:"SWF",priority:"Must meet",loc:"Melbourne, Australia",party:"Non-partisan (Future Fund)",who:"Raphael Arndt is the CEO of Australia's Future Fund, the country's A$230bn sovereign wealth fund. A trained economist and CFA charterholder, he joined Future Fund in 2008, served as CIO for over a decade building out the alternatives program, and became CEO in 2020. He is widely regarded as one of the most intellectually rigorous and commercially progressive SWF leaders in the world — under his watch, Future Fund has been among the first major sovereign investors to actively allocate to defense-tech and dual-use VC, a posture well ahead of peers like CalPERS or CDPQ who still avoid the sector entirely. He holds a PhD in economics and brings genuine analytical depth to questions of geopolitical risk, Indo-Pacific strategy, and portfolio construction. He operates under real political constraints — Future Fund faces ongoing domestic pressure around China exposure — but has navigated this deftly. His deputy Shikha Gupta runs the alternatives book day-to-day and executes every fund commitment.",check:"Yes — SWF LP. Future Fund allocates to defense-tech and dual-use VC funds. First commitment likely A$25–75M. Arndt sets direction; Shikha Gupta executes the actual LP decision.",cares:"Indo-Pacific security architecture|Defense-tech VC allocation|China exposure management|Alternatives innovation|Australia-US alliance investment",forRosc:"One of the only SWF CEOs globally already allocating to defense-tech VC at fund level. A genuine LP relationship validates Rosc's thesis to every other sovereign investor watching.",ask:"Introduction to Shikha Gupta to discuss Rosc's emerging manager program fit and next steps.",watchOut:"Future Fund faces domestic political pressure on China exposure. Also sensitive about being seen as a US-directed defense investor.",intros:"Shikha Gupta — Executive Director Alternatives, Future Fund. His direct report who executes every LP commitment. He can walk you across the room to her.|Will Goodwin — Co-CIO, NZ Super. Peer SWF leader in the same region; Arndt knows him well.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/raphael-arndt",topics:["Sovereign wealth","Defense-tech allocation","Alternatives","Indo-Pacific","AI infrastructure"]},
 {name:"JoAnne Bass",title:"19th Chief Master Sgt USAF (ret.)",org:"US Air Force",cat:"Defense",priority:"Must meet",loc:"Washington DC",party:"Non-partisan (military)",who:"JoAnne Bass served as the 19th Chief Master Sergeant of the Air Force — the highest-ranking enlisted position in the entire US Air Force — from 2020 until her retirement in 2023. She was the first woman and first Asian American to hold the role, serving as senior advisor to the Air Force Chief of Staff and Secretary of the Air Force on all matters affecting the 500,000+ active duty, Guard, and Reserve enlisted force. Before becoming CMSAF she served in a range of operational and leadership roles across the Air Force including special operations support. Since retiring she has transitioned to the private sector with a focus on defense technology, workforce, and leadership. Her network spans the entire enlisted and officer leadership of the Air Force, as well as key relationships across DoD civilian leadership, defense contractors, and the veterans' entrepreneurship ecosystem.",check:"No direct check. Potential advisory board candidate and warm introduction channel into Air Force procurement and defense contractor networks.",cares:"Veteran entrepreneurship|Air Force modernization|Defense workforce|Women in defense|Special operations-adjacent technology",forRosc:"Opens the Air Force and special operations-adjacent network — a different slice of the DoD ecosystem than the Army relationships Rosc already has.",ask:"Advisory board conversation — her Air Force network and defense procurement relationships would be a genuine asset to Rosc's portfolio companies.",watchOut:"She was enlisted, not an officer — a meaningful distinction from the attendee's officer background. Acknowledge it; don't paper over it.",intros:"Air Force procurement leadership — her network includes the people who actually run defense technology acquisition programs at the Air Force level.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/joanne-bass",topics:["Air Force ops","Defense procurement","Veteran leadership","Women in defense","Special operations"]},
 {name:"Jill Biden",title:"Former First Lady",org:"Milken Institute",cat:"Other",subcat:"Rosc",priority:"Must meet",loc:"Wilmington, DE",party:"D",who:"Dr. Jill Biden served as First Lady of the United States from 2021 to 2025, remaining a practicing community college professor throughout — an unprecedented combination. She holds an EdD in educational leadership from the University of Delaware and has spent her career in education and women's health advocacy. Since leaving the White House she has taken on a formal role with the Milken Institute chairing their Women's Health Network. She co-founded the Joining Forces initiative with Michelle Obama, which focused on military families and veterans, giving her a genuine connection to the defense and veterans community. There is a warm existing relationship with Rosc from the Royal Society co-hosting, making this a re-introduction rather than a cold meeting.",check:"No. Philanthropic figure — no fund allocation role.",cares:"Women's health|Education access|Military families|Veterans|Healthcare policy",forRosc:"Warm existing relationship from Royal Society co-hosting. Relationship maintenance and reintroduction in the Rosc context — Joining Forces connection is the natural bridge.",ask:"Reintroduce Rosc in the context of the Milken conference and explore whether there's a Rosc Institute collaboration around veteran entrepreneurship or defense innovation.",watchOut:"Biden family under sustained political scrutiny. Keep entirely on her current work — Milken Women's Health, education, veterans. Never engage on politics or the Biden presidency.",intros:"Milken Institute leadership — she has direct relationships with the senior team running this conference, useful for Rosc Institute positioning.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/jill-biden",topics:["Women's health","Education","Healthcare access","Military families","Veterans"]},
 {name:"Martin Blessing",title:"Personal Rep for Investment, German Chancellor",org:"German Federal Government",cat:"Policy",priority:"Must meet",loc:"Berlin, Germany",party:"Non-partisan (German govt envoy)",who:"Martin Blessing is the German Chancellor's Personal Representative for Investment — a newly created role reflecting Germany's historic defense and industrial pivot following Russia's invasion of Ukraine. He is a former CEO of Commerzbank (2008–2016), a former co-head of UBS Global Wealth Management (2016–2019), and most recently was Chairman of Danske Bank (2022–2025). Blessing now serves as a direct gateway to German sovereign and state-level defense investment at a moment when Germany is deploying its unprecedented €100bn+ Sondervermögen special defense fund and committing to sustained NATO spending above 2% of GDP. This is not a ceremonial role — he is actively cultivating foreign private capital partnerships for German defense and dual-use industrial expansion. His combination of major commercial banking experience and current sovereign mandate makes him uniquely placed to bridge institutional capital and government defense priorities. He is one of three key German relationships at this conference alongside Jörg Goschin (KfW Capital) and Jens Hanefeld (German Ambassador).",check:"Indirect. Controls access to German sovereign defense capital — not an LP himself but the gateway to the people who are.",cares:"German Sondervermögen deployment|Zeitenwende industrial policy|European rearmament|Allied defense investment|German startup ecosystem",forRosc:"Gateway to German sovereign defense capital at the most strategically important moment for European defense investment in a generation.",ask:"Introduction to Jörg Goschin at KfW Capital to discuss Rosc as a US-allied defense-tech VC fund for German sovereign capital to access.",watchOut:"His Commerzbank tenure included the 2008 state bailout — public knowledge but no need to raise it.",intros:"Jörg Goschin —  {name:"Ian Bremmer",title:"President & Founder",org:"Eurasia Group / GZERO",cat:"Geo",priority:"Must meet",loc:"New York, NY",party:"Non-partisan (analyst)",who:"Ian Bremmer is the founder of Eurasia Group, which he built from a Stanford PhD dissertation into the world's dominant political risk advisory firm serving governments, central banks, and institutional investors globally. He coined the term G-Zero — a world without a single global leader — which has become the defining framework for understanding today's multipolar geopolitical landscape. He holds a PhD in political science from Stanford, is a professor at Columbia University's School of International and Public Affairs (SIPA), and has written more than ten books on geopolitics, power, and markets. His media presence spans CNN, Bloomberg, and his own GZERO platform which reaches a global elite readership. Bremmer personally advises Fortune 500 C-suites, sovereign wealth funds, and senior government officials. He is deliberately non-partisan by profession — he won't be drawn into political positions publicly — but his analytical framework is the intellectual foundation upon which Rosc's investment thesis is built.",check:"No direct check. Invaluable for Rosc Institute credibility and LP narrative validation.",cares:"G-Zero multipolar world|Great power competition|AI and national security|Geopolitical risk frameworks|US-China strategic competition",forRosc:"The most credible intellectual validator of Rosc's thesis in the world. A Bremmer collaboration tells every LP that Rosc's geopolitical framework is serious.",ask:"Contribution to Rosc Institute — a co-authored piece or keynote at the first Rosc Institute event.",watchOut:"Deliberately non-partisan by profession. Never ask him to take a political position. Match his analytical register — don't pitch the fund.",intros:"Eurasia Group clients — his institutional client base includes the SWFs and institutional investors Rosc is targeting as LPs.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/ian-bremmer",topics:["Great power competition","US-China","Geopolitical risk frameworks","AI and national security","G-Zero world"]},
 {name:"Mathieu Chabran",title:"Co-founder",org:"Tikehau Capital",cat:"VC",priority:"Must meet",loc:"Paris, France",who:"Mathieu Chabran co-founded Tikehau Capital in Paris in 2004 and has built it into one of Europe's most prominent alternative asset managers, with over €45 billion in AUM spanning private debt, private equity, real assets, and capital markets. French-born, Chabran is known for his dealmaker instincts and willingness to enter structural white spaces that larger, more cautious European institutions avoid. In 2022, Tikehau launched a dedicated European defense-tech fund — the first of its kind on the continent and by far the most significant — raising capital from major European institutional investors and corporate partners including Airbus and Thales. This makes Tikehau the closest direct structural peer to Rosc that exists anywhere: a commercially aggressive alternative asset manager with a dedicated defense-tech vehicle, operating in a geography experiencing the most dramatic increase in defense spending since the Cold War. He is commercially aggressive and will assess Rosc just as hard as Rosc assesses him.",check:"Potentially both directions — Tikehau as LP in Rosc, or Rosc as LP in Tikehau's defense fund. More likely a co-investment and LP-sharing arrangement.",cares:"European defense-tech deal flow|US LP relationships|Transatlantic co-investment|Scaling Tikehau's defense fund|European rearmament capital",forRosc:"The only person at this conference who has built exactly what Rosc is building, in Europe. European LP introductions, co-investment, and a potential formal strategic partnership.",ask:"Call with Tikehau's defense fund team to map portfolio overlap and explore a co-investment and LP-sharing arrangement — Tikehau covering European LPs for Rosc, Rosc covering US LPs for them.",watchOut:"He will probe Rosc's portfolio, team, and LP base hard. Come prepared to be assessed, not just to pitch.",intros:"European institutional LPs — his defense fund has already onboarded major European pension funds and sovereign investors, the fastest path to European LP capital for Rosc.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/mathieu-chabran",topics:["European defense-tech","Alt asset management","Defense fund strategy","LP ecosystem","European rearmament capital"]},
 {name:"Régine Clément",title:"CEO",org:"CREO Family Office Syndicate",cat:"LP",subcat:"FamilyOffice",priority:"Must meet",loc:"New York, NY",who:"Régine Clément is the CEO of CREO, the world's foremost family office co-investment syndication network, connecting ultra-high-net-worth families and their investment offices around thematic co-investment opportunities. CREO's membership spans hundreds of family offices globally, representing hundreds of billions in deployable private capital. Canadian-born, she has built CREO into the definitive platform for family offices seeking co-investment, education, and peer connection around major investment themes. Her role is fundamentally that of a convener and co-investment orchestrator — she is one of the most powerful single points of access to the family office universe that exists. CREO's membership increasingly includes families with defense, aerospace, and national security backgrounds who are looking for ways to invest in the sector alongside institutional-quality managers.",check:"Indirect — but the most efficient LP channel at the conference. One CREO relationship opens access to hundreds of family office LPs simultaneously.",cares:"Family office co-investment|UHNW network development|Thematic investment syndicates|Emerging manager access|Mission-aligned investing",forRosc:"Most efficient single meeting at the conference. One genuine CREO relationship opens hundreds of family office doors simultaneously — exactly Rosc's LP demographic.",ask:"A formal CREO co-investment syndication slot or a CREO panel on defense-tech investing to introduce Rosc to the membership.",watchOut:"Nothing significant. Build genuine relationship first — don't lead with the ask.",intros:"CREO member family offices — hundreds of UHNW families across the US, Europe, and Gulf with deployable co-investment capital. She is the single introduction that opens all of them.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/regine-clement",topics:["Family office investing","Co-investment syndication","UHNW networks","Emerging managers","Defense-adjacent family capital"]},
 {name:"Ivo Daalder",title:"CEO & Founder",org:"IHD Geopolitical Advisory",cat:"Geo",priority:"Must meet",loc:"Chicago, IL",party:"D (Obama)",who:"Ivo Daalder served as the United States Ambassador to NATO from 2009 to 2013 under President Obama, and before that as the Director for European Affairs on the National Security Council. Dutch-American, he holds a PhD in political science from MIT. He was the President of the Chicago Council on Global Affairs before founding his own geopolitical advisory practice. Daalder is one of America's deepest thinkers on NATO, transatlantic security, and the European defense architecture. With NATO under pressure over Article 5 commitments and European rearmament in full swing, he is actively engaged with both European governments and US institutional investors trying to understand the implications. He has deep personal relationships across European defense ministries, the NATO secretariat, and major European institutional investors.",check:"No direct check. Advisory board candidate and European institutional LP introduction channel.",cares:"NATO cohesion|Transatlantic defense architecture|European rearmament|Russia-Ukraine|Article 5 credibility",forRosc:"Bridges government, European capital, and institutional intelligence in a single relationship. A Daalder association opens significant European institutional doors for Rosc Institute.",ask:"Advisory board conversation or Rosc Institute contribution — a Daalder-authored piece on European defense investment would be highly credible with institutional LPs.",watchOut:"Nothing significant.",intros:"European defense ministry relationships — NATO secretariat and European government contacts directly relevant to Rosc's European LP narrative.|European institutional investors — his Chicago Council and NATO networks include pension fund and sovereign wealth contacts across Europe.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/ivo-daalder",topics:["NATO strategy","Transatlantic defense","European security","Russia-Ukraine","European defense spending"]},
 {name:"Dave DeWalt",title:"Founder & CEO",org:"NightDragon",cat:"Defense",priority:"Must meet",loc:"San Francisco, CA",who:"Dave DeWalt is one of the most important figures in American cybersecurity and defense technology. He served as CEO of McAfee and then CEO of FireEye — two of the most prominent cybersecurity companies ever built — before founding NightDragon, a purpose-built investment and advisory firm focused exclusively on cybersecurity, defense technology, and national security tech. DeWalt has spent decades building deep, personal relationships across the US intelligence community, Department of Defense, NSA, CIA, and major defense contractors. NightDragon's portfolio and advisory network spans the most important national security tech companies in the US. He sits on several corporate and advisory boards in the defense-tech ecosystem and is widely regarded as the most connected private capital figure in the US national security technology space.",check:"Co-investment and deal flow sharing — not an LP, but a peer fund with identical thesis overlap.",cares:"Cybersecurity innovation|Defense-tech VC|Intelligence community relationships|National security startups|Threat landscape",forRosc:"The most important peer conversation at this conference. NightDragon and Rosc have near-identical thesis overlap — co-investment, deal flow sharing, LP network introductions, and a formal referral partnership are all possible.",ask:"Formal co-investment relationship and deal flow sharing agreement — and warm introductions to NightDragon's LP base.",watchOut:"Nothing significant. He will assess Rosc's portfolio and team rigorously — come prepared.",intros:"Intelligence community network — his personal IC relationships are the most direct path to classified-adjacent defense technology deal flow.|NightDragon LPs — institutional investors already comfortable with defense-tech VC who could be warm LP prospects for Rosc.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/dave-dewalt",topics:["Cybersecurity VC","Defense-tech","Intelligence community","National security startups","Threat intelligence"]},
 {name:"Niall Ferguson",title:"Senior Fellow",org:"Hoover Institution, Stanford",cat:"Geo",priority:"Must meet",loc:"Stanford, CA",party:"R-leaning (conservative)",who:"Niall Ferguson is one of the most prominent historians and public intellectuals in the English-speaking world. Born in Glasgow and educated at Oxford, he is now a Senior Fellow at the Hoover Institution at Stanford. His bibliography spans financial history, empire, geopolitics, and technology — including works on the Rothschilds, the history of money, Henry Kissinger (authorized biographer), and The Square and the Tower on networks and power. Married to Ayaan Hirsi Ali. Politically center-right and consistently willing to make arguments others avoid, he has become one of the clearest public voices on great power competition, the decline of Pax Americana, and the strategic challenge posed by China. His Substack and podcast reach a global elite readership spanning government officials, institutional investors, and senior executives who are exactly the audience Rosc Institute wants to reach.",check:"No direct check. Invaluable for Rosc Institute intellectual credibility.",cares:"Great power competition|Decline of Pax Americana|Financial history|Kissinger legacy|AI and civilizational risk",forRosc:"The most credible conservative intellectual validator of Rosc's geopolitical thesis. A Ferguson-authored piece or Rosc Institute keynote would reach exactly the institutional LP audience Rosc is building.",ask:"Rosc Institute contribution — a co-authored essay or keynote at the inaugural Rosc Institute event.",watchOut:"Has made controversial public statements on immigration and race that generated significant backlash. Do not engage on those topics.",intros:"Hoover Institution network — his colleagues include senior former government officials and defense policy figures directly relevant to Rosc's advisory network.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/niall-ferguson",topics:["Great power competition","Empire and decline","Financial history","Kissinger legacy","AI and civilizational risk"]},
 {name:"Nathaniel Fick",title:"Chief Strategy Officer",org:"Cerberus Capital Management",cat:"Defense",priority:"Must meet",loc:"Washington DC",party:"D-leaning (Obama/Biden appointee)",who:"Nathaniel Fick is one of the most remarkable national security figures in the United States. A Marine Corps officer who served in both Afghanistan and Iraq, he wrote One Bullet Away, one of the most respected first-person accounts of ground combat in a generation. He then moved to Harvard Business School, RAND, and eventually CNAS, where he served as CEO. Under Biden he was confirmed as the first-ever US Ambassador for Cyberspace and Digital Policy — a cabinet-level role navigating AI governance, internet freedom, and digital statecraft. He is now Chief Strategy Officer for Equities at Cerberus Capital Management, a global alternative investment firm with approximately $70 billion in assets, focused on private equity, supply chain resilience, and national security technology. Fick embodies the national security-to-private sector pipeline that Rosc is designed to serve.",check:"Potential LP introduction through Cerberus — not a direct LP himself.",cares:"Cyber diplomacy|Defense-tech commercialization|Marine Corps leadership|National security strategy|AI governance",forRosc:"Combat veteran, cyber ambassador, and now at one of the world's largest defense-oriented PE firms — the most complete national security-to-private sector biography at this conference. Strong advisory board candidate.",ask:"Advisory board conversation — his CNAS network, cyber policy experience, and Cerberus relationships would be genuinely valuable to Rosc.",watchOut:"Nothing significant.",intros:"CNAS alumni network — the most important think tank in US defense policy; his relationships span DoD, State, and the intelligence community.|Cerberus LP base — major institutional investors already comfortable with defense-oriented private capital.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/nathaniel-fick",topics:["Cyber diplomacy","Defense-tech","Marine Corps leadership","National security","Private defense capital","AI governance"]},
 {name:"Michael Froman",title:"President",org:"Council on Foreign Relations",cat:"Geo",priority:"Must meet",loc:"New York, NY",party:"D (Obama)",who:"Michael Froman is the President of the Council on Foreign Relations — the most prestigious US foreign policy institution, a membership organization of 5,000 senior government officials, CEOs, academics, and media leaders that has shaped American foreign policy thinking for a century. He served as US Trade Representative (cabinet level) and as Deputy National Security Advisor under Obama. Before government he spent years at Citigroup in senior roles. Most recently before CFR he was Vice Chairman and President at Mastercard. Princeton University (BA), Oxford University (DPhil in international relations), and Harvard Law School. Froman is deeply embedded in the bipartisan national security establishment. At CFR he has prioritized technology, AI, and great power competition as central research themes — directly overlapping with Rosc's thesis. The CFR membership is in many respects a directory of exactly the institutional LP audience Rosc is building.",check:"No direct check. CFR is the premier institutional gateway to Rosc's LP audience.",cares:"US foreign policy|AI and geopolitics|Great power competition|CFR research agenda|Technology and national security",forRosc:"CFR is the premier convener of the audience Rosc wants as LPs. A Rosc Institute partnership — joint programming, sponsored report, or contributed piece — would be transformative for institutional credibility.",ask:"Rosc Institute partnership with CFR — a joint publication or panel series on defense-tech investing and geopolitical risk.",watchOut:"16 years at Citigroup between government stints — sensitive given Citi's 2008 role. No need to raise it.",intros:"CFR membership — 5,000 senior government officials, institutional investors, and executives who are exactly Rosc's LP and partner audience.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/michael-froman",topics:["US trade policy","National security","CFR research","AI and geopolitics","Great power competition"]},
 {name:"Stephen Gilmore",title:"CIO",org:"CalPERS",cat:"LP",priority:"Must meet",loc:"Sacramento, CA",who:"Stephen Gilmore is the Chief Investment Officer of CalPERS, the California Public Employees' Retirement System — the largest public pension fund in the United States with approximately $500 billion in assets under management. New Zealand-born, Gilmore served as CIO of the New Zealand Superannuation Fund from 2019 to 2024, where he nearly doubled the fund's size. He joined CalPERS as CIO in July 2024. CalPERS has historically been one of the most politically constrained large institutional investors in the US, subject to state legislative mandates and ESG-related limitations. However, Gilmore has worked to expand the alternatives program, and CalPERS operates an emerging manager program specifically designed to access smaller and first-time fund managers. Rosc's no-management-fee structure is a genuine structural advantage in conversations with cost-sensitive pension CIOs.",check:"Yes — pension LP. Long timeline but massive eventual prize. CalPERS has a genuine emerging manager program. First commitment could be $25–100M.",cares:"Emerging manager programs|Alternatives expansion|Fee structure innovation|Long-term returns|Public accountability",forRosc:"The largest US public pension. Longest timeline LP but the no-management-fee structure is a genuine differentiator that resonates directly with his political constraints.",ask:"Understand CalPERS' emerging manager program criteria and whether Rosc's stage and thesis fit their current program parameters.",watchOut:"CalPERS has faced sustained public criticism over PE management fees — lead with the no-management-fee structure prominently.",intros:"Other CalPERS managers — his peer network spans the major US public pension CIOs who all talk to each other about emerging managers.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/stephen-gilmore",topics:["Pension fund","Alternatives","Emerging managers","Long-term investing","Public markets"]},
 {name:"Jörg Goschin",title:"CEO",org:"KfW Capital",cat:"LP",subcat:"SWF",priority:"Must meet",loc:"Frankfurt, Germany",party:"Non-partisan (KfW)",who:"Jörg Goschin leads KfW Capital, the VC and growth investment arm of KfW — Germany's state-owned development bank and one of the largest financial institutions in Europe. KfW Capital specifically invests in European VC funds and co-invests alongside them, with a mandate to accelerate Germany's innovation economy. In the wake of Russia's invasion of Ukraine and Germany's Zeitenwende strategic turning point, KfW Capital has dramatically expanded its mandate to include defense-tech, dual-use technology, and national security-relevant startups. This is government-backed capital with an explicit mission to channel into exactly the kinds of companies Rosc invests in — and it moves faster than most sovereign wealth funds because it operates with commercial VC mindset rather than purely government caution.",check:"Yes — German government LP. Actively seeking fund-level commitments in defense-adjacent VC right now. Moves with commercial VC speed.",cares:"German Zeitenwende defense deployment|KfW Capital fund mandates|European defense-tech ecosystem|Dual-use VC|Allied technology access",forRosc:"German government capital actively seeking US-allied defense-tech VC exposure right now. One of the highest-probability LP relationships at this conference.",ask:"KfW Capital fund commitment — present Rosc as a US-allied fund giving German sovereign capital VC-stage exposure to American defense-tech.",watchOut:"Nothing significant.",intros:"Martin Blessing — Chancellor's Personal Investment Representative. Goschin can reinforce the German sovereign relationship from the KfW angle.|Jens Hanefeld — German Ambassador to the US. The three together form the complete German sovereign cluster.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/jorg-goschin",topics:["German defense investment","Government VC","European startups","Zeitenwende","Dual-use tech funding"]},
 {name:"Shikha Gupta",title:"Executive Director, Alternatives",org:"Future Fund",cat:"LP",subcat:"SWF",priority:"Must meet",loc:"Melbourne, Australia",party:"Non-partisan (Future Fund)",who:"Shikha Gupta is the Executive Director of Alternatives at Australia's Future Fund, where she directly oversees the fund's approximately A$80bn+ alternatives portfolio spanning private equity, venture capital, infrastructure, and real assets. She is the person at Future Fund who actually executes LP investment decisions — running due diligence, negotiating terms, and managing manager relationships. While Raphael Arndt sets strategic direction, Gupta does the work. She has a strong background in alternative investments and a sophisticated understanding of global VC fund structures. For Rosc's purposes she is the technical LP conversation — investment thesis, portfolio construction, fee structure, co-investment rights, and portfolio company pipeline. The Arndt meeting opens the door; the Gupta meeting is where the LP relationship actually advances.",check:"Yes — she is the operational LP decision-maker. Arndt opens the door; Gupta closes the deal.",cares:"VC fund manager selection|Defense-tech allocation|Co-investment terms|Emerging manager due diligence|Portfolio construction methodology",forRosc:"The person who actually writes the check at Future Fund. Every LP relationship with Future Fund runs through her.",ask:"Run the full LP pitch — portfolio construction, co-investment terms, what distinguishes Rosc from other defense-tech VCs, and timeline for first commitment.",watchOut:"Nothing significant. Come prepared with specifics — she will ask hard questions.",intros:"Future Fund peer SWF network — her relationships with other alternatives CIOs at global SWFs are a warm introduction channel to additional LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/shikha-gupta",topics:["Alternatives portfolio","Defense-tech allocation","VC fund selection","Emerging managers","Due diligence"]},
 {name:"Blake Hall",title:"Co-founder & CEO",org:"ID.me",cat:"Defense",priority:"Must meet",loc:"McLean, VA",party:"R-leaning (Trump-aligned)",who:"Blake Hall is a former US Army Ranger who served in combat before founding ID.me, the digital identity verification platform that has become deeply embedded in US federal government infrastructure. ID.me is used by the Department of Veterans Affairs, the IRS, the Social Security Administration, and dozens of state governments — making it one of the most widely deployed government technology platforms in the country. Hall built ID.me with a national security and veteran services orientation from the beginning, and the company has navigated significant political controversy while maintaining and expanding its government relationships. He sits at the exact intersection of veteran entrepreneurship, government technology, and national security — a direct analog to the attendee's personal background and Rosc's investment thesis around dual-use government technology.",check:"Potential strategic LP or advisory relationship — not a direct fund LP.",cares:"Government technology procurement|Veteran entrepreneurship|Digital identity infrastructure|DoD and VA relationships|Federal procurement pathways",forRosc:"Both Army Rangers who built companies after service — that bond is immediate and genuine. His DoD, VA, and federal procurement network is a deal sourcing asset for portfolio companies navigating government contracting.",ask:"Advisory board conversation — his federal procurement network and DoD relationships would be directly valuable to Rosc's portfolio companies.",watchOut:"Nothing significant.",intros:"DoD and VA procurement network — direct relationships with the people who run government technology acquisition at the agencies that matter most to Rosc's portfolio.|ID.me investors — his VC backers include defense-tech-adjacent investors who could be warm LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/blake-hall",topics:["Digital identity","Government tech","Veteran entrepreneurship","Cybersecurity","Federal procurement"]},
 {name:"Jacob Helberg",title:"Undersecretary of State for Economic Affairs",org:"US State Dept",cat:"Policy",priority:"Must meet",loc:"Washington DC",party:"R (Trump appointee)",who:"Jacob Helberg is the Undersecretary of State for Economic Affairs — a Senate-confirmed position making him one of the most senior officials shaping US economic statecraft, export controls, and technology competition policy under the Trump administration. Before entering government he was a Senior Policy Advisor at Google and co-chair of the Hoover Institution's China Working Group. He authored The Wires of War, which became one of the defining texts on US-China tech competition. Helberg is among Washington's most prominent and intellectually serious technology hawks — a genuine believer that the technology competition with China is existential. His current position means he directly shapes the export control regime, foreign investment review processes, and economic statecraft tools that define the operating environment for every company in Rosc's portfolio.",check:"No direct check. Critical policy intelligence and regulatory environment relationship.",cares:"US-China technology competition|Export control regime|CFIUS review process|Economic statecraft|Critical technology designations",forRosc:"Actively shaping the policy environment Rosc's portfolio companies operate in. A relationship here is critical for the portfolio, not just LP development.",ask:"Build a channel for ongoing policy dialogue — understand his current priorities on export controls and critical technology designations.",watchOut:"Hawkish China views are ideological, not just professional — can dominate the conversation. Keep off domestic politics.",intros:"State Department economic statecraft network — his relationships with allied government officials working on technology competition policy are relevant to Rosc's international portfolio companies.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/jacob-helberg",topics:["US-China tech competition","Export controls","Critical technology policy","Economic statecraft","AI and national security"]},
 {name:"Amir Husain",title:"Chairman",org:"WorldQuant Foundry",cat:"AI",priority:"Must meet",loc:"Austin, TX",who:"Amir Husain is one of America's most important AI entrepreneurs working at the defense and national security frontier. He founded SparkCognition in Austin, building it into a leading AI platform for defense, energy, and industrial applications with significant US military contracts. He authored The Sentient Machine, one of the most substantive books on AI and its implications for warfare and society. He is now Chairman of WorldQuant Foundry, the deep tech investment and incubation arm of WorldQuant. Husain has spent his career at precisely the intersection where cutting-edge AI meets national security applications, and he has deep relationships across the US military, defense contractors, and the AI research community. As a Pakistani-American entrepreneur who has built serious defense AI companies, he represents a unique perspective on the technology and its implications.",check:"No direct check. Deal sourcing and portfolio company introduction channel.",cares:"Defense AI commercialization|Autonomous systems|DoD procurement pathways|AI governance|Dual-use technology",forRosc:"SparkCognition is the exact archetype of what Rosc invests in. His network spans DoD program managers, defense prime executives, and AI researchers simultaneously.",ask:"Deal sourcing partnership — warm introductions to defense AI companies in his network that fit Rosc's thesis.",watchOut:"Nothing significant.",intros:"SparkCognition network — defense AI founders and DoD program managers who are direct deal sourcing assets for Rosc.|WorldQuant Foundry portfolio — deep tech companies at the intersection of AI and physical world applications.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/amir-husain",topics:["AI for defense","Industrial AI","Autonomous systems","AI governance","Defense procurement"]},
 {name:"Murtaza Hussain",title:"Managing Partner",org:"Lunate",cat:"LP",subcat:"SWF",priority:"Must meet",loc:"Abu Dhabi, UAE",party:"Non-partisan (Lunate/ADQ)",who:"Murtaza Hussain leads Lunate, the Abu Dhabi sovereign alternatives platform that was spun out of ADQ (Abu Dhabi Developmental Holding Company) and commenced operations in January 2024 with approximately $115 billion in assets under management. Lunate is one of the newest and most commercially aggressive sovereign investment vehicles in the Gulf, designed to move with private equity speed rather than traditional SWF caution. ADQ itself manages critical strategic sectors for Abu Dhabi including energy, utilities, food, healthcare, and real estate — giving Lunate a unique mandate to invest across alternatives with a sovereign strategic overlay. Gulf SWFs are among the most motivated institutional investors in defense-tech globally: they need security and intelligence technology exposure for their own national security, want to diversify their sovereign wealth away from oil, and are actively cultivating relationships with allied Western defense technology companies. Hussain holds a Bachelor's in Finance and Accounting from McGill University and spent five years as CIO for Alternatives and M&A at ADQ before co-founding Lunate.",check:"Yes — Gulf SWF LP. $115bn AUM. Structured to move at PE speed. First commitment could be $50–150M. One of the highest-probability large LP relationships at this conference.",cares:"Gulf sovereign diversification|Defense-tech VC allocation|Abu Dhabi strategic interests|Alternative investments|Allied technology access",forRosc:"Abu Dhabi sovereign capital actively seeking defense-tech VC exposure, with a structure designed to move at PE speed. The most commercially aggressive Gulf LP at this conference.",ask:"Full LP pitch — thesis, portfolio, team, fee structure, co-investment access, and timeline for first commitment.",watchOut:"Nothing significant.",intros:"Abu Dhabi sovereign network — his ADQ and Lunate relationships span the broader Abu Dhabi government investment ecosystem.|Dina Powell McCormick — she knows him personally from Goldman sovereign days and can reinforce the relationship.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/murtaza-hussain",topics:["Gulf sovereign capital","Defense-tech allocation","Abu Dhabi investment","Alternatives","Strategic technology"]},
 {name:"Michele Kang",title:"Founder & CEO",org:"Cognosante",cat:"Defense",priority:"Must meet",loc:"Washington DC",who:"Michele Kang is the founder and CEO of Cognosante, a health IT and AI company that serves US federal government clients including the Department of Defense, the Department of Veterans Affairs, the Centers for Medicare and Medicaid, and the Social Security Administration. Cognosante specializes in healthcare IT modernization, AI-enabled health data systems, and benefits administration technology for government agencies — making it one of the most important health technology companies in the US federal procurement space. Korean-American, she also owns the Washington Spirit NWSL soccer team. Her dual profile as a defense-adjacent tech CEO and prominent sports team owner gives her a wide public platform. She has deep relationships across DoD health programs, VA technology leadership, and the broader federal health IT ecosystem.",check:"Potential strategic LP — not a direct fund LP.",cares:"Federal health IT|DoD and VA contracting|AI for government|Federal procurement pathways|Women in leadership",forRosc:"Cognosante's AI for DoD and VA is directly in Rosc's portfolio thesis zone. Her government contracting network is a deal sourcing asset for portfolio companies navigating federal procurement.",ask:"Warm introductions to DoD health program and VA technology leadership relevant to Rosc's portfolio companies.",watchOut:"Nothing significant.",intros:"DoD health and VA technology network — direct relationships with federal procurement decision-makers in defense health programs.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/michele-kang",topics:["Federal health IT","DoD contracting","AI for government","Women in business","Federal procurement"]},
 {name:"Vivek Lall",title:"Chief Executive",org:"General Atomics Global Corp",cat:"Defense",priority:"Must meet",loc:"San Diego, CA",who:"Vivek Lall leads General Atomics Global Corporation, the international arm of General Atomics — one of America's most strategically important private defense technology companies. General Atomics makes the MQ-9 Reaper drone — the most widely deployed armed military drone in the world — as well as advanced nuclear technologies, directed energy weapons, electromagnetic railguns, and particle accelerators for national security and scientific applications. It is privately held and has operated as a key US defense contractor since the Cold War. Lall oversees General Atomics' global business development, international partnerships, and strategic investments. He has deep relationships across the US government, allied defense ministries, and the international defense export market. Indian-born, he brings a uniquely global perspective to American defense technology.",check:"Strategic LP or co-investment partner — General Atomics is a potential investor in adjacent defense-tech companies.",cares:"Unmanned systems|Nuclear fusion|Directed energy|Defense exports|Advanced aerospace manufacturing",forRosc:"General Atomics is the single most direct defense-tech archetype at this conference — drones, directed energy, nuclear. His network is a deal sourcing and thesis validation asset of the highest order.",ask:"Strategic LP conversation and deal sourcing relationship — warm introductions to defense-tech founders in his network that fit Rosc's investment thesis.",watchOut:"Nothing significant. Do not miss this meeting.",intros:"International defense ministry network — his relationships with allied defense ministries span every country actively buying US defense technology.|Defense contractor ecosystem — relationships with the primes and their supply chains are direct deal sourcing for Rosc.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/vivek-lall",topics:["Unmanned systems","Nuclear fusion","Directed energy","Defense exports","Advanced manufacturing","Aerospace"]},
 {name:"Bentzion Levinson",title:"Founder & CEO",org:"Heven Aerotech",cat:"Defense",priority:"Must meet",loc:"Israel",who:"Bentzion Levinson founded Heven Aerotech, an Israeli defense-tech startup developing hydrogen-powered military and commercial drones. The company's core innovation is applying hydrogen fuel cell technology to unmanned aerial systems — dramatically extending range and endurance compared to battery-powered alternatives while eliminating the thermal and acoustic signatures that make conventional drones detectable. Heven operates at the intersection of two of the most important dual-use technology vectors: drone systems, which have been transformed from a novelty to a decisive battlefield factor by the war in Ukraine, and hydrogen energy, increasingly strategic for military energy independence. Israel's defense-tech ecosystem is among the most innovative in the world, with the IDF serving as a continuous proving ground for the next generation of military technology.",check:"No — direct portfolio company candidate, not an LP.",cares:"Hydrogen propulsion|Military drone technology|Israeli defense-tech ecosystem|Dual-use aviation|Defense energy independence",forRosc:"Heven is a direct co-investment candidate. His network into Israel's defense-tech ecosystem opens deal flow and technology partnerships that Rosc should systematically cultivate.",ask:"Full picture on Heven's funding status, technology maturity, and current investor conversations — assess co-investment fit. And broader Israeli defense-tech introductions.",watchOut:"Nothing significant.",intros:"Israeli defense-tech founder network — his relationships span the IDF alumni entrepreneurship community that produces some of the world's best defense-tech companies.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/bentzion-levinson",topics:["Hydrogen propulsion","Drone technology","Israeli defense-tech","Dual-use aviation","Military UAS"]},
 {name:"William H. McRaven",title:"Retired Four-Star Admiral",org:"US Navy / SOCOM",cat:"Defense",priority:"Must meet",loc:"Austin, TX",party:"D-leaning (publicly anti-Trump)",who:"Admiral William McRaven is one of the most celebrated military leaders in modern American history. He commanded US Special Operations Command (SOCOM), the joint command overseeing Navy SEALs, Army Rangers, Delta Force, and all US special operations forces. He personally planned and oversaw Operation Neptune Spear — the raid that killed Osama bin Laden in May 2011. He subsequently served as Chancellor of the University of Texas system and is the author of the bestselling Make Your Bed. McRaven is a genuine American hero and one of the most respected national security figures alive — his standing in the defense community is unimpeachable. He has been publicly and sharply critical of Donald Trump in terms unusual for a retired four-star general. He now sits on corporate and advisory boards across the defense sector including Palantir.",check:"No direct check. Advisory board anchor and institutional credibility asset of the highest order.",cares:"Special operations legacy|National security leadership|Veteran leadership development|Defense technology ethics|Military-civilian transition",forRosc:"The most credibility-building single advisory relationship Rosc could have. McRaven's association with Rosc would signal to the entire defense establishment that the firm is serious.",ask:"Advisory board conversation — his association with Rosc would be among the most credibility-building moves the firm could make.",watchOut:"Has publicly criticized Trump in unprecedented terms for a retired general. Keep entirely on national security, defense technology, and leadership. Never engage on domestic politics.",intros:"SOCOM alumni network — the most elite special operations community in the world, with deep relationships in defense technology and national security venture.|Palantir board network — co-board members and executive relationships at one of the most important defense-tech companies.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/william-mcraven",topics:["Special Operations","SOCOM","National security leadership","Military ethics","Veteran leadership"]},
 {name:"Michael R. Pompeo",title:"70th US Secretary of State",org:"US Government (Former)",cat:"Defense",priority:"Must meet",loc:"Washington DC",party:"R (Trump)",who:"Mike Pompeo served as the 70th Secretary of State under President Trump, preceded by his role as Director of the Central Intelligence Agency — making him one of very few people to have led both the CIA and the State Department. Before that he served as a US Representative from Kansas and as an Army officer and West Point graduate. Pompeo is among the most senior and well-networked national security figures in America, with relationships spanning every major intelligence service, defense ministry, and head of government of US allies globally. He is a China hawk of the most serious kind, having spent years managing the most sensitive threads of US-China strategic competition. He has transitioned to advisory and private equity work and is actively involved in national security-oriented investment activity. He is a prominent Trump loyalist and potential 2028 presidential candidate.",check:"Potential LP introduction through his national security investment network — not a direct LP.",cares:"US-China strategic competition|Intelligence community relationships|National security technology|Iran policy|Middle East strategy",forRosc:"Former CIA Director with a global intelligence network genuinely unparalleled among living Americans. His endorsement or advisory association would open doors no amount of marketing could replicate.",ask:"Advisory relationship — Pompeo's association with Rosc would open intelligence community and allied government doors that no other relationship can.",watchOut:"Deeply political — prominent Trump loyalist and potential 2028 candidate. Keep strictly on defense, intelligence, and national security technology. Never engage on domestic politics, elections, or policy controversies.",intros:"Intelligence community network — CIA, NSA, and allied service relationships that are the most direct path to classified-adjacent defense technology deal flow.|Allied government network — his relationships with heads of state and defense ministers across US allies span every geography Rosc operates in.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/michael-pompeo",topics:["CIA intelligence networks","US-China policy","Iran","Middle East strategy","National security","Defense investment"]},
 {name:"Dina Powell McCormick",title:"President & Vice Chairman",org:"Meta",cat:"Defense",priority:"Must meet",loc:"New York, NY",party:"R (Trump NSA)",who:"Dina Powell McCormick was named President and Vice Chairman of Meta in January 2026, joining the company as it deepens its alignment with the US national security and AI policy establishment. Egyptian-American, she served as Deputy National Security Advisor under President Trump from 2017 to 2018. Before government she spent 16 years at Goldman Sachs rising to the Management Committee as Global Head of the Sovereign Business — the division responsible for Goldman's relationships with governments, central banks, and sovereign wealth funds globally. In that role she built deep personal relationships with the investment decision-makers at every major Gulf SWF including QIA, ADIA, Lunate, GIC, and Temasek. Most recently before Meta she was Vice Chair and President at BDT & MSD Partners. She also maintains strong relationships across the Trump national security establishment and European heads of government. She is widely regarded as one of the most effective relationship operators in Washington and New York.",check:"Not directly. Worth more than any check — a live introduction engine to Gulf SWF decision-makers who are all at this conference.",cares:"Meta AI policy|Gulf sovereign relationships|US-Middle East diplomacy|National security technology|Transatlantic capital",forRosc:"The single most connected person to Gulf SWF LP decision-makers at this conference. A warm call from her to Sipahimalani, Pirzada, or Hussain is worth months of cold outreach.",ask:"Warm introductions to Rohit Sipahimalani at Temasek and Mohsin Pirzada at QIA — she knows both personally from Goldman sovereign days.",watchOut:"Politically sensitive position straddling Trump world and Silicon Valley. Keep off domestic politics, elections, and anything Biden-era entirely.",intros:"Rohit Sipahimalani — CIO, Temasek (~$300bn). Knows him personally from Goldman sovereign days managing the Temasek relationship.|Mohsin Pirzada — Head of Funds, QIA (~$475bn). Direct LP decision-maker. Personal Goldman sovereign relationship.|Murtaza Hussain — Managing Partner, Lunate (~$105bn). Gulf sovereign relationship built across NSA and Goldman roles.|Eric Wilmes — President Americas, GIC (~$770bn). Singapore sovereign relationship from Goldman global coverage.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/dina-powell-mccormick",topics:["US national security","Goldman sovereign fund network","Meta AI policy","Middle East","Gulf sovereign relationships"]},
 {name:"Rohit Sipahimalani",title:"CIO",org:"Temasek",cat:"LP",subcat:"SWF",priority:"Must meet",loc:"Singapore",party:"Non-partisan (Temasek)",who:"Rohit Sipahimalani is the Chief Investment Officer of Temasek, Singapore's sovereign investment company with approximately $300 billion in assets under management. Originally from India, he spent 11 years at Morgan Stanley — including as Co-Head of Asia Pacific M&A — before joining Temasek in 2008. He has risen to the top investment role at one of the most sophisticated and commercially aggressive sovereign investors in the world. Temasek is not a typical SWF — it operates with the speed and conviction of a top-tier private equity firm, takes concentrated positions, and has a history of being an early and bold investor in emerging themes. Sipahimalani has specifically articulated Temasek's intention to increase its exposure to AI infrastructure, dual-use technology, and defense-related investments. He is known for intellectual rigor and genuine engagement with investment thesis — he will form a view and move, not defer indefinitely like most SWF CIOs.",check:"Yes — the highest-priority LP conversation at this conference. Temasek moves with PE speed. First commitment likely $50–200M.",cares:"Defense-tech VC allocation|AI infrastructure|Singapore strategic interests|Emerging technology|Commercial returns with sovereign overlay",forRosc:"Temasek is the highest-probability large LP relationship at this conference. Sophisticated, commercially aggressive, already moving into defense-tech, and structured to move fast.",ask:"Full LP pitch — thesis, portfolio, team, fee structure, co-investment access. Come fully prepared. Temasek will form a view and move.",watchOut:"GIC and Temasek are separate entities with distinct mandates — treat as two different LP conversations.",intros:"Frederick Teo — CEO, GenZero (Temasek-backed). Also at this conference; opens the broader Temasek ecosystem.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/rohit-sipahimalani",topics:["Sovereign wealth","Defense-tech","Singapore investment","AI infrastructure","Emerging markets"]},
 {name:"Gary Steele",title:"CEO",org:"Shield AI",cat:"Defense",priority:"Must meet",loc:"San Diego, CA",who:"Gary Steele is the CEO of Shield AI, widely considered one of the most important defense AI companies in America. Shield AI builds autonomous military AI systems — most notably Hivemind, an AI pilot designed to fly military aircraft without GPS, communications links, or a human pilot, now operational in US Air Force and Navy programs. Shield AI has raised $1.4bn+ and is valued at $5.6bn. Steele is a veteran enterprise technology scaling CEO: he founded Proofpoint, led Splunk through a $28bn Cisco acquisition, and was President of Go-to-Market at Cisco before joining Shield AI in May 2025. He represents a rare combination — a proven enterprise software scaling executive applying that capability to defense AI at a critical inflection point.",check:"Strategic peer — not an LP. Co-investment, deal flow sharing, and thesis validation.",cares:"Autonomous military systems|Defense AI scaling|DoD procurement|Enterprise software applied to defense|International defense markets",forRosc:"Shield AI is exactly the kind of company Rosc invests in. Steele's enterprise scaling background makes him an unusually sophisticated peer on what defense-tech companies actually need from investors.",ask:"Deal flow sharing and co-investment relationship — and warm introductions to other defense-AI founders in his network.",watchOut:"Nothing significant. Do not miss this meeting.",intros:"Shield AI investor network — a16z, Point72, and other institutional investors in Shield AI who could be warm LP prospects for Rosc.|Defense AI founder community — his relationships span the most important autonomous systems companies in the US.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/gary-steele",topics:["Autonomous military AI","Defense-tech scaling","DoD contracting","AI pilots","National security tech"]},
 {name:"Jake Sullivan",title:"Kissinger Professor",org:"Harvard Kennedy School",cat:"Policy",priority:"Must meet",loc:"Cambridge, MA",party:"D (Biden NSA)",who:"Jake Sullivan served as National Security Advisor to President Biden from 2021 to 2025, making him the architect of the most consequential US national security policy in a generation. Under his direction the White House produced the first National Security Strategy to name AI as a critical national security priority, coordinated the CHIPS Act to re-shore semiconductor manufacturing, and built the framework for semiconductor export controls targeting China. Sullivan is widely regarded as one of the most intellectually serious national security officials of his generation — Yale Law, Oxford Rhodes Scholar. At the Kennedy School he holds the Kissinger Chair, teaching courses on statecraft and US national security strategy. Sullivan's policy legacy — the specific regulations, strategies, and frameworks he authored — directly governs the operating environment for Rosc's entire portfolio.",check:"No direct check. Critical policy intelligence and Rosc Institute intellectual credibility.",cares:"US national security AI strategy|Semiconductor policy|Indo-Pacific strategy|AI governance frameworks|China competition",forRosc:"He wrote the rules Rosc's portfolio companies operate under. A relationship with Sullivan is critical policy intelligence and transformative Rosc Institute credibility.",ask:"Rosc Institute collaboration — a Sullivan-authored piece or co-hosted event on national security and AI investment would be the single most credible positioning move Rosc can make.",watchOut:"Faces criticism over Biden administration Gaza policy. Avoid entirely — keep strictly on tech, AI policy, and Indo-Pacific.",intros:"Harvard Kennedy School network — his colleagues and the national security policy community he built span government, think tanks, and private sector across defense and AI.|Biden NSC alumni — the team he built now spans the defense and AI policy space in every relevant institution.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/jake-sullivan",topics:["National security AI strategy","Export controls","Chip policy","Indo-Pacific strategy","Ukraine policy"]},
 {name:"Mohsin Pirzada",title:"Head of Funds",org:"Qatar Investment Authority",cat:"LP",subcat:"SWF",priority:"Must meet",loc:"Doha, Qatar",party:"Non-partisan (QIA)",who:"Dr. Mohsin Pirzada is the Head of Funds at the Qatar Investment Authority, one of the world's largest sovereign wealth funds with approximately $475 billion in assets under management. He leads the external manager and co-investment program encompassing all major public and private asset classes — making him the operational LP decision-maker for fund-level commitments at QIA. Pakistani by background, he holds a PhD in Nuclear Material Physics from Imperial College London and previously worked as a structured credit trader at Solent Capital, where he helped lead the issuance of Europe's first CDO-squared transaction. His technical background in nuclear physics combined with 20+ years of cross-asset investment experience gives him a genuinely sophisticated lens on deep-tech and defense-adjacent investment. He is actively involved in developing Qatar's domestic VC ecosystem alongside his external manager responsibilities.",check:"Yes — direct LP decision-maker. He is the person who evaluates and commits to external fund managers at QIA. This is not a relationship contact.",cares:"QIA fund allocations|Defense-tech exposure|Qatar VC ecosystem development|Alternative investment programs|Gulf sovereign diversification",forRosc:"The operational LP decision-maker at one of the world's largest SWFs. He specifically manages fund allocations — come with the full pitch.",ask:"Full LP pitch — QIA fund commitment. Understand their current defense-tech allocation thesis and what they need from an emerging manager.",watchOut:"Nothing significant.",intros:"Ali bin Ahmed Al Kuwari — Qatar Finance Minister. The senior sovereign relationship above Pirzada at QIA; both are at this conference.|Dina Powell McCormick — knows Pirzada personally from Goldman sovereign days and can reinforce the relationship.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/mohsin-pirzada",topics:["QIA fund strategy","Gulf sovereign capital","Defense-tech","LP due diligence","Alternative investments"]},
 {name:"Frederick Pollock",title:"CIO",org:"GCM Grosvenor",cat:"LP",priority:"Must meet",loc:"Chicago, IL",who:"Frederick Pollock is the Chief Investment Officer of GCM Grosvenor, one of the world's largest alternative asset management firms with approximately $87 billion in assets under management. What makes GCM Grosvenor uniquely valuable for Rosc is their specialization: they are one of the foremost institutional allocators specifically focused on emerging managers — first-time and second-time fund managers who lack the institutional track record of established firms. GCM Grosvenor has dedicated programs for manager diversity, emerging manager access, and first-time fund investments across private equity, hedge funds, real assets, and infrastructure. They have been a first institutional check for dozens of managers who are now blue-chip names. Pollock has a background spanning Morgan Stanley merchant banking, Deutsche Bank, Harvard Law, and University of Nevada.",check:"Yes — the most targeted LP prospect at this conference for Rosc's current fund stage. GCM Grosvenor's core business is finding and backing exactly what Rosc is.",cares:"Emerging manager selection|First-time fund programs|Manager diversity|Alternatives portfolio construction|Defense-adjacent investing",forRosc:"GCM Grosvenor specifically exists to find and back first and second-time fund managers. This is not a courtesy meeting — they are literally looking for what Rosc is.",ask:"Full LP pitch. Understand their current emerging manager program criteria, whether Rosc's thesis and stage fit, and what their process looks like from here.",watchOut:"Nothing significant. Treat this as the most important formal pitch meeting at the conference.",intros:"GCM Grosvenor LP network — their allocator relationships span major pensions, endowments, and sovereign funds, and a GCM endorsement carries significant weight with peers.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/fred-pollock",topics:["Emerging manager programs","Alternatives","Fund-of-funds","Manager selection","First-time funds"]},
 {name:"David M. Rubenstein",title:"Co-founder & Co-chairman",org:"Carlyle",cat:"VC",priority:"Must meet",loc:"Washington DC",party:"D-leaning (Carter admin)",who:"David Rubenstein co-founded The Carlyle Group in Washington DC in 1987 — a firm originally built almost entirely on relationships with former senior US government officials and defense contracts — and grew it into one of the defining private equity firms of the past four decades, managing $441 billion in assets under management today. A graduate of Duke and University of Chicago Law, he served as Deputy Domestic Policy Advisor under President Carter before co-founding Carlyle. He is now a prominent philanthropist, Bloomberg TV interviewer, and author. His personal relationships span every US president since Carter, every major global head of state, and virtually every significant institutional investor in the world. He personally owns rare historical documents including copies of the Magna Carta that he has loaned to national institutions. He is a genuinely beloved figure in the DC establishment. He is also the principal owner and Chairman/CEO of Major League Baseball's Baltimore Orioles, which he acquired in 2023.",check:"No direct check. Invaluable DC network and LP introduction channel.",cares:"US defense investment history|DC establishment relationships|Philanthropy|Historical preservation|Private equity legacy",forRosc:"Carlyle was built on the exact thesis Rosc articulates. His DC, DoD, and intelligence community network is unparalleled for introductions to policymakers and institutional LPs.",ask:"Warm introductions to senior DC policymakers and institutional LP relationships — and any perspective he has on the current defense-tech investing moment.",watchOut:"Carlyle's early defense focus attracted sustained merchants-of-death criticism in the 2000s — he is fully aware. Don't raise it.",intros:"DC establishment network — his relationships span every US president since Carter, major defense officials, and intelligence community leaders.|Carlyle LP network — the most valuable institutional LP address book in private equity, built over 37 years.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/david-rubenstein",topics:["Private equity","Defense investing history","Washington policy","Philanthropy","Global LP network"]},
 {name:"John E. Shaw",title:"Former Deputy Commander",org:"US Space Command",cat:"Defense",priority:"Must meet",loc:"Colorado Springs, CO",party:"Non-partisan (military)",who:"General John Shaw (retired) served as the Deputy Commander of United States Space Command — the combatant command responsible for all US military space operations including missile warning, satellite communications, space domain awareness, and offensive and defensive space operations. He oversaw a period of dramatic expansion in military space capabilities as China and Russia developed anti-satellite weapons, jamming systems, and directed energy platforms capable of threatening US space assets. After retiring he joined NewSpace Capital's advisory board, directly bridging military space doctrine with commercial space investment. He has deep relationships across Space Command, Air Force Space Command, National Reconnaissance Office, and the broader US military space enterprise. His understanding of actual military space requirements is operationally specific in a way that few civilians can match.",check:"No direct check. Advisory board candidate and space-tech deal sourcing asset.",cares:"Military space operations|Space domain awareness|Counter-space threats|Dual-use satellite technology|Commercial space defense applications",forRosc:"His operational knowledge of what the military actually needs from space technology is invaluable for due diligence on space-tech portfolio companies.",ask:"Advisory board conversation — his Space Command network and operational space requirements knowledge would be directly valuable to Rosc's space-tech portfolio.",watchOut:"Nothing significant.",intros:"Space Command network — his relationships include the people who actually operate and procure US military space systems, the most direct path to space-tech deal sourcing.|NewSpace Capital — his advisory board colleagues and portfolio companies are direct co-investment prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/john-shaw",topics:["Military space strategy","Dual-use satellites","Space Command","Commercial space","Space domain awareness"]},
 {name:"Thomas Tull",title:"Co-chairman",org:"TWG Global",cat:"Defense",priority:"Must meet",loc:"Pittsburgh, PA",who:"Thomas Tull is best known as the founder and former CEO of Legendary Entertainment — the production and financing company behind The Dark Knight trilogy, Inception, 300, and Godzilla — which he built using institutional private equity financing applied to Hollywood for the first time at scale, before selling to Wanda Group for $3.5 billion in 2016. Since then he has pivoted sharply toward technology and national security investing. He co-chairs TWG Global alongside former NSC Senior Director Amos Hochstein — a national security-focused investment platform sitting at the intersection of energy security, critical infrastructure, and defense technology. He is also a part-owner of the Pittsburgh Steelers. His combination of large-scale capital deployment experience, media and narrative expertise, and national security investment focus makes him an unusual and valuable peer.",check:"Potential LP or co-investment partner through TWG Global's national security-focused platform.",cares:"National security investment|Energy security|Critical infrastructure|Defense-adjacent capital deployment|Media and narrative strategy",forRosc:"TWG Global's national security focus makes this a direct peer and potential co-investment conversation. His media background is also an asset for Rosc's public narrative and LP storytelling.",ask:"Co-investment conversation on specific defense-tech companies and whether there is a formal TWG-Rosc partnership worth pursuing.",watchOut:"Nothing significant.",intros:"Amos Hochstein — his TWG Global co-chair. Former NSC Senior Director for Energy with live government intelligence networks.|TWG Global LP and co-investor network — institutional capital already committed to national security-focused investment.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/thomas-tull",topics:["National security investing","Defense-adjacent capital","AI and media","Technology investment","Critical infrastructure"]},
