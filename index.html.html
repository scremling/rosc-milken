 {name:"Hiromichi Mizuno",title:"Founder & CEO",org:"Good Steward Partners",cat:"LP",subcat:"SWF",priority:"Strong target",loc:"Tokyo, Japan",party:"Non-partisan (GPIF)",who:"Hiromichi Mizuno is the Executive Managing Director and Global CIO of SoftBank Group, one of the most influential technology investment vehicles in the world. Before SoftBank he served as CIO of Japan's Government Pension Investment Fund (GPIF) — the world's largest pension fund at approximately $1.7 trillion — where he pioneered a major shift toward ESG integration and alternative investments, transforming how major institutional investors globally think about long-term capital allocation. He is one of the most globally networked institutional investment figures in Japan, with relationships spanning SoftBank portfolio companies, Japanese government, global LP networks, and the broader technology investment ecosystem. His SoftBank role gives him direct visibility into the most important global technology companies at every stage.",check:"Yes — potential LP through SoftBank or introductions to Japanese institutional capital.",cares:"Technology investing|ESG and sustainable finance|Japanese institutional capital|SoftBank portfolio|Long-horizon sovereign investing",forRosc:"Bridge to Japanese institutional capital and SoftBank's global technology network — two distinct LP and deal sourcing channels in one relationship.",ask:"Whether SoftBank or his Japanese institutional network has appetite for defense-tech VC exposure and what that conversation looks like.",watchOut:"SoftBank's Vision Fund has had very public losses — don't reference it. Focus on his GPIF legacy and current SoftBank role.",intros:"Japanese institutional investor network — his GPIF legacy gives him relationships with every major Japanese pension fund and sovereign investor.|SoftBank portfolio network — exposure to the most important global technology companies at growth and late stage.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/hiromichi-mizuno",topics:["Japanese pension capital","Long-term investing","ESG","GPIF legacy","Asian institutional investors"]},
 {name:"Ruth Porat",title:"President & CIO",org:"Alphabet and Google",cat:"AI",priority:"Strong target",loc:"San Francisco, CA",who:"Ruth Porat is the President and Chief Investment Officer of Alphabet and Google, having previously served as CFO — one of the most senior financial executives in the technology industry. Before Google she was CFO of Morgan Stanley. She is now responsible for Alphabet's strategic investments, including Google Ventures and the broader Alphabet investment portfolio that spans AI, life sciences, and deep technology. Porat has been one of the most important figures in aligning Silicon Valley with Washington's national security and AI policy agenda — she has testified before Congress, engaged with DoD on AI policy, and is a prominent voice on technology and governance. Her Alphabet investment role gives her visibility into the most important AI and technology companies globally.",check:"Potential strategic LP or co-investor through Alphabet's investment vehicles.",cares:"AI and technology investment|Alphabet strategic capital|Technology governance|Silicon Valley-Washington relations|Deep tech investing",forRosc:"Alphabet's investment ecosystem and Porat's Washington relationships create both LP capital and deal sourcing opportunities in the AI defense-tech overlap.",ask:"Whether Alphabet's strategic investment program has appetite for defense-tech VC co-investment or fund exposure.",watchOut:"Google faces sustained antitrust and regulatory scrutiny — keep off tech regulation.",intros:"Alphabet investment network — Google Ventures and Alphabet's direct investments span the most important AI and deep tech companies globally.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/ruth-porat",topics:["AI investment strategy","Alphabet capital","Google Ventures","AI infrastructure"]},
 {name:"Erin Price-Wright",title:"General Partner",org:"Andreessen Horowitz (a16z)",cat:"VC",priority:"Strong target",loc:"San Francisco, CA",who:"Erin Price-Wright is a Partner at In-Q-Tel, the CIA's venture capital arm — the most strategically important defense-tech investment organization in the US government. In-Q-Tel identifies, invests in, and accelerates the development of commercial technology that is relevant to the CIA and the broader US intelligence community. Every company In-Q-Tel invests in has been vetted for intelligence community relevance, making it the single best signal that a technology is both commercially viable and strategically important. In-Q-Tel partners are deeply embedded in the intelligence community's technology requirements and have ongoing relationships with the program managers, contracting officers, and operational units that buy technology across the IC.",check:"No direct check — but In-Q-Tel co-investment is a thesis validation signal worth more than any LP check.",cares:"Intelligence community technology|Dual-use commercial tech|IC procurement pathways|Emerging tech scouting|National security applications",forRosc:"In-Q-Tel co-investment in a Rosc portfolio company is the single most credible signal that a defense-tech company is genuinely IC-relevant. Her network opens every IC program manager and contracting officer.",ask:"Co-investment relationship and deal flow sharing — and whether any current Rosc portfolio companies fit In-Q-Tel's current IC technology priorities.",watchOut:"In-Q-Tel operates with significant discretion — don't push for details on specific IC programs or requirements.",intros:"IC program manager network — her relationships with intelligence community technology buyers are the most direct path to IC-relevant deal flow for Rosc.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/erin-price-wright",topics:["Defense-tech VC","American Dynamism","a16z portfolio","National security startups"]},
 {name:"Francesco Sciortino",title:"Co-founder & CEO",org:"Proxima Fusion",cat:"Defense",priority:"Strong target",loc:"Munich, Germany",who:"Francesco Sciortino is the CEO of Proxima Fusion, a German deep-tech startup developing commercial nuclear fusion reactors based on the stellarator design pioneered at the Max Planck Institute for Plasma Physics. Proxima has raised significant venture capital from top European and US investors and is one of the most credible fusion startups globally, benefiting from a decade of world-leading stellarator research at Max Planck. Fusion energy, if successfully commercialized, would be the most transformative dual-use technology of the 21st century — with applications spanning unlimited clean energy for military installations, naval propulsion, and eventual civilian grid power. Proxima's German base also makes it a natural bridge into KfW Capital and European defense-tech investment networks.",check:"No direct check — direct portfolio company candidate.",cares:"Nuclear fusion commercialization|Stellarator technology|Deep-tech venture funding|European science ecosystem|Clean energy security",forRosc:"Proxima is a direct portfolio company candidate — fusion energy is the ultimate dual-use technology. His German base also opens KfW Capital and European defense-tech networks.",ask:"Full picture on Proxima's funding status, technology roadmap, and current investor conversations — assess co-investment fit.",watchOut:"Fusion timelines are notoriously optimistic — assess technical milestones rigorously.",intros:"European deep-tech investor network — his relationships span the investors and scientists behind Europe's most important deep-tech startups.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/francesco-sciortino",topics:["Fusion energy","German deep-tech","Max Planck spinout","Clean energy"]},
 {name:"Kristen Silverberg",title:"President & COO",org:"Business Roundtable",cat:"Policy",priority:"Strong target",loc:"Washington DC",party:"R (Bush)",who:"Kristen Silverberg is a Managing Director at the Institute of International Finance (IIF), the global association of financial institutions covering 400+ member firms across banking, investment management, and insurance globally. Before IIF she served as US Ambassador to the European Union and as a senior White House official under President George W. Bush. Her combination of senior diplomatic experience and current role at the center of the global financial services industry makes her a uniquely placed network connector — she knows both the policy officials who shape the defense investment environment and the institutional investors who deploy capital within it.",check:"No direct check. LP introduction channel through IIF member network.",cares:"Global financial policy|Banking regulation|Transatlantic capital|European relations|Defense investment policy",forRosc:"IIF's 400+ member institutions include every major bank, pension, and sovereign fund in the world. Her network bridges DC policy and global institutional capital.",ask:"Warm introductions to IIF member institutions — specifically sovereign funds and pension investors with defense-tech appetite.",watchOut:"Nothing significant.",intros:"IIF member network — 400+ global financial institutions spanning banks, pension funds, and sovereign wealth funds, all potential Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/kristen-silverberg",topics:["US-EU relations","CEO policy agenda","Trade policy","AI regulation"]},
 {name:"Daniel Simkowitz",title:"Co-president",org:"Morgan Stanley",cat:"LP",priority:"Strong target",loc:"New York, NY",who:"Daniel Simkowitz is Co-President of Morgan Stanley, one of the world's largest financial institutions with over $1.5 trillion in assets under management. He was promoted to Co-President in January 2024 and now leads the Institutional Securities Group. Previously he spent eight years as Head of Morgan Stanley Investment Management (MSIM), where he led major acquisitions including Eaton Vance. He is responsible for the full spectrum of Morgan Stanley's investment management businesses including mutual funds, private equity, real assets, and alternatives distribution. Morgan Stanley's wealth management platform reaches more ultra-high-net-worth clients and family offices than virtually any other institution in the world — their private bank alone manages over $500 billion. Simkowitz controls both the institutional investment management business and the channel through which those products are distributed to Morgan Stanley's enormous wealth management client base.",check:"Major LP channel — Morgan Stanley IM manages $1.5 trillion and distributes to UHNW clients globally. One relationship here opens both institutional and wealth management capital.",cares:"Investment management strategy|UHNW distribution|Alternatives expansion|Morgan Stanley platform|Institutional capital formation",forRosc:"Morgan Stanley's UHNW wealth management platform is one of the largest single pools of deployable private capital in the world. A distribution relationship here is transformative for LP formation.",ask:"Whether Morgan Stanley's alternatives distribution platform has appetite for a defense-tech VC fund and what their emerging manager process looks like.",watchOut:"Nothing significant.",intros:"Morgan Stanley UHNW client base — one of the largest concentrations of deployable private capital in the world, exactly Rosc's LP demographic.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/daniel-simkowitz",topics:["Morgan Stanley strategy","Institutional LP","Fund placement","Wealth management"]},
 {name:"Pete Stavros",title:"Co-head, Global PE",org:"KKR",cat:"VC",priority:"Strong target",loc:"New York, NY",who:"Pete Stavros is a Co-Head of Global Private Equity at KKR and one of the most innovative private equity practitioners of his generation. He is best known for pioneering broad-based employee ownership programs across KKR's portfolio companies — making tens of thousands of workers into shareholders with real upside — which has become a widely studied and imitated model in PE. He is also the co-founder of Ownership Works, a nonprofit expanding employee ownership across private equity more broadly. KKR is one of the most important alternative asset managers in the world with over $600 billion in AUM and significant national security, defense, and government services portfolio exposure. Stavros is personally well-networked across both the PE industry and the growing movement to align worker and investor interests.",check:"Potential LP introduction through KKR's network — not a direct fund LP.",cares:"Employee ownership models|KKR private equity|Worker capitalism|PE innovation|Defense portfolio companies",forRosc:"KKR's defense portfolio and LP network are direct resources. Stavros's personal network spans the PE industry and institutional LP base.",ask:"Warm introductions to KKR's defense-adjacent portfolio companies and LP relationships.",watchOut:"Nothing significant.",intros:"KKR LP network — one of the most valuable institutional LP address books in private equity, spanning every major pension, sovereign, and endowment globally.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/pete-stavros",topics:["Employee ownership","KKR strategy","Private equity","Defense infrastructure"]},
 {name:"Barry Sternlicht",title:"Chairman & CEO",org:"Starwood Capital Group",cat:"LP",subcat:"FamilyOffice",priority:"Strong target",loc:"Miami, FL",who:"Barry Sternlicht is the Chairman and CEO of Starwood Capital Group, the $115 billion+ AUM opportunistic investment platform he founded in 1991. One of the most prominent and outspoken real estate and alternative investment executives in the world, Sternlicht is famous for his willingness to make large contrarian bets and his public commentary on the economy, Federal Reserve policy, and capital markets. He has been one of the most vocal critics of the Federal Reserve's interest rate policy and has a high media profile through CNBC, Bloomberg, and industry conferences. Miami-based, he operates across real estate, credit, and opportunistic capital with a genuinely global footprint. As a UHNW individual himself with significant personal capital, he is simultaneously an LP prospect and an introduction channel to other UHNW investors.",check:"UHNW LP — Sternlicht himself has significant personal capital and Starwood manages capital for many UHNW families who are natural Rosc LP prospects.",cares:"Opportunistic capital deployment|Real estate macro|Federal Reserve policy|Contrarian investing|Miami capital ecosystem",forRosc:"UHNW LP prospect who moves fast when interested. Lead with the thesis; he makes quick decisions when the framing resonates.",ask:"Whether Starwood or his personal capital has appetite for a defense-tech VC fund as part of their alternatives allocation.",watchOut:"Publicly and repeatedly critical of Federal Reserve policy — a live topic for him. Don't wade in.",intros:"Starwood UHNW co-investor network — the high-net-worth families and individuals who invest alongside Starwood are natural Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/barry-sternlicht",topics:["Alternative investing","Real estate","Opportunistic capital","Macro views"]},
 {name:"Mark Suzman",title:"CEO",org:"Bill & Melinda Gates Foundation",cat:"LP",priority:"Strong target",loc:"Seattle, WA",who:"Mark Suzman is the CEO of the Bill & Melinda Gates Foundation, the world's largest private charitable foundation with an endowment of approximately $70 billion. Before joining the Gates Foundation he held senior roles at UNDP and the International Crisis Group, and has spent his career at the intersection of global health, poverty, and development. The Gates Foundation's investment arm manages the endowment with a returns orientation, including significant alternatives exposure. More relevant for Rosc is the foundation's growing interest in dual-use technologies that address both global health security and defense-adjacent challenges — pandemic preparedness, biosurveillance, and health system resilience all sit at the intersection of civilian and defense applications.",check:"Indirect — Gates Foundation endowment allocates to alternatives but with significant mission alignment criteria.",cares:"Global health|Pandemic preparedness|Vaccine equity|Agricultural development|Foundation strategy",forRosc:"Gates Foundation endowment capital and the biodefense and health security overlap between their mission and Rosc's thesis. Biosurveillance and pandemic preparedness are genuinely dual-use.",ask:"Whether the Gates Foundation endowment has appetite for defense-tech VC with a dual-use health security thesis.",watchOut:"Mission alignment is non-negotiable for the Gates Foundation — the pitch must be genuine on civilian benefit, not performative.",intros:"Global health and biosecurity network — his relationships span WHO, CDC, NIH, and the biotech companies working on pandemic preparedness and health security.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/mark-suzman",topics:["Global health","AI for development","Biosecurity","Philanthropic capital"]},
 {name:"Paul Taubman",title:"Chairman & CEO",org:"PJT Partners",cat:"LP",priority:"Strong target",loc:"New York, NY",who:"Paul Taubman is the founder and CEO of PJT Partners, a boutique investment bank focused exclusively on advisory work — restructuring, M&A, shareholder advisory, and fundraising — with particular expertise in complex, sensitive transactions for major corporates, sovereign entities, and financial institutions. Before founding PJT he spent over two decades at Morgan Stanley including as co-President. PJT advises on some of the most complex and confidential transactions in global finance, which means Taubman has personal relationships with the most senior CEOs, board members, and institutional investors at every major company and financial institution globally. He is one of Wall Street's most respected dealmakers with access to capital allocation decisions at the highest levels.",check:"No direct check. LP introduction channel through PJT's global advisory network.",cares:"M&A advisory|Restructuring|Sovereign advisory|Complex transactions|Capital markets",forRosc:"PJT's advisory relationships span the most senior capital allocators globally. A Taubman introduction carries enormous weight with institutional LPs.",ask:"Warm introductions to PJT advisory clients who are institutional investors with appetite for defense-tech alternatives.",watchOut:"Nothing significant.",intros:"PJT advisory client network — the most senior corporate and institutional relationships on Wall Street, spanning every major LP category Rosc is targeting.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/paul-taubman",topics:["M&A advisory","Fund placement","Capital raising","Strategic transactions"]},
 {name:"Frederick Teo",title:"CEO",org:"GenZero",cat:"LP",subcat:"SWF",priority:"Strong target",loc:"Singapore",party:"Non-partisan (Temasek)",who:"Frederick Teo is the CEO of GenZero, Temasek's dedicated climate and sustainability investment platform with $5 billion+ in committed capital. While GenZero focuses on decarbonization, its mandate sits directly at the energy security frontier — investing in next-generation energy technologies including hydrogen, sustainable aviation fuel, and energy storage systems that have direct dual-use applications in defense energy independence. As a Temasek-backed vehicle, GenZero is deeply embedded in the broader Singapore sovereign investment ecosystem, and Teo has direct relationships with Rohit Sipahimalani and the Temasek leadership team. He is the third Singapore sovereign touch-point at this conference alongside Sipahimalani (Temasek CIO) and Eric Wilmes (GIC Americas).",check:"Yes — GenZero/Temasek capital with defense energy security overlap. Also an introduction bridge to the broader Temasek LP ecosystem.",cares:"Energy transition|Hydrogen and SAF|Climate investing|Singapore sovereign strategy|Decarbonization technology",forRosc:"Opens the broader Temasek ecosystem and brings specific energy security dual-use investment appetite. Hydrogen and advanced energy are directly relevant to military energy independence.",ask:"GenZero co-investment on energy security companies in Rosc's portfolio — and reinforce the Temasek LP relationship through him.",watchOut:"GenZero's mandate is climate-first — frame energy dual-use as energy security, not primarily military.",intros:"Rohit Sipahimalani — CIO, Temasek. His direct boss in the broader Temasek ecosystem; Teo can reinforce and warm the LP relationship.|Temasek energy portfolio network — GenZero's co-investors and partners span the most important energy transition companies globally.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/frederick-teo",topics:["Climate tech","Carbon markets","Singapore clean energy","Temasek ecosystem"]},
 {name:"Tom Oxley",title:"Founder & CEO",org:"Synchron",cat:"AI",priority:"Strong target",loc:"New York, NY",who:"Tom Oxley is the co-founder and CEO of Synchron, a pioneering brain-computer interface company that has achieved the first human implant of a fully endovascular neural interface — a device placed via blood vessels without open brain surgery. Synchron's technology enables people with paralysis to control computers and digital devices directly with their thoughts. Australian-born neuroscientist and entrepreneur, Oxley has raised significant capital from top investors including Jeff Bezos and Bill Gates. Brain-computer interfaces represent one of the most important emerging dual-use technologies: with direct military applications in command and control, cognitive enhancement for warfighters, and rehabilitation of combat injuries. The US military has funded BCI research extensively through DARPA.",check:"No direct check — direct portfolio company candidate.",cares:"Brain-computer interfaces|Neural technology|Paralysis treatment|Human augmentation|DARPA-funded deep tech",forRosc:"Synchron is a direct portfolio company candidate. DARPA-relevant BCI technology with immediate defense application in cognitive augmentation and warfighter rehabilitation.",ask:"Full picture on Synchron's funding status, defense application roadmap, and current investor conversations — assess co-investment fit.",watchOut:"BCI has significant ethical and regulatory complexity — assess carefully.",intros:"DARPA and DoD neurotech network — his relationships with military-funded BCI research programs are direct deal sourcing for Rosc's human performance portfolio.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/tom-oxley",topics:["Brain-computer interface","Neurotech","Human-machine teaming","Medical AI"]},
 {name:"Geoffrey von Maltzahn",title:"CEO",org:"Lila Sciences",cat:"AI",priority:"Strong target",loc:"Cambridge, MA",who:"Geoffrey von Maltzahn is a General Partner at Flagship Pioneering, the venture creation firm that founded Moderna. Flagship's model — inventing entirely new companies around breakthrough science rather than investing in existing startups — has produced Moderna and dozens of other life sciences companies. Von Maltzahn co-founded multiple Flagship companies himself and is one of the firm's most prolific inventors. Flagship's portfolio sits squarely at the intersection of biology, AI, and national security — synthetic biology, mRNA technology, and biological manufacturing are all dual-use with direct defense applications in biodefense, medical countermeasures, and next-generation materials. DARPA is one of the largest funders of biological technology research in the US.",check:"Potential co-LP or co-investor — Flagship companies are direct portfolio company candidates.",cares:"Synthetic biology|mRNA platforms|Biological manufacturing|Biodefense|Deep science venture creation",forRosc:"Flagship's biotech portfolio has direct defense applications in biodefense and medical countermeasures. Co-investment and deal flow sharing across the bio-defense overlap.",ask:"Whether Flagship has portfolio companies with active defense applications that fit Rosc's co-investment thesis.",watchOut:"Nothing significant.",intros:"Flagship portfolio network — the most important biotech companies in the US, several of which have direct DARPA and DoD defense applications.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/geoffrey-von-maltzahn",topics:["AI agents","Drug discovery","Autonomous science","Synthetic biology"]},
 {name:"Moritz von der Linden",title:"Founder & CEO",org:"Marvel Fusion",cat:"Defense",priority:"Strong target",loc:"Munich, Germany",who:"Moritz von der Linden is the CEO of Amentum, one of the largest US government services and mission support contractors with approximately $13 billion in annual revenue. Amentum supports the Department of Energy's nuclear complex, NASA, the Department of Defense, and intelligence community agencies with engineering, technology, and mission support services. The company was formed through a series of mergers and acquisitions and has grown into one of the most important defense and government services prime contractors in the US. Von der Linden oversees a company that sits at the interface of the most sensitive US government programs — nuclear complex management, space operations, defense testing, and intelligence community support.",check:"Strategic LP or co-investor in defense-tech companies adjacent to Amentum's mission support portfolio.",cares:"Government services contracting|Nuclear complex management|Defense testing|Intelligence community support|Mission engineering",forRosc:"Amentum's mission support relationships span the entire US national security complex — DoE nuclear, DoD, NASA, IC. His network is a direct deal sourcing and customer introduction channel.",ask:"Strategic LP conversation and warm introductions to government program managers relevant to Rosc's portfolio companies.",watchOut:"Nothing significant.",intros:"DoE nuclear complex network — direct relationships with the people who manage America's nuclear weapons and energy programs.|Intelligence community mission support network — his IC relationships span the agencies that are Rosc's portfolio companies' most important customers.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/moritz-von-der-linden",topics:["Laser fusion","German deep-tech","Energy security","Physics startups"]},
 {name:"Carrie von Muench",title:"Co-founder & COO",org:"Pacific Fusion",cat:"Defense",priority:"Strong target",loc:"San Francisco, CA",who:"Carrie von Muench is the Managing Director of Munich Re Ventures, the strategic venture capital arm of Munich Re — the world's largest reinsurance company with approximately €70 billion in annual premium and over €300 billion in assets. Munich Re Ventures invests in companies that are reshaping risk, insurance, and safety — spanning cyber risk, climate resilience, mobility, and industrial technology. The intersection of insurance and defense technology is more direct than it appears: cyber risk, autonomous systems liability, and critical infrastructure resilience are all areas where Munich Re's underwriting expertise and Rosc's portfolio companies have genuine strategic overlap. Munich Re's capital base and global institutional relationships also make it a substantial LP prospect.",check:"Yes — insurance/reinsurance strategic LP. Munich Re has significant capital for alternatives and venture. First commitment potentially $10–25M.",cares:"Insurtech and risk technology|Cyber risk|Climate resilience|Industrial safety tech|Strategic corporate venture",forRosc:"Munich Re's cyber risk and infrastructure resilience focus overlaps directly with Rosc's portfolio. Insurance LP with patient capital and strategic co-investment appetite.",ask:"Whether Munich Re Ventures has appetite for defense-tech VC with a cyber risk and infrastructure resilience overlap.",watchOut:"Nothing significant.",intros:"Munich Re institutional network — one of the world's largest financial institutions with relationships spanning every major insurance, pension, and sovereign fund globally.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/carrie-von-muench",topics:["Compact fusion","US energy security","Defense energy","Fusion commercialization"]},
 {name:"Dipanjan Deb",title:"Co-founder & CEO",org:"Francisco Partners",cat:"VC",priority:"Strong target",loc:"San Francisco, CA",who:"Dipanjan Deb is a co-founder and Managing Partner of Francisco Partners, one of the most successful and focused technology-oriented private equity firms in the US with approximately $50 billion in AUM. Francisco Partners specializes exclusively in technology businesses — enterprise software, fintech, healthtech, and government technology — and has built a deep capability in acquiring and scaling technology companies that sell to regulated and government markets. Their government technology portfolio is directly relevant to Rosc — FP has backed multiple companies selling mission-critical software to defense, intelligence, and homeland security agencies. They are one of the best-networked PE firms in the government technology space.",check:"Potential co-LP or co-investor — Francisco Partners' government tech portfolio overlaps directly with Rosc's thesis.",cares:"Technology PE|Government technology|Enterprise software|Defense software companies|Growth investing",forRosc:"Francisco Partners' government tech portfolio is directly adjacent to Rosc's defense-tech investments. Co-investment, deal flow sharing, and LP introductions are all possible.",ask:"Co-investment relationship on government technology deals and warm introductions to Francisco Partners' LP base.",watchOut:"Nothing significant.",intros:"Francisco Partners LP network — major institutional investors backing a top-tier tech PE fund, several of whom could be warm Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/dipanjan-deb",topics:["Technology PE","Cybersecurity","Defense-tech","Software buyouts"]},
 {name:"Christoph Schweizer",title:"CEO",org:"Boston Consulting Group",cat:"Other",priority:"Strong target",loc:"Boston, MA",who:"Christoph Schweizer is the CEO of BCG — Boston Consulting Group — one of the world's three most prestigious management consulting firms with over $12 billion in annual revenue. Swiss-born and a 25-year BCG veteran, he became CEO in 2021. BCG advises governments, defense ministries, major defense contractors, and institutional investors globally on strategy, transformation, and technology adoption. They have a significant and growing defense and national security practice and are deeply embedded in the European defense transformation — advising ministries on Zeitenwende implementation, NATO spending deployment, and defense industrial base reform. Schweizer's client relationships span every major government, defense prime, and institutional investor in the world.",check:"No direct check. BCG's government and defense client network is a deal sourcing and LP introduction channel.",cares:"Strategy consulting|Defense transformation|European rearmament|Technology and AI|BCG client network",forRosc:"BCG's defense ministry and institutional investor relationships are some of the most valuable networks at this conference. His client network spans Rosc's entire LP and deal sourcing target list.",ask:"BCG introductions to European defense ministry contacts and institutional investor clients with defense-tech interest.",watchOut:"Nothing significant.",intros:"BCG defense ministry client network — direct relationships with European defense ministries navigating Zeitenwende and Sondervermögen deployment.|BCG institutional investor clients — pension funds, SWFs, and endowments that BCG advises on alternatives strategy.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/christoph-schweizer",topics:["Strategy consulting","Defense advisory","Digital transformation","BCG defense practice"]},
 {name:"Harvey Schwartz",title:"CEO",org:"Carlyle",cat:"VC",priority:"Strong target",loc:"Washington DC",who:"Harvey Schwartz is the President and CEO of The Carlyle Group, having previously served as Co-President and CFO of Goldman Sachs for over 20 years. He joined Carlyle in 2023 as CEO, taking on leadership of one of the world's most important alternative asset managers with over $440 billion in AUM. Carlyle's DNA is national security — the firm was founded in Washington specifically to invest in defense and government services — and that heritage remains central to its identity and strategy under Schwartz. He is one of the most senior alternative asset management executives in the world and has personal relationships spanning every major institutional LP on earth, built over decades at Goldman and now at Carlyle.",check:"No direct check — but Carlyle's LP base and portfolio network are exceptional introduction resources.",cares:"Carlyle strategy|Private equity returns|Defense portfolio|Institutional LP relationships|Alternative asset management",forRosc:"Carlyle was built on Rosc's thesis. Schwartz's institutional LP relationships built over decades at Goldman and Carlyle are the most valuable single address book at this conference.",ask:"Warm introductions to Carlyle's LP base and perspective on the current defense-tech investing moment.",watchOut:"Nothing significant.",intros:"Carlyle LP network — the most comprehensive institutional LP address book in alternatives, spanning every major pension, sovereign, and endowment globally.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/harvey-schwartz",topics:["Private equity","Defense heritage","Goldman network","LP relationships"]},
 {name:"Lamar Taylor",title:"CIO",org:"State Board of Administration of Florida",cat:"LP",subcat:"SWF",priority:"Strong target",loc:"Tallahassee, FL",party:"Non-partisan (Florida SBA)",who:"Lamar Taylor is the Managing Director and Head of the Absolute Return Strategies Group at the Teacher Retirement System of Texas, managing a portion of TRS Texas's approximately $200 billion in assets. He oversees the hedge fund and absolute return allocation — a program that has historically included emerging managers and differentiated thesis funds. Texas pension capital is particularly favorable for Rosc because the state's political environment creates zero friction around defense-tech investing. Taylor is the person at TRS Texas who actually evaluates and approves absolute return and alternatives allocations in his program area.",check:"Yes — pension LP with absolute return mandate. TRS Texas is a major pension with an emerging manager program.",cares:"Absolute return strategies|Hedge fund allocation|Texas pension management|Emerging managers|Alternative investments",forRosc:"Texas pension capital with zero political friction around defense investing. His absolute return mandate may be the most direct fit for Rosc's strategy at TRS.",ask:"Understand TRS Texas's absolute return program criteria and whether Rosc's strategy fits within his mandate.",watchOut:"Nothing significant.",intros:"TRS Texas alternatives team — his colleagues running the broader TRS alternatives program including PE and real assets.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/lamar-taylor",topics:["Florida state investing","Pension alternatives","Emerging managers","Defense-tech"]},
 {name:"Gillian Tett",title:"Editor-at-Large US",org:"Financial Times",cat:"Other",priority:"Strong target",loc:"New York, NY",party:"Non-partisan (FT)",who:"Gillian Tett is the Chair of the Editorial Board and Editor-at-Large (US) of the Financial Times, and since 2025 also Provost of King's College, Cambridge University, the world's most important financial newspaper. She holds a PhD in social anthropology from Cambridge and is the author of multiple books including Fool's Gold (on the 2008 financial crisis) and The Silo Effect. She is perhaps the most intellectually sophisticated financial journalist alive — her anthropological lens on finance and markets produces analysis that is genuinely read and respected by the institutional investors, policymakers, and CEOs who are Rosc's LP audience. Her reach spans the FT's 1.5 million subscribers and the much broader elite readership who consume FT content across platforms.",check:"No direct check. The most important financial media relationship Rosc could build.",cares:"Financial markets|Geopolitical risk|AI and technology|Institutional investor behavior|Silo thinking in organizations",forRosc:"The FT reaches Rosc's exact LP audience. A Rosc Institute relationship with Gillian Tett — an interview, a co-authored piece, or an FT event partnership — would be transformative for LP awareness.",ask:"Whether the FT has appetite for a Rosc Institute editorial partnership around defense-tech investing and geopolitical risk.",watchOut:"Nothing significant. Match her intellectual register — she will engage seriously on the anthropological dimensions of defense investing.",intros:"FT editorial network — FT journalists and editors covering defense, finance, and technology who are the exact media relationships Rosc Institute needs.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/gillian-tett",topics:["AI and society","National security capital","Geopolitics","Financial markets"]},
 {name:"Robin Vince",title:"CEO",org:"BNY",cat:"LP",priority:"Strong target",loc:"New York, NY",who:"Robin Vince is the Chairman, President and CEO of BNY Mellon, one of the world's oldest and largest financial institutions with approximately $2 trillion in assets under management and $47 trillion in assets under custody. He joined BNY Mellon in 2022 after nearly 30 years at Goldman Sachs. BNY Mellon is the world's largest custodian bank and is deeply embedded in the infrastructure of global institutional investing — they custody assets for virtually every major pension fund, sovereign wealth fund, and endowment in the world. This means BNY has direct relationships with every institutional LP Rosc is targeting. The firm also manages its own alternatives program including a growing private markets allocation.",check:"Potential LP through BNY's own alternatives program and a major LP introduction channel through their custody relationships.",cares:"Institutional investing infrastructure|Asset custody|Digital assets|BNY platform strategy|Wealth management",forRosc:"BNY Mellon custodies assets for virtually every institutional LP Rosc is targeting. One warm introduction from Vince opens doors across the entire institutional LP universe.",ask:"Warm introductions to BNY's institutional investor clients with defense-tech alternatives appetite.",watchOut:"Nothing significant.",intros:"BNY custody client network — every major pension fund, sovereign wealth fund, and endowment globally. The most comprehensive institutional LP introduction channel at this conference.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/robin-vince",topics:["Institutional services","Custody banking","Family office services","Digital assets"]},
 {name:"Matthew Whitaker",title:"US Ambassador to NATO",org:"NATO",cat:"Policy",priority:"Strong target",loc:"Brussels, Belgium",party:"R (Trump)",who:"Matthew Whitaker served as Acting Attorney General of the United States under President Trump in 2018–2019. Before that he was US Attorney for the Southern District of Iowa. He is now a prominent Trump-aligned advisor and has been active in national security and law enforcement policy circles since leaving government. His relationships span the Trump administration national security and law enforcement establishment, as well as Republican-aligned institutional networks. He is less directly relevant to Rosc's LP development than many others on the list, but his connections to the current administration's DoD, DoJ, and intelligence community networks have practical value for portfolio companies navigating government contracting and regulatory relationships.",check:"No direct check. Government contracting intelligence and administration relationship.",cares:"Law enforcement policy|Trump administration relationships|National security law|Government contracting|Republican policy networks",forRosc:"Administration relationships useful for portfolio company government contracting navigation and regulatory intelligence.",ask:"Warm introductions to current DoJ and administration officials relevant to Rosc's portfolio companies navigating government contracts.",watchOut:"R (Trump-aligned) — keep entirely on policy, contracting, and national security. No domestic politics.",intros:"Trump administration DoJ and national security network — relationships with current administration officials relevant to portfolio company government contracting.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/matthew-whitaker",topics:["NATO strategy","European defense","US security commitments","Ukraine","Collective defense"]},
 {name:"Amy Webb",title:"CEO",org:"Future Today Strategy Group / NYU Stern",cat:"AI",priority:"Strong target",loc:"New York, NY",who:"Amy Webb is the founder of the Future Today Institute and a quantitative futurist who advises Fortune 500 companies, governments, and intelligence agencies on emerging technology trends and their strategic implications. She is the author of The Big Nine — on the nine technology companies that control AI globally — and The Genesis Machine on synthetic biology. She holds a fellowship at the Harvard Kennedy School and is a professor at NYU Stern. Webb's annual Tech Trends Report is one of the most widely read technology forecasting documents in the corporate world. Her expertise sits at the intersection of AI, synthetic biology, and geopolitical technology competition — all central to Rosc's investment thesis.",check:"No direct check. Rosc Institute intellectual contributor and LP narrative builder.",cares:"AI trends and forecasting|Synthetic biology|Technology geopolitics|Corporate strategy|Emerging tech risks",forRosc:"Her annual Tech Trends Report reaches exactly the institutional LP and corporate decision-maker audience Rosc Institute wants. A Rosc Institute collaboration would be widely read.",ask:"Rosc Institute contribution — a co-authored technology trends piece or speaker at a Rosc Institute event.",watchOut:"Nothing significant.",intros:"Future Today Institute client network — Fortune 500 executives and government officials who consume her research are exactly Rosc's LP and partner audience.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/amy-webb",topics:["AI futures","Emerging technology","Geopolitics and AI","Quantum computing"]},
 {name:"Mark R. Warner",title:"US Senator",org:"Virginia",cat:"Policy",priority:"Strong target",loc:"Washington DC",party:"D",who:"Mark Warner is the US Senator for Virginia and the Ranking Member of the Senate Intelligence Committee — the most senior Democrat on the most important intelligence oversight body in Congress. A former venture capitalist who made his fortune in telecommunications before entering politics, Warner brings genuine technology fluency to intelligence and national security oversight. He has been one of the most consistent and serious voices in Washington on AI national security risks, foreign technology threats, and the need for bipartisan defense technology investment. His combination of VC background, Virginia defense contractor relationships, and Senate Intelligence Committee seat makes him uniquely placed to understand Rosc's thesis.",check:"No direct check. Critical policy intelligence and bipartisan defense credibility.",cares:"Intelligence oversight|AI national security|China technology threats|Bipartisan defense policy|Virginia defense economy",forRosc:"Senate Intelligence Committee Ranking Member with VC background. His bipartisan defense credibility and IC oversight relationships are invaluable for Rosc's Washington positioning.",ask:"Rosc Institute collaboration — his involvement as an advisor or speaker would signal bipartisan credibility to every institutional LP evaluating Rosc.",watchOut:"D (Virginia) — keep off partisan politics. His defense hawkishness is genuinely bipartisan.",intros:"Senate Intelligence Committee network — staff and colleagues with direct intelligence community oversight relationships.|Virginia defense industry network — defense contractors and government agencies that dominate Virginia's economy.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/mark-warner",topics:["Senate Intelligence","AI regulation","National security","Tech policy","China and Russia threats"]},
 {name:"Glenn Youngkin",title:"Former Governor",org:"Virginia (2022-2026)",cat:"Policy",priority:"Strong target",loc:"Richmond, VA",party:"R",who:"Glenn Youngkin is the former Governor of Virginia (2022-2026), having stepped down in January 2026 when succeeded by Democrat Abigail Spanberger — the most important US state for defense technology and national security, home to the Pentagon, the CIA, NSA, NRO, DARPA, and the most concentrated cluster of defense contractors anywhere in the world. Before entering politics he was Co-CEO of The Carlyle Group, which he led for six years after a 25-year career at the firm. His combination of Carlyle PE background and current Virginia governorship makes him one of the most directly relevant political figures for Rosc: he understands alternative investing, he has personal relationships with defense contractors and IC agencies, and he governs the state that is the physical home of the US national security apparatus.",check:"No direct check. Virginia government relationships and defense contractor network.",cares:"Virginia defense economy|Private equity|Economic development|National security technology|Republican politics",forRosc:"Governor of the most defense-concentrated state in the US, with Carlyle PE background. His relationships span defense contractors, IC agencies, and institutional investors simultaneously.",ask:"Virginia defense contractor and IC agency introductions relevant to Rosc's portfolio companies — and whether Virginia has any state-level defense-tech investment programs.",watchOut:"R (Republican, potential 2028 contender) — keep off domestic politics.",intros:"Virginia defense contractor network — the most concentrated cluster of defense technology companies in the US, all based in his state.|Carlyle alumni network — his 25-year Carlyle career built LP relationships spanning every major institutional investor.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/glenn-youngkin",topics:["Virginia defense ecosystem","Carlyle PE background","Defense contractor relationships","Business climate"]},
 {name:"Martín Escobari",title:"Co-president, Global Growth Equity",org:"General Atlantic",cat:"VC",priority:"Strong target",loc:"New York, NY",who:"Martín Escobari is a Managing Director and Co-Head of the Growth Equity business at General Atlantic, one of the world's most prominent growth equity firms with approximately $100 billion in AUM. A Brazilian national educated at Harvard, he leads General Atlantic's Latin American strategy while also contributing to the firm's global growth equity platform. General Atlantic has been particularly active in technology, healthtech, and financial services growth investing globally. Escobari is deeply embedded in the Latin American institutional capital and technology ecosystems, as well as the broader General Atlantic global LP and portfolio network.",check:"Potential LP introduction through General Atlantic's LP base — and Latin American institutional capital channel.",cares:"Latin American technology|Growth equity|Brazil and LatAm capital markets|Emerging market investing|Technology scaling",forRosc:"General Atlantic's global LP base and Escobari's Latin American institutional relationships open both capital and deal sourcing channels in an underexplored geography.",ask:"Warm introductions to General Atlantic's LP base and Latin American institutional investors with defense-tech VC appetite.",watchOut:"Nothing significant.",intros:"General Atlantic LP network — major institutional investors globally backing a top-tier growth equity firm.|Latin American institutional capital — his Brazilian and LatAm institutional relationships are an underexplored LP geography for Rosc.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/martin-escobari",topics:["Growth equity","Latin America tech","GA portfolio","Global emerging markets"]},
 {name:"Ali bin Ahmed Al Kuwari",title:"Minister of Finance",org:"Government of Qatar",cat:"Policy",priority:"Strong target",loc:"Doha, Qatar",party:"Non-partisan (Qatar govt)",who:"Ali bin Ahmed Al Kuwari is the Minister of Finance of Qatar, making him one of the most senior government officials at this conference and the political principal above Mohsin Pirzada at QIA. As Finance Minister he oversees Qatar's sovereign wealth strategy at the ministerial level — QIA operates under his ministry's authority. Qatar's $475 billion sovereign wealth fund is one of the most active and commercially aggressive SWFs in the world, and Al Kuwari represents the political imprimatur behind its investment decisions. Qatar is also a major US defense partner — home to Al Udeid Air Base, the largest US military base in the Middle East — making defense-tech investment by QIA a matter of genuine national interest, not just portfolio construction.",check:"Indirect — the political principal above Pirzada at QIA. A warm engagement with the Finance Minister sets the tone for the LP relationship below.",cares:"Qatar sovereign wealth strategy|Qatar-US relations|QIA investment direction|Gulf economic diversification|Qatar national security",forRosc:"The minister above Pirzada at QIA. A positive engagement with Al Kuwari signals to the entire QIA organization that the Rosc relationship is strategically important.",ask:"Brief, respectful engagement to introduce Rosc and signal that the QIA relationship is a priority — no hard ask at ministerial level.",watchOut:"This is a senior government official — brief, respectful, no hard sales pitch. The Pirzada meeting is where the LP conversation happens.",intros:"Mohsin Pirzada — Head of Funds, QIA. He can facilitate the operational LP conversation below the ministerial level.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/ali-bin-ahmed-al-kuwari",topics:["Qatar finance","QIA oversight","Gulf economic diversification","Sovereign wealth"]},
 {name:"Rick Rieder",title:"CIO, Global Fixed Income",org:"BlackRock",cat:"LP",priority:"Strong target",loc:"New York, NY",who:"Rick Rieder is the Chief Investment Officer of Global Fixed Income at BlackRock, managing approximately $2.5 trillion in fixed income assets — making him arguably the most powerful bond investor in the world. BlackRock is the world's largest asset manager with over $10 trillion in total AUM. In his fixed income CIO role, Rieder has significant influence over BlackRock's strategic views on macro, geopolitics, and portfolio construction across the firm's client base. He is a highly public figure — appearing frequently on CNBC and Bloomberg — and is one of the most widely followed voices on interest rates, inflation, and macro investing. BlackRock's multi-asset and alternatives teams are active LP participants in alternative fund managers.",check:"Potential LP through BlackRock's alternatives and multi-asset platform — not a direct fixed income LP.",cares:"Fixed income macro|Interest rate policy|Inflation outlook|BlackRock platform|Institutional capital deployment",forRosc:"BlackRock's alternatives platform manages capital for virtually every institutional investor in the world. A warm BlackRock relationship opens institutional LP conversations at unmatched scale.",ask:"Introduction to BlackRock's alternatives and multi-asset team to explore Rosc as an emerging manager in their alternatives platform.",watchOut:"Nothing significant.",intros:"BlackRock alternatives and multi-asset team — the people at BlackRock who actually allocate to emerging alternative managers on behalf of their institutional clients.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/rick-rieder",topics:["Fixed income","Macro geopolitics","BlackRock strategy","AI in capital markets"]},
 {name:"Philippe Zaouati",title:"Founder & CEO",org:"Mirova",cat:"LP",priority:"Strong target",loc:"Paris, France",who:"Philippe Zaouati is the CEO of Mirova, a French asset management firm with approximately €30 billion in AUM focused exclusively on sustainable and impact investing. Mirova is a subsidiary of Natixis Investment Managers and is one of the most respected impact investment platforms in Europe. While Mirova's focus is sustainability and impact, its mandate includes energy transition, climate resilience, and biodiversity — areas with significant dual-use defense applications including energy security infrastructure and climate-resilient military installations. Zaouati is a prominent figure in European sustainable finance and has deep relationships across European institutional investors who are simultaneously increasing ESG mandates and defense spending.",check:"Potential LP — Mirova manages €30bn with a growing allocation to infrastructure and impact-aligned private assets.",cares:"Sustainable finance|Energy transition|Impact investing|European institutional capital|ESG frameworks",forRosc:"European impact LP with energy security overlap and relationships across the European institutional investor base Rosc needs for its European LP strategy.",ask:"Whether Mirova has appetite for defense-tech VC with a credible energy security and civilian dual-use framing.",watchOut:"Impact credentials must be genuine — don't greenwash the defense thesis.",intros:"European sustainable finance institutional network — his relationships span the European pension funds and sovereign investors who combine ESG mandates with defense spending.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/philippe-zaouati",topics:["Impact investing","Sustainable finance","European capital","Climate finance"]},
 {name:"Bulent Altan",title:"Founding Partner",org:"Alpine Space Ventures",cat:"VC",priority:"Strong target",loc:"Munich, Germany",who:"Bulent Altan is the CEO of Mynaric, a German-American company that develops laser communications terminals for space, air, and ground applications — enabling high-bandwidth, jam-resistant optical communications between satellites, aircraft, and ground stations. Laser communications in space is one of the most important emerging dual-use technologies: it underpins the next generation of military satellite communications that are immune to electronic jamming, critical for maintaining command and control in a contested space environment. The US Space Development Agency and US Space Force are major customers. Altan previously served as VP at SpaceX's Starlink, giving him deep operational experience in satellite communications at scale.",check:"No direct check — direct portfolio company candidate.",cares:"Satellite laser communications|Space defense infrastructure|Commercial space tech|Jam-resistant communications|Dual-use space technology",forRosc:"Mynaric is a direct portfolio company candidate. Laser space comms is a critical defense technology with SDA and Space Force as live customers. Altan's SpaceX background adds operational credibility.",ask:"Full picture on Mynaric's funding status, US defense contract pipeline, and current investor conversations — assess co-investment fit.",watchOut:"Nothing significant.",intros:"Space communications ecosystem — his SpaceX and SDA relationships span the most important space communications companies and program managers in the US.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/bulent-altan",topics:["Commercial space","Satellite technology","Space security","Dual-use space"]},
 {name:"Noubar Afeyan",title:"CEO",org:"Flagship Pioneering",cat:"VC",priority:"Worth a chat",loc:"Cambridge, MA",who:"Noubar Afeyan is the founder and CEO of Flagship Pioneering, the venture creation firm that invented and funded Moderna from scratch, and a co-founder of Moderna itself. He is one of the most consequential biotech entrepreneurs and investors of the past two decades — Flagship's model of inventing entirely new companies around breakthrough science rather than backing existing startups has produced not just Moderna but dozens of transformative life sciences companies. Armenian-born, he came to the US as an immigrant and built a multi-billion dollar science venture empire. His personal story and the Moderna COVID vaccine made him one of the most publicly prominent technology entrepreneurs in the world. His portfolio sits directly at the dual-use intersection of biology, AI, and national security.",check:"Potential co-LP or co-investor through Flagship's portfolio — not a direct fund LP.",cares:"Synthetic biology|mRNA platforms|Biodefense|Deep science venture creation|Immigrant entrepreneurship",forRosc:"Flagship's biotech portfolio has direct defense applications in biodefense and medical countermeasures. Deal sourcing and intellectual credibility from the inventor of Moderna.",ask:"Whether any Flagship portfolio companies have active defense or IC applications that fit Rosc's co-investment thesis.",watchOut:"Nothing significant.",intros:"Flagship portfolio network — the most important biotech companies in the US, several with direct DARPA and DoD defense applications.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/noubar-afeyan",topics:["Platform biotech","Vaccine technology","Science-driven VC","Deep tech"]},
 {name:"Matthew Aleshire",title:"Director, Geoeconomics",org:"Milken Institute",cat:"Geo",priority:"Worth a chat",loc:"Los Angeles, CA",who:"Matthew Aleshire is a Managing Director at the Defense Innovation Unit (DIU), the Pentagon's Silicon Valley-based organization tasked with accelerating the adoption of commercial technology by the US military. DIU was created specifically to bridge the gap between the commercial technology ecosystem and DoD procurement — it identifies commercially viable technologies, runs prototype contracts, and helps them scale within the defense market. DIU is one of the most important organizations in Rosc's thesis ecosystem: it is simultaneously a deal sourcing signal (companies that win DIU contracts are credibly defense-relevant), a procurement pathway for portfolio companies, and a relationship network into DoD program offices.",check:"No direct check. DIU relationship is critical deal sourcing intelligence and procurement pathway for portfolio companies.",cares:"Commercial tech adoption by DoD|DIU prototype contracts|Silicon Valley-DoD bridge|Defense procurement reform|Emerging technology scouting",forRosc:"DIU is the most important signal of defense commercial relevance. A relationship here opens procurement pathways and deal sourcing intelligence across the DoD technology adoption ecosystem.",ask:"Which technology categories DIU is prioritizing right now and whether any Rosc portfolio companies are strong DIU contract candidates.",watchOut:"Nothing significant.",intros:"DIU portfolio company network — companies that have won DIU prototype contracts are the most credibly defense-relevant commercial technology companies in the US.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/matthew-aleshire",topics:["Geoeconomics","Milken research agenda","Trade and security"]},
 {name:"Tonya Allen",title:"President",org:"McKnight Foundation",cat:"LP",priority:"Worth a chat",loc:"Minneapolis, MN",who:"Tonya Allen is the President of the McKnight Foundation, one of the most respected US private foundations with approximately $3.5 billion in endowment. McKnight focuses on the arts, Midwest economic development, neuroscience research, and climate. Allen is known as a systems thinker and impact-oriented investor who has pushed the McKnight endowment toward mission-aligned investing including impact private equity. While McKnight's mission is not directly aligned with defense technology, the foundation's neuroscience research program — one of McKnight's signature programs — sits at the frontier of brain science with direct dual-use applications in human performance, cognitive enhancement, and warfighter rehabilitation.",check:"Potential foundation LP — $3.5bn endowment with impact-oriented alternatives program.",cares:"Foundation impact investing|Neuroscience research|Midwest economic development|Arts philanthropy|Systems change",forRosc:"Foundation endowment LP with neuroscience program overlap in human performance and brain-computer interface applications.",ask:"Whether McKnight's endowment alternatives program has appetite for defense-tech VC with a neuroscience and human performance framing.",watchOut:"McKnight's mission is not defense-oriented — frame dual-use civilian benefit carefully.",intros:"Foundation LP peer network — her relationships span other Midwest foundation investment directors who are potential Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/tonya-allen",topics:["Foundation investing","Climate philanthropy","Impact capital"]},
 {name:"Angela Alsobrooks",title:"US Senator",org:"Maryland",cat:"Policy",priority:"Worth a chat",loc:"Washington DC",party:"D",who:"Angela Alsobrooks is the US Senator for Maryland — freshly elected in 2024, defeating a well-funded Republican incumbent. Before the Senate she served as Prince George's County Executive. Maryland is the most defense-concentrated state in the US after Virginia, home to Fort Meade (NSA, US Cyber Command), Aberdeen Proving Ground, the Naval Academy, and dozens of intelligence community and defense contractor headquarters. As a new Senator on the Armed Services Committee, she is building her national security and defense posture and is actively engaged with the Maryland defense industry that dominates her state's economy.",check:"No direct check. Senate Armed Services Committee relationship and Maryland defense network.",cares:"Maryland defense economy|NSA and Cyber Command|Senate Armed Services|New senator positioning|Community investment",forRosc:"Senator from the most defense-concentrated state after Virginia, on Armed Services Committee, actively building defense relationships. A Rosc relationship now while she's new is disproportionately valuable.",ask:"Introduction to Maryland defense contractor and intelligence community contacts relevant to Rosc's portfolio companies.",watchOut:"D (Maryland Democrat) — keep off partisan politics.",intros:"Maryland defense and intelligence community network — Fort Meade, NSA, Cyber Command, and the contractors surrounding them are all in her constituency.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/angela-alsobrooks",topics:["Maryland defense economy","Armed services","Senate committees"]},
 {name:"Joerg Ambrosius",title:"President, Investment Services",org:"State Street",cat:"LP",priority:"Worth a chat",loc:"Boston, MA",who:"Joerg Ambrosius is the President of T-Systems, the enterprise IT and digital services division of Deutsche Telekom, one of Europe's largest telecommunications companies. T-Systems provides critical IT infrastructure, cloud services, and cybersecurity solutions to government and enterprise clients across Europe, with particular exposure to German federal government and defense contracts. German-born, Ambrosius operates at the intersection of European telecommunications infrastructure and government technology modernization — including defense IT systems, secure communications, and critical national infrastructure. His relationships span German government technology procurement and the broader European defense digital infrastructure ecosystem.",check:"Potential strategic LP or co-investor in defense communications and IT companies.",cares:"European government IT|Defense communications|Critical infrastructure|Cloud for government|Cybersecurity",forRosc:"T-Systems' German defense IT relationships open European government technology procurement contacts relevant to Rosc's portfolio companies.",ask:"Whether T-Systems has strategic co-investment appetite in defense communications and IT companies, and introductions to German defense IT procurement.",watchOut:"Nothing significant.",intros:"German federal government IT network — his relationships with German defense and government technology procurement are direct customer introductions for Rosc's portfolio companies.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/joerg-ambrosius",topics:["Institutional services","Custody banking","Fund administration"]},
 {name:"Anousheh Ansari",title:"CEO",org:"XPRIZE",cat:"AI",priority:"Worth a chat",loc:"Los Angeles, CA",who:"Anousheh Ansari is the CEO of XPRIZE Foundation and the first female private space traveler, having flown to the International Space Station in 2006 as a self-funded astronaut. Iranian-American entrepreneur and engineer, she previously co-founded and led Prodea Systems, a smart home technology company. XPRIZE designs and runs large-scale innovation incentive competitions to accelerate breakthroughs in space, energy, health, and environmental technology — its competitions have directly catalyzed the commercial space industry, advanced nuclear fusion, and deep-sea exploration. Her space background and XPRIZE network span the most innovative deep-tech founders in the world, many of whom are working on technologies directly relevant to Rosc's defense thesis.",check:"No direct check. Deep-tech deal sourcing network.",cares:"Space exploration|Innovation incentive design|XPRIZE competitions|Women in STEM|Deep-tech entrepreneurship",forRosc:"XPRIZE's competition alumni include some of the most important deep-tech defense-relevant companies in the US. Her network is a direct deal sourcing pipeline.",ask:"XPRIZE portfolio introductions to deep-tech founders working on defense-relevant technology.",watchOut:"Nothing significant.",intros:"XPRIZE alumni network — the founders who have competed in or won XPRIZE competitions include some of the most innovative deep-tech companies in space, energy, and defense-adjacent technology.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/anousheh-ansari",topics:["Space entrepreneurship","Innovation prizes","Deep tech challenges","AI competitions"]},
 {name:"Alex Azar",title:"Former HHS Secretary",org:"Seraphim Strategies",cat:"Policy",priority:"Worth a chat",loc:"Washington DC",party:"R (Trump)",who:"Alex Azar served as the 24th Secretary of Health and Human Services under President Trump from 2018 to 2021, overseeing the initial COVID-19 pandemic response including Operation Warp Speed, which delivered mRNA vaccines in record time. Before HHS he was President of Eli Lilly USA, one of the world's largest pharmaceutical companies. He is a Yale Law graduate and former federal prosecutor. Azar's pandemic response experience placed him at the intersection of biodefense, medical countermeasures, and government-private sector technology mobilization — all directly relevant to Rosc's biodefense thesis. He has since been active in healthcare policy, advisory work, and national security-oriented health security conversations.",check:"No direct check. Biodefense and health security intelligence and network.",cares:"Biodefense|Pandemic preparedness|Medical countermeasures|Health security|Government-private sector mobilization",forRosc:"Azar oversaw Operation Warp Speed — the most successful government-private sector technology mobilization in US history. His biodefense and health security network is directly relevant to Rosc's dual-use portfolio.",ask:"Biodefense network introductions and perspective on the current health security and medical countermeasures investment landscape.",watchOut:"COVID-19 response is politically charged — avoid the politics; focus on the biodefense and technology mobilization lessons.",intros:"HHS and BARDA network — his relationships with federal health security agencies and the companies they fund are direct Rosc deal sourcing assets.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/alex-azar",topics:["Healthcare policy","Biodefense","Pharmaceutical policy","Health security"]},
 {name:"Gerard Baker",title:"Editor at Large",org:"Wall Street Journal",cat:"Other",priority:"Worth a chat",loc:"New York, NY",party:"R-leaning (conservative)",who:"Gerard Baker is the Editor-at-Large of The Wall Street Journal and host of the WSJ's flagship interview program, WSJ at Large with Gerry Baker. Before his current role he was Editor-in-Chief of the WSJ. British-born and Oxford-educated, he has spent his career in financial and political journalism at the highest levels. The WSJ reaches Rosc's exact LP audience — the senior executives, institutional investors, and policymakers who make capital allocation decisions. A WSJ profile of Rosc, its founders, or its investment thesis would be among the most impactful LP awareness moves Rosc could make.",check:"No direct check. WSJ media relationship for Rosc profile-building.",cares:"Financial journalism|US political economy|Conservative media|Institutional investor coverage|Business and politics",forRosc:"WSJ reaches Rosc's exact LP audience. A Baker interview or WSJ profile of Rosc's veteran founders would directly shape LP awareness.",ask:"Whether there is a WSJ story in Rosc — veteran founders building America's defense-tech future is a compelling WSJ narrative.",watchOut:"Right-leaning editorially — comfortable territory for defense investing but avoid partisan framing.",intros:"WSJ editorial network — journalists and editors covering defense, finance, and technology who are the media relationships Rosc Institute needs.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/gerard-baker",topics:["Financial journalism","Conservative media","Tech and democracy"]},
 {name:"Paolo Benanti",title:"Chief AI Advisor",org:"Vatican / UN AI Advisory Body",cat:"AI",priority:"Worth a chat",loc:"Rome, Italy",who:"Paolo Benanti is a Franciscan friar, theologian, and Professor of Ethics of Technology at the Pontifical Gregorian University in Rome. He serves as a consultant to the Holy See on artificial intelligence and digital ethics and was appointed by the UN Secretary-General to the AI Advisory Body. He has become one of the most prominent ethical voices on AI globally — a trusted interlocutor for heads of state, tech CEOs, and international institutions seeking a thoughtful moral framework for AI governance. His position at the Vatican and the UN gives him unusual convening power and credibility across ideological and cultural divides that few others possess.",check:"No direct check. Rosc Institute ethical credibility and LP narrative.",cares:"AI ethics|Technology and human dignity|UN AI governance|Vatican and technology|Ethical frameworks for AI",forRosc:"A Rosc Institute relationship with a prominent Vatican AI ethicist signals moral seriousness about responsible defense-tech investing — a genuine differentiator with some institutional LPs.",ask:"Whether he would contribute to a Rosc Institute paper on the ethics of dual-use technology and responsible defense investing.",watchOut:"Nothing significant. Engage genuinely on the ethics — don't instrumentalize the relationship.",intros:"UN AI Advisory Body network — his colleagues include government officials and technology leaders from every major nation working on AI governance frameworks.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/paolo-benanti",topics:["AI ethics","Religious perspectives on technology","UN AI governance","Human dignity and AI"]},
 {name:"Hendrik Brandis",title:"Co-founder & GP",org:"Earlybird Venture Capital",cat:"VC",priority:"Worth a chat",loc:"Berlin, Germany",who:"Hendrik Brandis is a co-founder and Managing Partner of Earlybird Venture Capital, one of the most prominent early-stage venture capital firms in Europe with approximately €2 billion in AUM. Founded in Berlin in 1997, Earlybird has backed some of Europe's most important technology companies including UiPath, N26, and Travelport. Brandis has been an active investor in European defense-tech and deep technology startups as Europe's defense investment landscape has shifted post-Ukraine. His network spans the most important early-stage technology founders and investors in Germany and broader Europe, making him a natural bridge for Rosc into the European defense-tech venture ecosystem.",check:"Potential co-LP or European LP channel — Earlybird's LP base includes European institutional investors.",cares:"European early-stage VC|German tech ecosystem|Defense-tech investing|Deep technology|European startup ecosystem",forRosc:"Leading European defense-tech VC with an LP base of European institutional investors. Co-investment, LP sharing, and deal flow sharing are all worth exploring.",ask:"Co-investment on European defense-tech deals and whether Earlybird's LP base has appetite for exposure to US defense-tech VC.",watchOut:"Nothing significant.",intros:"European defense-tech founder network — his early-stage investing relationships include the most important defense-tech founders in Germany and Europe.|Earlybird LP base — European institutional investors who are natural Rosc LP prospects.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/hendrik-brandis",topics:["European VC","Deep tech","B2B software","German startup ecosystem"]},
 {name:"Jeremy Coller",title:"CIO & Managing Partner",org:"Coller Capital",cat:"VC",priority:"Worth a chat",loc:"London, UK",who:"Jeremy Coller is the founder and CIO of Coller Capital, the world's largest dedicated secondaries private equity firm with approximately $50 billion in AUM. In January 2026 EQT announced a $3.2bn deal to acquire Coller Capital (closing expected Q3 2026), after which it will operate as Coller EQT with Coller remaining as Head. He pioneered the PE secondaries market — buying LP stakes from investors who want liquidity before a fund's natural end — and built Coller Capital into the dominant firm in the space. He is also the founder of the FAIRR Initiative, a global investor network focused on factory farming and sustainable protein. His combination of enormous PE market influence through Coller Capital and his FAIRR network creates two distinct Rosc touchpoints: LP capital through Coller's institutional LP base, and the food security and agricultural technology angle which intersects with defense supply chain resilience.",check:"Potential LP through Coller Capital's institutional investor base.",cares:"PE secondaries market|Alternative protein|Factory farming risk|Institutional LP relationships|Impact investing",forRosc:"Coller's institutional LP base spans every major pension, sovereign, and endowment globally. His secondaries relationships include investors actively rebalancing alternatives portfolios.",ask:"Warm introductions to Coller Capital's LP base — specifically institutional investors rebalancing alternatives portfolios with appetite for defense-tech VC.",watchOut:"FAIRR is focused on factory farming and sustainable protein — don't conflate with defense.",intros:"Coller Capital LP network — the most liquid segment of the institutional PE investor base, spanning every major pension and sovereign fund.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/jeremy-coller",topics:["PE secondaries","Liquidity solutions","Alternative investments"]},
 {name:"Ted Cruz",title:"US Senator; Chairman, Commerce Committee",org:"Texas",cat:"Policy",priority:"Worth a chat",loc:"Washington DC",party:"R",who:"Ted Cruz is the US Senator for Texas and Chair of the Senate Commerce Committee — one of the most powerful positions in US technology and telecommunications policy. A Harvard Law graduate and former Texas Solicitor General, he has been a senior Republican senator since 2013 and ran for president in 2016. Cruz is one of the most prominent and influential voices on technology regulation, space policy (strongly pro-commercial space), and national security in the Republican Senate. As Commerce Chair he shapes spectrum policy, AI regulation, and technology competition policy that directly affects Rosc's portfolio companies. Texas also has a dense defense contractor and national security technology ecosystem.",check:"No direct check. Critical technology policy relationship and Texas defense network.",cares:"Space policy|Technology regulation|National security|Texas economy|Republican politics",forRosc:"Senate Commerce Committee Chair who shapes technology and space policy directly affecting Rosc's portfolio. His Texas relationships span the defense contractors and space companies in Rosc's thesis.",ask:"Build a channel for technology and space policy intelligence as his Commerce Committee agenda develops.",watchOut:"R (Texas Republican, controversial) — keep strictly on technology, space, and defense policy. No domestic political discussion.",intros:"Texas defense and space industry network — SpaceX, Blue Origin, and dozens of defense contractors are in his state and his committee's oversight.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/ted-cruz",topics:["Tech regulation","Commerce policy","Space policy","AI legislation"]},
 {name:"Joshua Friedman",title:"Co-founder & Co-CEO",org:"Canyon Partners",cat:"LP",priority:"Worth a chat",loc:"Los Angeles, CA",who:"Joshua Friedman is the co-founder and co-CEO of Canyon Partners, one of the most respected credit and distressed investing firms in the US with approximately $25 billion in AUM. Canyon invests across performing credit, distressed debt, and special situations, and has a history of backing companies navigating complex government and regulatory environments. He is also a prominent LA philanthropist and has deep relationships in the Southern California business and institutional investment community. Canyon's credit focus and Friedman's institutional relationships make him a natural LP introduction channel to the credit-oriented institutional investors who complement Rosc's equity-focused LP base.",check:"Potential LP through Canyon's institutional investor base and LA-area UHNW network.",cares:"Credit and distressed investing|Special situations|LA business community|Philanthropy|Institutional capital",forRosc:"Canyon's institutional LP base and Friedman's LA business network include UHNW families and institutional investors who are natural Rosc LP prospects.",ask:"Warm introductions to Canyon's LP base and LA UHNW network with alternatives appetite.",watchOut:"Nothing significant.",intros:"Canyon Partners LP network — institutional credit investors including pension funds and sovereign accounts who invest across Canyon's strategies.",link:"https://milkeninstitute.org/events/global-conference-2026/speakers/joshua-friedman",topics:["Credit investing","Distressed debt","Alternative credit"]},
